services:
  db:
    image: timescale/timescaledb:2.26.2-pg18
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    environment:
      POSTGRES_DB: health
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d health"]
      interval: 2s
      timeout: 5s
      retries: 15

  clickhouse:
    image: clickhouse/clickhouse-server:26.3.3.20-alpine
    environment:
      CLICKHOUSE_DB: fitness
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: health
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok && container_ip=$$(hostname -i | awk '{print $$1}') && wget -qO- \"http://$${container_ip}:8123/ping\" | grep -q Ok",
        ]
      interval: 2s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.6.2-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15

  migrate:
    image: e2e-server
    build:
      context: .
      target: server
    environment:
      DATABASE_URL: postgres://health:health@db:5432/health
      CLICKHOUSE_URL: http://default:health@clickhouse:8123
      NODE_ENV: test
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: ["migrate"]
    restart: "no"

  server:
    image: e2e-server
    build:
      context: .
      target: server
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgres://health:health@db:5432/health
      CLICKHOUSE_URL: http://default:health@clickhouse:8123
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      NODE_ENV: test
      DISABLE_QUERY_CACHE: "true"
      MATERIALIZED_VIEW_REFRESH_TOKEN: e2e-refresh-token
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["web"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/healthz').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 15s
