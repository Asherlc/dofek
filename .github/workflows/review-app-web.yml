name: Review App — Web

on:
  workflow_call:

jobs:
  deploy:
    name: Deploy Web Review App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: web-build
          path: web-build/
      - name: Deploy web preview to R2
        env:
          R2_ENDPOINT: https://8e5b2f62ffe8ebdd48e725d325a6d51e.r2.cloudflarestorage.com
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: dofek-web-previews
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "$PR_REPO" != "$REPO" ]; then
            echo "Skipping web preview for forked PR"
            exit 0
          fi

          PREVIEW_PREFIX="pr-$PR_NUMBER"
          aws s3 cp web-build/ "s3://$R2_BUCKET/$PREVIEW_PREFIX/" \
            --recursive \
            --region auto \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "no-cache"
      - name: Comment preview URL on PR
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728 # v2
        with:
          header: web-preview
          message: |
            Web preview for `${{ github.sha }}` is ready: [Open Preview](https://web-preview.dofek.fit/pr-${{ github.event.pull_request.number }}/index.html)

            This comment updates automatically on each PR push.
