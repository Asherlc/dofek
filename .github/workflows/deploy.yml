name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        type: choice
        options:
          - all
          - web
          - worker
          - ios
          - ota
          - infra-compose
          - cloudflare
      commit_sha:
        description: "Commit SHA to deploy (defaults to workflow ref HEAD)"
        required: false
        type: string

jobs:
  web:
    name: Deploy Web
    if: inputs.target == 'web' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-web.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  worker:
    name: Deploy Worker
    if: inputs.target == 'worker' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-worker.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  ios:
    name: Deploy iOS
    if: inputs.target == 'ios' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-ios.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  ota:
    name: Deploy OTA
    if: inputs.target == 'ota' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-ota.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  infra-compose:
    name: Deploy Infra Compose
    if: inputs.target == 'infra-compose' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-infra-compose.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  cloudflare:
    name: Deploy Cloudflare
    if: inputs.target == 'cloudflare' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-cloudflare.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  cleanup:
    name: Cleanup Images
    needs: [web, worker]
    if: always() && (needs.web.result == 'success' || needs.worker.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Prune unused images
        env:
          DOKPLOY_HOST: ${{ secrets.DOKPLOY_HOST }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          curl -fsSL -X POST "${DOKPLOY_HOST}/api/trpc/settings.cleanUnusedImages" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"json":{}}' || echo "Image cleanup failed (non-fatal)"
