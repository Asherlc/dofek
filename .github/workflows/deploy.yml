name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        type: choice
        options:
          - all
          - terraform
          - web
          - worker
          - ios
          - ota
          - infra-compose
      commit_sha:
        description: "Commit SHA to deploy (defaults to workflow ref HEAD)"
        required: false
        type: string

jobs:
  terraform:
    name: Deploy Terraform
    if: inputs.target == 'terraform' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-terraform.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  web:
    name: Deploy Web
    needs: [terraform]
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && (inputs.target == 'web' || inputs.target == 'all')
    uses: ./.github/workflows/deploy-web.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  worker:
    name: Deploy Worker
    needs: [terraform]
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && (inputs.target == 'worker' || inputs.target == 'all')
    uses: ./.github/workflows/deploy-worker.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  ios:
    name: Deploy iOS
    if: inputs.target == 'ios' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-ios.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  ota:
    name: Deploy OTA
    if: inputs.target == 'ota' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-ota.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  infra-compose:
    name: Deploy Infra Compose
    needs: [terraform]
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && (inputs.target == 'infra-compose' || inputs.target == 'all')
    uses: ./.github/workflows/deploy-infra-compose.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  cleanup:
    name: Cleanup Images
    needs: [web, worker]
    if: always() && (needs.web.result == 'success' || needs.worker.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Prune unused images
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh "root@${SERVER_HOST}" \
            'docker image prune -af --filter "until=72h"' \
            || echo "Image cleanup failed (non-fatal)"
