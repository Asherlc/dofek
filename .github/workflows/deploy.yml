name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        type: choice
        options:
          - all
          - web
          - infra
          - app
          - ios
          - ota
      commit_sha:
        description: "Commit SHA to deploy (defaults to workflow ref HEAD)"
        required: false
        type: string
      image_tag:
        description: "Docker image tag to deploy (e.g. sha-abc1234). Skips Docker build when provided."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  terraform:
    name: Deploy Infra
    if: inputs.target == 'infra' || inputs.target == 'web' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-terraform.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  docker:
    name: Docker Build & Push
    if: inputs.image_tag == '' && (inputs.target == 'app' || inputs.target == 'web' || inputs.target == 'all')
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute image tag
        id: tag
        env:
          SHA: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
        run: |
          SHORT_SHA=$(echo "$SHA" | head -c 7)
          echo "tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,value=${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
            type=raw,value=latest
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: server
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: COMMIT_HASH=${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
          secrets: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  docker_ml:
    name: Docker ML Build & Push
    if: inputs.image_tag == '' && (inputs.target == 'app' || inputs.target == 'web' || inputs.target == 'all')
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute image tag
        id: tag
        env:
          SHA: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
        run: |
          SHORT_SHA=$(echo "$SHA" | head -c 7)
          echo "tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ml
          tags: |
            type=sha,value=${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
            type=raw,value=latest
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: packages/ml
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ml
          cache-to: type=gha,mode=max,scope=ml

  app:
    name: Deploy App
    needs: [terraform, docker, docker_ml]
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && (needs.docker.result == 'success' || needs.docker.result == 'skipped') && (needs.docker_ml.result == 'success' || needs.docker_ml.result == 'skipped') && (inputs.target == 'app' || inputs.target == 'web' || inputs.target == 'all')
    uses: ./.github/workflows/deploy-app.yml
    with:
      image_tag: ${{ inputs.image_tag != '' && inputs.image_tag || needs.docker.outputs.image_tag }}
      server_host: ${{ needs.terraform.outputs.server_host || '' }}
    secrets: inherit

  ios:
    name: Deploy iOS
    if: inputs.target == 'ios' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-ios.yml
    with:
      commit_sha: ${{ inputs.commit_sha }}
    secrets: inherit

  ota:
    name: Deploy OTA
    if: inputs.target == 'ota' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-ota.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit
  # Image cleanup runs via daily cron on the server (see cloud-init.yml).
