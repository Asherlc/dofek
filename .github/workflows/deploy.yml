name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        type: choice
        options:
          - all
          - infra
          - app
          - ios
          - ota
      commit_sha:
        description: "Commit SHA to deploy (defaults to workflow ref HEAD)"
        required: false
        type: string

jobs:
  terraform:
    name: Deploy Infra
    if: inputs.target == 'infra' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-terraform.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  app:
    name: Deploy App
    needs: [terraform]
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && (inputs.target == 'app' || inputs.target == 'all')
    uses: ./.github/workflows/deploy-app.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  ios:
    name: Deploy iOS
    if: inputs.target == 'ios' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-ios.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  ota:
    name: Deploy OTA
    if: inputs.target == 'ota' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-ota.yml
    with:
      commit_sha: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
    secrets: inherit

  cleanup:
    name: Cleanup Images
    needs: [app]
    if: always() && needs.app.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Prune unused images
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh "root@${SERVER_HOST}" \
            'docker image prune -af --filter "until=72h"' \
            || echo "Image cleanup failed (non-fatal)"
