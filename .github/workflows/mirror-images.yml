name: Mirror Docker Hub Images

on:
  schedule:
    - cron: "0 4 * * 1" # Weekly on Monday at 4am UTC
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}/mirror

jobs:
  mirror:
    name: Mirror ${{ matrix.source }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: node:22-alpine
            target: node
            tag: 22-alpine
          - source: nginx:alpine
            target: nginx
            tag: alpine
          - source: timescale/timescaledb:latest-pg16
            target: timescaledb
            tag: latest-pg16
          - source: redis:7-alpine
            target: redis
            tag: 7-alpine
          - source: semgrep/semgrep:latest
            target: semgrep
            tag: latest
    steps:
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull, tag, and push
        run: |
          docker pull "${{ matrix.source }}"
          docker tag "${{ matrix.source }}" "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.target }}:${{ matrix.tag }}"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.target }}:${{ matrix.tag }}"
