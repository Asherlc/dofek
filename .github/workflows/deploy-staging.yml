name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g. sha-abc1234). Defaults to latest."
        required: false
        default: "latest"
        type: string
      refresh_materialized_views:
        description: "Trigger materialized-view refresh after stack deploy"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read
  packages: read
  id-token: write

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  check:
    name: Deploy Check
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - name: Resolve deploy target
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          TAG="${INPUT_TAG:-latest}"
          OWNER_LOWER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')

          require_tag() {
            local package_name="$1"
            if ! gh api "/users/${OWNER_LOWER}/packages/container/${package_name}/versions" \
              --jq '.[].metadata.container.tags[]?' 2>/dev/null | grep -Fxq "$TAG"; then
              echo "::error::Docker image ${package_name}:$TAG not found."
              exit 1
            fi
          }

          require_tag "dofek"
          require_tag "dofek-ml"

          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying staging image tag across stack services: $TAG"

  terraform:
    name: Deploy Infra
    needs: [check]
    uses: ./.github/workflows/deploy-terraform.yml
    with:
      dispatching_run_id: ${{ github.run_id }}
    secrets: inherit

  deploy-app:
    name: Deploy Staging Stack
    needs: [check, terraform]
    uses: ./.github/workflows/deploy-app.yml
    with:
      image_tag: ${{ needs.check.outputs.image_tag }}
      server_host: ${{ needs.terraform.outputs.staging_server_host }}
      infisical_environment: staging
      stack_name: dofek-staging
      public_url: https://staging.dofek.asherlc.com
      web_host_rule: 'Host(`staging.dofek.asherlc.com`)'
      ota_base_url: https://staging-ota.dofek.asherlc.com
      ota_host_rule: 'Host(`staging-ota.dofek.asherlc.com`)'
      portainer_host_rule: 'Host(`staging-portainer.dofek.asherlc.com`)'
      netdata_host_rule: 'Host(`staging-netdata.dofek.asherlc.com`)'
      databasus_host_rule: 'Host(`staging-databasus.dofek.asherlc.com`)'
      pgadmin_host_rule: 'Host(`staging-pgadmin.dofek.asherlc.com`)'
      dispatching_run_id: ${{ github.run_id }}
      refresh_materialized_views: ${{ inputs.refresh_materialized_views }}
    secrets: inherit
