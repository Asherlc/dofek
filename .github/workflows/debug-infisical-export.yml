name: Debug Infisical Export

on:
  push:
    branches:
      - Asherlc/ota-pr-deploy
  workflow_dispatch:

jobs:
  verify:
    name: Verify EXPO_ACCESS_TOKEN export/parsing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Infisical CLI
        env:
          INFISICAL_VERSION: 0.43.76
        run: |
          curl -1sLf "https://artifacts-cli.infisical.com/setup.deb.sh" | sudo -E bash
          sudo apt-get install -y "infisical=${INFISICAL_VERSION}"
          infisical --version

      - name: Export prod env and verify token handling
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          set -euo pipefail

          project_id="$(jq -r '.workspaceId // empty' .infisical.json)"
          if [ -z "$project_id" ]; then
            echo "::error::.infisical.json is missing workspaceId"
            exit 1
          fi

          infisical export --projectId="$project_id" --env=prod --format=dotenv --silent > "$RUNNER_TEMP/.env.prod"

          echo "Infisical dotenv key count: $(grep -Ec '^[A-Za-z_][A-Za-z0-9_]*=' "$RUNNER_TEMP/.env.prod" || true)"
          echo "Expo-related keys present in dotenv export:"
          cut -d= -f1 "$RUNNER_TEMP/.env.prod" | grep '^EXPO' || true

          for key in EXPO_ACCESS_TOKEN EXPO_TOKEN EXPO_APP_ID EXPO_PUBLIC_SENTRY_DSN; do
            if grep -q "^${key}=" "$RUNNER_TEMP/.env.prod"; then
              echo "$key=present"
            else
              echo "$key=missing"
            fi
          done

          echo "Direct Infisical lookup (key presence):"
          for key in EXPO_ACCESS_TOKEN EXPO_TOKEN EXPO_APP_ID; do
            if infisical secrets get "$key" --projectId="$project_id" --env=prod --plain --silent >/dev/null 2>&1; then
              echo "$key=present"
            else
              echo "$key=missing"
            fi
          done

          set +e
          access_stdout="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --plain --silent 2>"$RUNNER_TEMP/expo_access_stderr.log")"
          access_exit_code=$?
          set -e
          access_stdout_len=${#access_stdout}
          access_stderr_len=$(wc -c < "$RUNNER_TEMP/expo_access_stderr.log" | tr -d '[:space:]')
          echo "infisical_expo_access_exit_code=$access_exit_code"
          echo "infisical_expo_access_stdout_len=$access_stdout_len"
          echo "infisical_expo_access_stderr_len=$access_stderr_len"

          access_plain="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --plain --silent || true)"
          token_plain="$(infisical secrets get EXPO_TOKEN --projectId="$project_id" --env=prod --plain --silent || true)"
          access_plain_no_override="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --plain --silent --secret-overriding=false || true)"
          echo "infisical_expo_access_len=${#access_plain}"
          echo "infisical_expo_access_no_override_len=${#access_plain_no_override}"
          echo "infisical_expo_token_len=${#token_plain}"
          if [ -n "$access_plain" ]; then
            printf "%s" "$access_plain" | sha256sum | awk '{print "infisical_expo_access_sha256="$1}'
          fi
          if [ -n "$token_plain" ]; then
            printf "%s" "$token_plain" | sha256sum | awk '{print "infisical_expo_token_sha256="$1}'
          fi

          recursive_json_file="$RUNNER_TEMP/recursive-secrets.json"
          infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --output=json --silent --recursive > "$recursive_json_file" || true
          if jq -e . "$recursive_json_file" >/dev/null 2>&1; then
            echo "recursive_json_valid=true"
            echo "recursive_json_top_level_type=$(jq -r 'type' "$recursive_json_file")"
            echo "recursive_json_top_level_keys=$(jq -r 'if type==\"object\" then keys|join(\",\") else \"n/a\" end' "$recursive_json_file")"
            echo "recursive_expo_access_candidates=$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[] | select((.secretKey // .key // .name // "") == "EXPO_ACCESS_TOKEN")] | length
            ' "$recursive_json_file")"
            echo "recursive_expo_access_non_empty_values=$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[]
                | select((.secretKey // .key // .name // "") == "EXPO_ACCESS_TOKEN")
                | (.secretValue // .value // "")
                | tostring
                | select(length > 0)
              ] | length
            ' "$recursive_json_file")"
          else
            echo "recursive_json_valid=false"
          fi

          export_line="$(grep '^EXPO_ACCESS_TOKEN=' "$RUNNER_TEMP/.env.prod" || true)"
          if [ -z "$export_line" ]; then
            echo "EXPO_ACCESS_TOKEN is missing from dotenv export; skipping quote/parsing checks"
            exit 0
          fi

          export_value="${export_line#EXPO_ACCESS_TOKEN=}"
          plain_value="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --plain --silent)"

          export_len=${#export_value}
          plain_len=${#plain_value}

          export_is_single_quoted=false
          export_is_double_quoted=false
          if [ "${export_value#\'}" != "$export_value" ] && [ "${export_value%\'}" != "$export_value" ]; then
            export_is_single_quoted=true
          fi
          if [ "${export_value#\"}" != "$export_value" ] && [ "${export_value%\"}" != "$export_value" ]; then
            export_is_double_quoted=true
          fi

          shell_value=""
          set -a
          # shellcheck disable=SC1090
          . "$RUNNER_TEMP/.env.prod"
          set +a
          shell_value="${EXPO_ACCESS_TOKEN:-}"
          shell_len=${#shell_value}

          shell_equals_plain=false
          if [ "$shell_value" = "$plain_value" ]; then
            shell_equals_plain=true
          fi

          docker_len="$(docker run --rm --env-file "$RUNNER_TEMP/.env.prod" alpine:3.20 sh -lc 'printf "%s" "${EXPO_ACCESS_TOKEN:-}" | wc -c')"
          docker_len="$(printf '%s' "$docker_len" | tr -d '[:space:]')"

          docker_starts_with_quote=false
          docker_ends_with_quote=false
          if docker run --rm --env-file "$RUNNER_TEMP/.env.prod" alpine:3.20 sh -lc '[ "${EXPO_ACCESS_TOKEN#\'}" != "$EXPO_ACCESS_TOKEN" ] || [ "${EXPO_ACCESS_TOKEN#\"}" != "$EXPO_ACCESS_TOKEN" ]'; then
            docker_starts_with_quote=true
          fi
          if docker run --rm --env-file "$RUNNER_TEMP/.env.prod" alpine:3.20 sh -lc '[ "${EXPO_ACCESS_TOKEN%\'}" != "$EXPO_ACCESS_TOKEN" ] || [ "${EXPO_ACCESS_TOKEN%\"}" != "$EXPO_ACCESS_TOKEN" ]'; then
            docker_ends_with_quote=true
          fi

          docker_len_equals_plain=false
          if [ "$docker_len" = "$plain_len" ]; then
            docker_len_equals_plain=true
          fi

          echo "export_len=$export_len"
          echo "plain_len=$plain_len"
          echo "shell_len=$shell_len"
          echo "docker_len=$docker_len"
          echo "export_is_single_quoted=$export_is_single_quoted"
          echo "export_is_double_quoted=$export_is_double_quoted"
          echo "shell_equals_plain=$shell_equals_plain"
          echo "docker_len_equals_plain=$docker_len_equals_plain"
          echo "docker_starts_with_quote=$docker_starts_with_quote"
          echo "docker_ends_with_quote=$docker_ends_with_quote"
