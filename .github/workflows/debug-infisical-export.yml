name: Debug Infisical Export

on:
  push:
    branches:
      - Asherlc/ota-pr-deploy
  workflow_dispatch:

jobs:
  verify:
    name: Verify EXPO_ACCESS_TOKEN export/parsing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Infisical CLI
        env:
          INFISICAL_VERSION: 0.43.76
        run: |
          curl -1sLf "https://artifacts-cli.infisical.com/setup.deb.sh" | sudo -E bash
          sudo apt-get install -y "infisical=${INFISICAL_VERSION}"
          infisical --version

      - name: Export prod env and verify token handling
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          set -euo pipefail

          project_id="$(jq -r '.workspaceId // empty' .infisical.json)"
          if [ -z "$project_id" ]; then
            echo "::error::.infisical.json is missing workspaceId"
            exit 1
          fi

          infisical export --projectId="$project_id" --env=prod --format=dotenv --silent > "$RUNNER_TEMP/.env.prod"

          echo "Infisical dotenv key count: $(grep -Ec '^[A-Za-z_][A-Za-z0-9_]*=' "$RUNNER_TEMP/.env.prod" || true)"
          echo "Expo-related keys present in dotenv export:"
          cut -d= -f1 "$RUNNER_TEMP/.env.prod" | grep '^EXPO' || true

          for key in EXPO_ACCESS_TOKEN EXPO_TOKEN EXPO_APP_ID EXPO_PUBLIC_SENTRY_DSN; do
            if grep -q "^${key}=" "$RUNNER_TEMP/.env.prod"; then
              echo "$key=present"
            else
              echo "$key=missing"
            fi
          done

          echo "Direct Infisical lookup (key presence):"
          for key in EXPO_ACCESS_TOKEN EXPO_TOKEN EXPO_APP_ID; do
            if infisical secrets get "$key" --projectId="$project_id" --env=prod --plain --silent >/dev/null 2>&1; then
              echo "$key=present"
            else
              echo "$key=missing"
            fi
          done

          set +e
          access_stdout="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --plain --silent 2>"$RUNNER_TEMP/expo_access_stderr.log")"
          access_exit_code=$?
          set -e
          access_stdout_len=${#access_stdout}
          access_stderr_len=$(wc -c < "$RUNNER_TEMP/expo_access_stderr.log" | tr -d '[:space:]')
          echo "infisical_expo_access_exit_code=$access_exit_code"
          echo "infisical_expo_access_stdout_len=$access_stdout_len"
          echo "infisical_expo_access_stderr_len=$access_stderr_len"

          access_plain="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --plain --silent || true)"
          token_plain="$(infisical secrets get EXPO_TOKEN --projectId="$project_id" --env=prod --plain --silent || true)"
          app_id_plain="$(infisical secrets get EXPO_APP_ID --projectId="$project_id" --env=prod --plain --silent || true)"
          access_plain_no_override="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --plain --silent --secret-overriding=false || true)"
          access_raw_no_expand="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --plain --silent --expand=false || true)"
          access_plain_no_imports="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --plain --silent --include-imports=false || true)"
          access_raw_no_imports_no_expand="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --plain --silent --include-imports=false --expand=false || true)"
          echo "infisical_expo_access_len=${#access_plain}"
          echo "infisical_expo_access_no_override_len=${#access_plain_no_override}"
          echo "infisical_expo_access_no_expand_len=${#access_raw_no_expand}"
          echo "infisical_expo_access_no_imports_len=${#access_plain_no_imports}"
          echo "infisical_expo_access_no_imports_no_expand_len=${#access_raw_no_imports_no_expand}"
          if printf "%s" "$access_raw_no_expand" | grep -q "EXPO_TOKEN"; then
            echo "infisical_expo_access_no_expand_mentions_expo_token=true"
          else
            echo "infisical_expo_access_no_expand_mentions_expo_token=false"
          fi
          first_char="$(printf "%s" "$access_raw_no_expand" | cut -c1)"
          if [ "$first_char" = '$' ]; then
            echo "infisical_expo_access_no_expand_starts_with_dollar=true"
          else
            echo "infisical_expo_access_no_expand_starts_with_dollar=false"
          fi
          echo "infisical_expo_token_len=${#token_plain}"
          echo "infisical_expo_app_id_len=${#app_id_plain}"
          if [ -n "$access_plain" ]; then
            printf "%s" "$access_plain" | sha256sum | awk '{print "infisical_expo_access_sha256="$1}'
          fi
          if [ -n "$token_plain" ]; then
            printf "%s" "$token_plain" | sha256sum | awk '{print "infisical_expo_token_sha256="$1}'
          fi
          if [ -n "$app_id_plain" ]; then
            printf "%s" "$app_id_plain" | sha256sum | awk '{print "infisical_expo_app_id_sha256="$1}'
          fi

          recursive_json_file="$RUNNER_TEMP/recursive-secrets.json"
          infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --output=json --silent --recursive > "$recursive_json_file" || true
          if jq -e . "$recursive_json_file" >/dev/null 2>&1; then
            echo "recursive_json_valid=true"
            echo "recursive_json_top_level_type=$(jq -r 'type' "$recursive_json_file")"
            echo "recursive_json_top_level_keys=$(jq -r 'if type==\"object\" then keys|join(\",\") else \"n/a\" end' "$recursive_json_file")"
            echo "recursive_expo_access_candidates=$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[] | select((.secretKey // .key // .name // "") == "EXPO_ACCESS_TOKEN")] | length
            ' "$recursive_json_file")"
            echo "recursive_expo_access_non_empty_values=$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[]
                | select((.secretKey // .key // .name // "") == "EXPO_ACCESS_TOKEN")
                | (.secretValue // .value // "")
                | tostring
                | select(length > 0)
              ] | length
            ' "$recursive_json_file")"
            echo "recursive_expo_access_item_keys=$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[]
                | select((.secretKey // .key // .name // "") == "EXPO_ACCESS_TOKEN")
                | keys
                | join(",")
              ] | first // ""
            ' "$recursive_json_file")"
            echo "recursive_expo_access_paths_and_lengths:"
            jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              items[]
                | select((.secretKey // .key // .name // "") == "EXPO_ACCESS_TOKEN")
                | "path=\(.secretPath // .path // "/"), value_len=\((.secretValue // .value // "" | tostring | length)), source=\(.source // "unknown")"
            ' "$recursive_json_file"
          else
            echo "recursive_json_valid=false"
          fi

          non_recursive_json_file="$RUNNER_TEMP/non-recursive-secrets.json"
          infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --output=json --silent > "$non_recursive_json_file" || true
          if jq -e . "$non_recursive_json_file" >/dev/null 2>&1; then
            echo "non_recursive_json_valid=true"
            echo "non_recursive_expo_access_candidates=$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[] | select((.secretKey // .key // .name // "") == "EXPO_ACCESS_TOKEN")] | length
            ' "$non_recursive_json_file")"
            echo "non_recursive_expo_access_non_empty_values=$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[]
                | select((.secretKey // .key // .name // "") == "EXPO_ACCESS_TOKEN")
                | (.secretValue // .value // "")
                | tostring
                | select(length > 0)
              ] | length
            ' "$non_recursive_json_file")"
            access_json_value="$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[]
                | select((.secretKey // .key // .name // "") == "EXPO_ACCESS_TOKEN")
                | (.secretValue // .value // "")
                | tostring
              ] | first // ""
            ' "$non_recursive_json_file")"
            token_json_value="$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[]
                | select((.secretKey // .key // .name // "") == "EXPO_TOKEN")
                | (.secretValue // .value // "")
                | tostring
              ] | first // ""
            ' "$non_recursive_json_file")"
            for pair in "access:$access_json_value" "token:$token_json_value"; do
              label="${pair%%:*}"
              value="${pair#*:}"
              value_len=${#value}
              masked_stars=false
              contains_redacted=false
              if printf "%s" "$value" | grep -Eq '^[*]+$'; then
                masked_stars=true
              fi
              if printf "%s" "$value" | grep -Eqi 'redacted|hidden|masked'; then
                contains_redacted=true
              fi
              echo "non_recursive_${label}_json_value_len=$value_len masked_stars=$masked_stars contains_redacted=$contains_redacted"
            done
          else
            echo "non_recursive_json_valid=false"
          fi

          echo "json_shape_probe_start"
          for key in EXPO_ACCESS_TOKEN EXPO_APP_ID EXPO_TOKEN; do
            key_json_file="$RUNNER_TEMP/key-${key}.json"
            infisical secrets get "$key" --projectId="$project_id" --env=prod --output=json --silent > "$key_json_file" || true
            if ! jq -e . "$key_json_file" >/dev/null 2>&1; then
              echo "json_shape key=$key valid=false"
              continue
            fi
            echo "json_shape key=$key valid=true top_level_type=$(jq -r 'type' "$key_json_file")"
            echo "json_shape key=$key top_level_keys=$(jq -r 'if type=="object" then keys|join(",") else "" end' "$key_json_file")"
            echo "json_shape key=$key candidate_count=$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[] | select((.secretKey // .key // .name // "") == "'"$key"'")] | length
            ' "$key_json_file")"
            echo "json_shape key=$key candidate_fields=$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[] | select((.secretKey // .key // .name // "") == "'"$key"'") | keys | join(",")] | first // ""
            ' "$key_json_file")"
            echo "json_shape key=$key candidate_value_len=$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[] | select((.secretKey // .key // .name // "") == "'"$key"'") | (.secretValue // .value // "") | tostring | length] | first // 0
            ' "$key_json_file")"
            json_candidate_value="$(jq -r '
              def items:
                if type=="array" then .
                elif type=="object" and has("secrets") and (.secrets|type)=="array" then .secrets
                elif type=="object" and has("data") and (.data|type)=="array" then .data
                else [] end;
              [items[] | select((.secretKey // .key // .name // "") == "'"$key"'") | (.secretValue // .value // "") | tostring] | first // ""
            ' "$key_json_file")"
            starts_with_dollar=false
            dollar_identifier=false
            dollar_brace_identifier=false
            referenced_identifier=""
            if [ -n "$json_candidate_value" ] && [ "${json_candidate_value#\$}" != "$json_candidate_value" ]; then
              starts_with_dollar=true
              if printf "%s" "$json_candidate_value" | grep -Eq '^\$[A-Za-z_][A-Za-z0-9_]*$'; then
                dollar_identifier=true
                referenced_identifier="$(printf "%s" "$json_candidate_value" | sed 's/^\$//')"
              fi
              if printf "%s" "$json_candidate_value" | grep -Eq '^\$\{[A-Za-z_][A-Za-z0-9_]*\}$'; then
                dollar_brace_identifier=true
                referenced_identifier="$(printf "%s" "$json_candidate_value" | sed 's/^\${//; s/}$//')"
              fi
            fi
            symbol_only=false
            repeated_single_char=false
            if [ -n "$json_candidate_value" ] && printf "%s" "$json_candidate_value" | grep -Eq '^[^[:alnum:]]+$'; then
              symbol_only=true
            fi
            first_char="$(printf "%s" "$json_candidate_value" | cut -c1)"
            if [ -n "$json_candidate_value" ] && [ -n "$first_char" ] && printf "%s" "$json_candidate_value" | tr -d "$first_char" | grep -q '^$'; then
              repeated_single_char=true
            fi
            echo "json_shape key=$key starts_with_dollar=$starts_with_dollar dollar_identifier=$dollar_identifier dollar_brace_identifier=$dollar_brace_identifier referenced_identifier=$referenced_identifier symbol_only=$symbol_only repeated_single_char=$repeated_single_char"
          done
          echo "json_shape_probe_end"

          folders_json_file="$RUNNER_TEMP/folders.json"
          infisical secrets folders get --projectId="$project_id" --env=prod --path=/ --output=json --silent > "$folders_json_file" || true
          if jq -e . "$folders_json_file" >/dev/null 2>&1; then
            echo "folders_json_valid=true"
            echo "folders_json_type=$(jq -r 'type' "$folders_json_file")"
            echo "folders_json_count=$(jq -r 'if type=="array" then length else 0 end' "$folders_json_file")"
            probe_paths_file="$RUNNER_TEMP/probe-paths.txt"
            {
              echo "/"
              jq -r '
                if type=="array" then
                  .[]
                  | (.path // .folderPath // .name // empty)
                else empty end
              ' "$folders_json_file"
            } | awk 'NF' | awk '!seen[$0]++' | head -n 30 > "$probe_paths_file"
            echo "path_probe_count=$(wc -l < "$probe_paths_file" | tr -d "[:space:]")"
            while IFS= read -r folder_path; do
              raw_value="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --path="$folder_path" --plain --silent --expand=false || true)"
              expanded_value="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --path="$folder_path" --plain --silent || true)"
              echo "path_probe path=$folder_path raw_len=${#raw_value} expanded_len=${#expanded_value}"
            done < "$probe_paths_file"
          else
            echo "folders_json_valid=false"
          fi

          export_line="$(grep '^EXPO_ACCESS_TOKEN=' "$RUNNER_TEMP/.env.prod" || true)"
          if [ -z "$export_line" ]; then
            echo "EXPO_ACCESS_TOKEN is missing from dotenv export; skipping quote/parsing checks"
            exit 0
          fi

          export_value="${export_line#EXPO_ACCESS_TOKEN=}"
          plain_value="$(infisical secrets get EXPO_ACCESS_TOKEN --projectId="$project_id" --env=prod --plain --silent)"

          export_len=${#export_value}
          plain_len=${#plain_value}

          export_is_single_quoted=false
          export_is_double_quoted=false
          if [ "${export_value#\'}" != "$export_value" ] && [ "${export_value%\'}" != "$export_value" ]; then
            export_is_single_quoted=true
          fi
          if [ "${export_value#\"}" != "$export_value" ] && [ "${export_value%\"}" != "$export_value" ]; then
            export_is_double_quoted=true
          fi

          shell_value=""
          set -a
          # shellcheck disable=SC1090
          . "$RUNNER_TEMP/.env.prod"
          set +a
          shell_value="${EXPO_ACCESS_TOKEN:-}"
          shell_len=${#shell_value}

          shell_equals_plain=false
          if [ "$shell_value" = "$plain_value" ]; then
            shell_equals_plain=true
          fi

          docker_len="$(docker run --rm --env-file "$RUNNER_TEMP/.env.prod" alpine:3.20 sh -lc 'printf "%s" "${EXPO_ACCESS_TOKEN:-}" | wc -c')"
          docker_len="$(printf '%s' "$docker_len" | tr -d '[:space:]')"

          docker_starts_with_quote=false
          docker_ends_with_quote=false
          if docker run --rm --env-file "$RUNNER_TEMP/.env.prod" alpine:3.20 sh -lc '[ "${EXPO_ACCESS_TOKEN#\'}" != "$EXPO_ACCESS_TOKEN" ] || [ "${EXPO_ACCESS_TOKEN#\"}" != "$EXPO_ACCESS_TOKEN" ]'; then
            docker_starts_with_quote=true
          fi
          if docker run --rm --env-file "$RUNNER_TEMP/.env.prod" alpine:3.20 sh -lc '[ "${EXPO_ACCESS_TOKEN%\'}" != "$EXPO_ACCESS_TOKEN" ] || [ "${EXPO_ACCESS_TOKEN%\"}" != "$EXPO_ACCESS_TOKEN" ]'; then
            docker_ends_with_quote=true
          fi

          docker_len_equals_plain=false
          if [ "$docker_len" = "$plain_len" ]; then
            docker_len_equals_plain=true
          fi

          echo "export_len=$export_len"
          echo "plain_len=$plain_len"
          echo "shell_len=$shell_len"
          echo "docker_len=$docker_len"
          echo "export_is_single_quoted=$export_is_single_quoted"
          echo "export_is_double_quoted=$export_is_double_quoted"
          echo "shell_equals_plain=$shell_equals_plain"
          echo "docker_len_equals_plain=$docker_len_equals_plain"
          echo "docker_starts_with_quote=$docker_starts_with_quote"
          echo "docker_ends_with_quote=$docker_ends_with_quote"
