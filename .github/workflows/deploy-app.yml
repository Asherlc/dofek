name: Deploy App

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (used to compute image tag if image_tag not provided)"
        required: false
        type: string
      image_tag:
        description: "Docker image tag to deploy directly (e.g. sha-abc1234)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. sha-abc1234). Leave empty to deploy latest available."
        required: false
        type: string

concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  app:
    name: Deploy App
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          INPUT_SHA: ${{ inputs.commit_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "Using provided image tag: $INPUT_TAG"
          elif [ -n "$INPUT_SHA" ]; then
            SHORT_SHA=$(echo "$INPUT_SHA" | head -c 7)
            echo "tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "Computed image tag from commit SHA: sha-${SHORT_SHA}"
          else
            echo "No tag or SHA specified. Finding latest available image..."

            LATEST_TAG=$(gh api "/users/asherlc/packages/container/dofek/versions" \
              --jq '[.[] | .metadata.container.tags[] | select(startswith("sha-"))] | .[0]')

            if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
              echo "::error::No Docker images found in GHCR"
              exit 1
            fi

            echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            echo "Auto-selected latest available image: $LATEST_TAG"
          fi
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Deploy web and worker
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SHA_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          ssh "root@${SERVER_HOST}" bash -s -- "$GHCR_TOKEN" "$SHA_TAG" <<'DEPLOY'
            set -euo pipefail
            GHCR_TOKEN="$1"
            SHA_TAG="$2"
            cd /opt/dofek

            # Authenticate with GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u asherlc --password-stdin

            # Pull the new image
            docker pull "ghcr.io/asherlc/dofek:${SHA_TAG}"

            # Persist the image tag for future compose operations
            echo "IMAGE_TAG=${SHA_TAG}" > .env.deploy

            # Zero-downtime rollout for both services
            docker rollout \
              --env-file .env.prod --env-file .env.deploy \
              -f docker-compose.deploy.yml web

            docker rollout \
              --env-file .env.prod --env-file .env.deploy \
              -f docker-compose.deploy.yml worker
          DEPLOY
