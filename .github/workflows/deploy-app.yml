name: Deploy App

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (used to compute image tag if image_tag not provided)"
        required: false
        type: string
      image_tag:
        description: "Docker image tag to deploy directly (e.g. sha-abc1234)"
        required: false
        type: string
      server_host:
        description: "Docker SSH host (defaults to SERVER_HOST secret)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g. sha-abc1234). Defaults to latest."
        required: false
        default: "latest"
        type: string
      server_host:
        description: "Docker SSH host (defaults to SERVER_HOST secret)"
        required: false
        type: string

concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  app:
    name: Deploy App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    env:
      DOCKER_HOST: ssh://root@${{ inputs.server_host != '' && inputs.server_host || secrets.SERVER_HOST }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Resolve image tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          INPUT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif [ -n "$INPUT_SHA" ]; then
            TAG="sha-$(echo "$INPUT_SHA" | head -c 7)"
          else
            echo "::error::Either image_tag or commit_sha must be provided"; exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ inputs.server_host != '' && inputs.server_host || secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Export Infisical deploy secrets file via OIDC
        uses: Infisical/secrets-action@8802effbe453d0576cd923567dcc2c97a1f54058 # v1.0.15
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID != '' && vars.INFISICAL_IDENTITY_ID || '46b66f72-0c77-4cfe-be1b-a43395e77be7' }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG != '' && vars.INFISICAL_PROJECT_SLUG || 'dofek' }}
          env-slug: prod
          export-type: file
          file-output-path: ${{ runner.temp }}/.env.prod

      - name: Validate exported Infisical env file
        run: |
          if [ ! -s "$RUNNER_TEMP/.env.prod" ]; then
            echo "::error::Infisical did not export a non-empty .env.prod file"
            exit 1
          fi
          if ! grep -q '^POSTGRES_PASSWORD=' "$RUNNER_TEMP/.env.prod"; then
            echo "::error::POSTGRES_PASSWORD is missing from exported .env.prod"
            exit 1
          fi
          if ! grep -q '^DATABASE_URL=' "$RUNNER_TEMP/.env.prod"; then
            echo "::error::DATABASE_URL is missing from exported .env.prod"
            exit 1
          fi
          echo "Infisical .env.prod key count: $(grep -Ec '^[A-Za-z_][A-Za-z0-9_]*=' "$RUNNER_TEMP/.env.prod" || true)"
          chmod 600 "$RUNNER_TEMP/.env.prod"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker disk preflight
        run: |
          echo "Docker disk usage snapshot before pulls:"
          docker system df || true
          echo "Docuum service snapshot:"
          docker service ps dofek_docuum --no-trunc || true

      - name: Pull deploy images
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          echo "Starting deploy with IMAGE_TAG=${IMAGE_TAG}"
          docker pull "ghcr.io/asherlc/dofek:${IMAGE_TAG}"
          docker pull "ghcr.io/asherlc/dofek-ml:${IMAGE_TAG}"
          docker pull "postgres:18-alpine"

      - name: Bootstrap stack (if DB service is missing)
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
          INFISICAL_ENV_FILE: ${{ runner.temp }}/.env.prod
        run: |
          if docker service inspect dofek_db >/dev/null 2>&1; then
            echo "Swarm DB service already exists; skipping bootstrap deploy."
          else
            echo "Swarm DB service is missing; running bootstrap stack deploy."
            docker stack deploy -c deploy/stack.yml --with-registry-auth dofek
          fi

      - name: Wait for Postgres writable
        env:
          INFISICAL_ENV_FILE: ${{ runner.temp }}/.env.prod
        run: |
          echo "Docker disk usage snapshot:"
          docker system df || true
          echo "Docuum service snapshot:"
          docker service ps dofek_docuum --no-trunc || true
          for attempt in $(seq 1 36); do
            recovery_output=$(timeout 15s docker run --rm --network dofek_default \
              --env-file "$INFISICAL_ENV_FILE" \
              postgres:18-alpine sh -euc \
              'PGPASSWORD="${POSTGRES_PASSWORD:?POSTGRES_PASSWORD missing}" \
              psql --host=db --username=health --dbname=health --no-align --tuples-only --quiet \
              --command "SELECT CASE WHEN pg_is_in_recovery() THEN '\''recovery'\'' ELSE '\''writable'\'' END;"' 2>&1 || true)
            recovery_state="$(printf '%s\n' "$recovery_output" | tail -n 1 | tr -d '[:space:]')"
            if printf '%s' "$recovery_output" | grep -Eqi "password authentication failed|no password supplied|role \"health\" does not exist|database \"health\" does not exist"; then
              echo "::error::Postgres readiness hard failure: $(printf '%s' "$recovery_output" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g' | cut -c1-240)"
              exit 1
            fi
            if [ "$recovery_state" = "writable" ]; then
              echo "Postgres is writable."
              break
            fi
            if [ "$attempt" -eq 36 ]; then
              echo "::error::Postgres did not become writable within 180s"
              exit 1
            fi
            if [ "$attempt" -eq 1 ]; then
              echo "DB service task snapshot (first failed readiness check):"
              db_service_snapshot="$(docker service ps dofek_db --no-trunc || true)"
              printf '%s\n' "$db_service_snapshot"
              if printf '%s' "$db_service_snapshot" | grep -Eqi "no space left on device"; then
                echo "::error::Postgres service failed to start because the Docker host is out of disk space"
                exit 1
              fi
            fi
            recovery_detail="$(printf '%s' "$recovery_output" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g')"
            echo "Postgres readiness attempt ${attempt}/36: ${recovery_state:-unreachable}; detail=${recovery_detail:0:240}; retrying in 5s..."
            sleep 5
          done

      - name: Run migrations
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
          INFISICAL_ENV_FILE: ${{ runner.temp }}/.env.prod
        run: |
          migration_output_file="$RUNNER_TEMP/migrate.log"
          for attempt in $(seq 1 12); do
            echo "Starting migration attempt ${attempt}/12..."
            if timeout 90s docker run --rm --network dofek_default \
              --env-file "$INFISICAL_ENV_FILE" \
              "ghcr.io/asherlc/dofek:${IMAGE_TAG}" migrate >"$migration_output_file" 2>&1; then
              echo "Migration attempt ${attempt}/12 succeeded."
              break
            fi
            migration_exit_code=$?
            echo "Migration attempt ${attempt}/12 failed (exit code ${migration_exit_code})."
            echo "Migration output (last 60 lines):"
            tail -n 60 "$migration_output_file" || true
            if [ "$attempt" -eq 12 ]; then
              echo "::error::Migration failed after 12 attempts"
              exit 1
            fi
            echo "Migration attempt $attempt failed; retrying in 5s..."
            sleep 5
          done

      - name: Deploy stack
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
          INFISICAL_ENV_FILE: ${{ runner.temp }}/.env.prod
        run: |
          docker stack deploy -c deploy/stack.yml --with-registry-auth --prune dofek
