name: Deploy App

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (used to compute image tag if image_tag not provided)"
        required: false
        type: string
      image_tag:
        description: "Docker image tag to deploy directly (e.g. sha-abc1234)"
        required: false
        type: string
      server_host:
        description: "Docker SSH host (defaults to SERVER_HOST secret)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g. sha-abc1234). Defaults to latest."
        required: false
        default: "latest"
        type: string
      server_host:
        description: "Docker SSH host (defaults to SERVER_HOST secret)"
        required: false
        type: string

concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  app:
    name: Deploy App
    runs-on: ubuntu-latest
    env:
      DOCKER_HOST: ssh://root@${{ inputs.server_host != '' && inputs.server_host || secrets.SERVER_HOST }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Resolve image tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          INPUT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif [ -n "$INPUT_SHA" ]; then
            TAG="sha-$(echo "$INPUT_SHA" | head -c 7)"
          else
            echo "::error::Either image_tag or commit_sha must be provided"; exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup SSH and Infisical
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ inputs.server_host != '' && inputs.server_host || secrets.SERVER_HOST }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          curl -1sLf "https://artifacts-cli.infisical.com/setup.deb.sh" | sudo -E bash
          sudo apt-get install -y infisical
          infisical --version
          project_id="$(jq -r '.workspaceId // empty' .infisical.json)"
          if [ -z "$project_id" ]; then
            echo "::error::.infisical.json is missing workspaceId"
            exit 1
          fi
          required_deploy_keys=(
            CLOUDFLARE_API_TOKEN
            OTA_JWT_SECRET
            OTA_PRIVATE_KEY_B64
            OTA_PUBLIC_KEY_B64
            PGADMIN_DEFAULT_EMAIL
            PGADMIN_DEFAULT_PASSWORD
            POSTGRES_PASSWORD
            R2_ACCESS_KEY_ID
            R2_ENDPOINT
            R2_SECRET_ACCESS_KEY
          )
          infisical export --projectId="$project_id" --env=prod --format=dotenv --tags=deploy-env --silent > "$RUNNER_TEMP/.env.prod"
          echo "Infisical deploy-env export key count: $(grep -Ec '^[A-Za-z_][A-Za-z0-9_]*=' "$RUNNER_TEMP/.env.prod" || true)"
          missing_deploy_keys=()
          for key in "${required_deploy_keys[@]}"; do
            if ! grep -q "^${key}=" "$RUNNER_TEMP/.env.prod"; then
              missing_deploy_keys+=("$key")
            fi
          done
          if [ "${#missing_deploy_keys[@]}" -gt 0 ]; then
            echo "::error::Infisical deploy export with tag deploy-env is missing required keys: ${missing_deploy_keys[*]}"
            exit 1
          fi
          infisical secrets get APPLE_PRIVATE_KEY --projectId="$project_id" --env=prod --plain --silent > "$RUNNER_TEMP/apple_private_key.pem"
          if [ ! -s "$RUNNER_TEMP/apple_private_key.pem" ]; then
            echo "::error::APPLE_PRIVATE_KEY is missing or empty in Infisical"
            exit 1
          fi
          chmod 600 "$RUNNER_TEMP/.env.prod"
          chmod 600 "$RUNNER_TEMP/apple_private_key.pem"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Prepare Apple private key secret
        id: apple_secret
        env:
          APPLE_PRIVATE_KEY_FILE: ${{ runner.temp }}/apple_private_key.pem
        run: |
          APPLE_PRIVATE_KEY_SECRET_HASH="$(sha256sum "$APPLE_PRIVATE_KEY_FILE" | cut -c1-12)"
          APPLE_PRIVATE_KEY_SECRET_NAME="dofek_apple_private_key_${APPLE_PRIVATE_KEY_SECRET_HASH}"
          if ! docker secret inspect "$APPLE_PRIVATE_KEY_SECRET_NAME" >/dev/null 2>&1; then
            echo "Creating Docker secret ${APPLE_PRIVATE_KEY_SECRET_NAME}"
            docker secret create "$APPLE_PRIVATE_KEY_SECRET_NAME" "$APPLE_PRIVATE_KEY_FILE"
          else
            echo "Reusing existing Docker secret ${APPLE_PRIVATE_KEY_SECRET_NAME}"
          fi
          echo "secret_name=$APPLE_PRIVATE_KEY_SECRET_NAME" >> "$GITHUB_OUTPUT"

      - name: Pull deploy images
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          echo "Starting deploy with IMAGE_TAG=${IMAGE_TAG}"
          docker pull "ghcr.io/asherlc/dofek:${IMAGE_TAG}"
          docker pull "ghcr.io/asherlc/dofek-ml:${IMAGE_TAG}"
          docker pull "postgres:18-alpine"

      - name: Wait for Postgres writable
        env:
          INFISICAL_ENV_FILE: ${{ runner.temp }}/.env.prod
        run: |
          while IFS= read -r env_line || [ -n "$env_line" ]; do
            case "$env_line" in
              ""|\#*) continue
            esac
            export "$env_line"
          done < "$INFISICAL_ENV_FILE"
          if [ -z "${POSTGRES_PASSWORD:-}" ]; then
            echo "::error::POSTGRES_PASSWORD is missing from Infisical deploy export"
            exit 1
          fi
          for attempt in $(seq 1 36); do
            recovery_output=$(timeout 15s docker run --rm --network dofek_default \
              -e "PGPASSWORD=${POSTGRES_PASSWORD}" \
              postgres:18-alpine \
              psql --host=db --username=health --dbname=health --no-align --tuples-only --quiet \
              --command "SELECT CASE WHEN pg_is_in_recovery() THEN 'recovery' ELSE 'writable' END;" 2>&1 || true)
            recovery_state="$(printf '%s\n' "$recovery_output" | tail -n 1 | tr -d '[:space:]')"
            if [ "$recovery_state" = "writable" ]; then
              echo "Postgres is writable."
              break
            fi
            if [ "$attempt" -eq 36 ]; then
              echo "::error::Postgres did not become writable within 180s"
              exit 1
            fi
            if [ "$attempt" -eq 1 ]; then
              echo "DB service task snapshot (first failed readiness check):"
              docker service ps dofek_db --no-trunc || true
            fi
            recovery_detail="$(printf '%s' "$recovery_output" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g')"
            echo "Postgres readiness attempt ${attempt}/36: ${recovery_state:-unreachable}; detail=${recovery_detail:0:240}; retrying in 5s..."
            sleep 5
          done

      - name: Run migrations
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
          INFISICAL_ENV_FILE: ${{ runner.temp }}/.env.prod
        run: |
          while IFS= read -r env_line || [ -n "$env_line" ]; do
            case "$env_line" in
              ""|\#*) continue
            esac
            export "$env_line"
          done < "$INFISICAL_ENV_FILE"
          migration_output_file="$RUNNER_TEMP/migrate.log"
          for attempt in $(seq 1 12); do
            echo "Starting migration attempt ${attempt}/12..."
            if timeout 90s docker run --rm --network dofek_default \
              -e "DATABASE_URL=postgres://health:${POSTGRES_PASSWORD}@db:5432/health" \
              "ghcr.io/asherlc/dofek:${IMAGE_TAG}" migrate >"$migration_output_file" 2>&1; then
              echo "Migration attempt ${attempt}/12 succeeded."
              break
            fi
            migration_exit_code=$?
            echo "Migration attempt ${attempt}/12 failed (exit code ${migration_exit_code})."
            echo "Migration output (last 60 lines):"
            tail -n 60 "$migration_output_file" || true
            if [ "$attempt" -eq 12 ]; then
              echo "::error::Migration failed after 12 attempts"
              exit 1
            fi
            echo "Migration attempt $attempt failed; retrying in 5s..."
            sleep 5
          done

      - name: Deploy stack
        env:
          INFISICAL_ENV_FILE: ${{ runner.temp }}/.env.prod
          APPLE_PRIVATE_KEY_SECRET_NAME: ${{ steps.apple_secret.outputs.secret_name }}
        run: |
          while IFS= read -r env_line || [ -n "$env_line" ]; do
            case "$env_line" in
              ""|\#*) continue
            esac
            export "$env_line"
          done < "$INFISICAL_ENV_FILE"
          export APPLE_PRIVATE_KEY_SECRET_NAME
          docker stack deploy -c deploy/stack.yml --with-registry-auth --prune dofek
