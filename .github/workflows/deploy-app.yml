name: Deploy App

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to workflow ref HEAD)"
        required: false
        type: string

concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  app:
    name: Deploy App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Sync compose file
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          scp deploy/docker-compose.deploy.yml "root@${SERVER_HOST}:/opt/dofek/docker-compose.deploy.yml"
          scp deploy/otel-collector-config.yaml "root@${SERVER_HOST}:/opt/dofek/otel-collector-config.yaml"
      - name: Deploy web and worker
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          ssh "root@${SERVER_HOST}" bash -s -- "$GHCR_TOKEN" "$SHA_TAG" <<'DEPLOY'
            set -euo pipefail
            GHCR_TOKEN="$1"
            SHA_TAG="$2"
            cd /opt/dofek

            # Authenticate with GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u asherlc --password-stdin

            # Pull the new image
            docker pull "ghcr.io/asherlc/dofek:${SHA_TAG}"

            # Persist the image tag for future compose operations
            echo "IMAGE_TAG=${SHA_TAG}" > .env.deploy

            # Reconcile infra services (pulls new images + restarts changed services)
            docker compose --env-file .env.prod --env-file .env.deploy \
              -f docker-compose.deploy.yml pull --ignore-pull-failures \
              db redis collector ota databasus traefik portainer netdata
            docker compose --env-file .env.prod --env-file .env.deploy \
              -f docker-compose.deploy.yml up -d \
              db redis collector ota databasus traefik portainer netdata

            # Zero-downtime rollout for both services
            docker rollout \
              --env-file .env.prod --env-file .env.deploy \
              -f docker-compose.deploy.yml web

            docker rollout \
              --env-file .env.prod --env-file .env.deploy \
              -f docker-compose.deploy.yml worker
          DEPLOY
