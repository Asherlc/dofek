name: Deploy App

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (used to compute image tag if image_tag not provided)"
        required: false
        type: string
      image_tag:
        description: "Docker image tag to deploy directly (e.g. sha-abc1234)"
        required: false
        type: string
      server_host:
        description: "Docker SSH host (defaults to SERVER_HOST secret)"
        required: false
        type: string
      dispatching_run_id:
        description: "Run ID of the workflow run that dispatched this workflow"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g. sha-abc1234). Defaults to latest."
        required: false
        default: "latest"
        type: string
      server_host:
        description: "Docker SSH host (defaults to SERVER_HOST secret)"
        required: false
        type: string

concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  app:
    name: Deploy App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      packages: read
      id-token: write
    env:
      DOCKER_HOST: ssh://root@${{ inputs.server_host != '' && inputs.server_host || secrets.SERVER_HOST }}
      DOCKER_SSH_COMMAND: ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Resolve image tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          INPUT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif [ -n "$INPUT_SHA" ]; then
            TAG="sha-$(echo "$INPUT_SHA" | head -c 7)"
          else
            echo "::error::Either image_tag or commit_sha must be provided"; exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ inputs.server_host != '' && inputs.server_host || secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Export Infisical deploy secrets file via OIDC
        run: |
          curl -1sLf "https://artifacts-cli.infisical.com/setup.deb.sh" | sudo -E bash
          sudo apt-get install -y infisical

          oidc_token="$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')"
          infisical_access_token="$(infisical login \
            --method=oidc-auth \
            --machine-identity-id=46b66f72-0c77-4cfe-be1b-a43395e77be7 \
            --jwt="$oidc_token" \
            --plain \
            --silent)"

          infisical export \
            --token="$infisical_access_token" \
            --env=prod \
            --template=.github/templates/infisical-dotenv.tmpl \
            --silent > "${{ github.workspace }}/.env.prod"

      - name: Export deploy env for stack interpolation
        run: |
          cat "${{ github.workspace }}/.env.prod" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull deploy images
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          echo "Starting deploy with IMAGE_TAG=${IMAGE_TAG}"
          docker pull "ghcr.io/asherlc/dofek:${IMAGE_TAG}"
          docker pull "ghcr.io/asherlc/dofek-ml:${IMAGE_TAG}"
          docker pull "postgres:18-alpine"

      - name: Bootstrap stack (if DB service is missing)
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
          INFISICAL_ENV_FILE: ${{ github.workspace }}/.env.prod
        run: |
          if docker service inspect dofek_db >/dev/null 2>&1 && \
            docker service ps dofek_db --filter desired-state=running --format '{{.CurrentState}}' | grep -q '^Running'; then
            echo "Swarm DB service exists with a running task; skipping bootstrap deploy."
          else
            echo "Swarm DB service is missing or not running; running bootstrap stack deploy."
            docker stack deploy -c deploy/stack.yml --with-registry-auth dofek
          fi

      - name: Wait for Postgres writable
        env:
          INFISICAL_ENV_FILE: ${{ github.workspace }}/.env.prod
        run: |
          for attempt in $(seq 1 36); do
            recovery_output=$(timeout 15s docker run --rm --network dofek_default \
              --env-file "$INFISICAL_ENV_FILE" \
              postgres:18-alpine sh -euc \
              'PGPASSWORD="$POSTGRES_PASSWORD" \
              psql --host=db --username=health --dbname=health --no-align --tuples-only --quiet \
              --command "SELECT CASE WHEN pg_is_in_recovery() THEN '\''recovery'\'' ELSE '\''writable'\'' END;"' 2>&1 || true)
            recovery_state="$(printf '%s\n' "$recovery_output" | tail -n 1 | tr -d '[:space:]')"
            if [ "$recovery_state" = "writable" ]; then
              echo "Postgres is writable."
              break
            fi
            if [ "$attempt" -eq 36 ]; then
              echo "::error::Postgres did not become writable within 180s"
              exit 1
            fi
            echo "Postgres readiness attempt ${attempt}/36: retrying in 5s..."
            sleep 5
          done

      - name: Run migrations
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
          INFISICAL_ENV_FILE: ${{ github.workspace }}/.env.prod
        run: |
          migration_output_file="$RUNNER_TEMP/migrate.log"
          for attempt in $(seq 1 12); do
            echo "Starting migration attempt ${attempt}/12..."
            if timeout 90s docker run --rm --network dofek_default \
              --env-file "$INFISICAL_ENV_FILE" \
              --entrypoint sh \
              "ghcr.io/asherlc/dofek:${IMAGE_TAG}" \
              -euc 'export DATABASE_URL="postgres://health:${POSTGRES_PASSWORD}@db:5432/health"; exec ./entrypoint.sh migrate' >"$migration_output_file" 2>&1; then
              echo "Migration attempt ${attempt}/12 succeeded."
              break
            fi
            migration_exit_code=$?
            echo "Migration attempt ${attempt}/12 failed (exit code ${migration_exit_code})."
            echo "Migration output (last 60 lines):"
            tail -n 60 "$migration_output_file" || true
            if [ "$attempt" -eq 12 ]; then
              echo "::error::Migration failed after 12 attempts"
              exit 1
            fi
            echo "Migration attempt $attempt failed; retrying in 5s..."
            sleep 5
          done

      - name: Deploy stack
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
          INFISICAL_ENV_FILE: ${{ github.workspace }}/.env.prod
        run: |
          docker stack deploy -c deploy/stack.yml --with-registry-auth --prune dofek

      - name: Trigger materialized view refresh webhook
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
          INFISICAL_ENV_FILE: ${{ github.workspace }}/.env.prod
        run: |
          if [ -z "${MATERIALIZED_VIEW_REFRESH_TOKEN:-}" ]; then
            echo "::error::MATERIALIZED_VIEW_REFRESH_TOKEN is required"
            exit 1
          fi

          for attempt in $(seq 1 24); do
            echo "Materialized view refresh webhook attempt ${attempt}/24..."
            if docker run --rm --network dofek_default \
              --env-file "$INFISICAL_ENV_FILE" \
              --entrypoint node \
              "ghcr.io/asherlc/dofek:${IMAGE_TAG}" \
              -e '
                const token = process.env.MATERIALIZED_VIEW_REFRESH_TOKEN;
                if (!token) {
                  console.error("MATERIALIZED_VIEW_REFRESH_TOKEN is required");
                  process.exit(20);
                }

                const run = async () => {
                  try {
                    const response = await fetch("http://web:3000/api/internal/materialized-views/refresh", {
                      method: "POST",
                      headers: { Authorization: `Bearer ${token}` },
                    });
                    const bodyText = await response.text();
                    let body;
                    try {
                      body = JSON.parse(bodyText);
                    } catch {
                      body = bodyText;
                    }

                    if (response.status === 202 && (body.status === "started" || body.status === "already_running")) {
                      console.log(`Accepted refresh request (${body.status}).`);
                      process.exit(0);
                    }

                    // Retry while web service is still rolling out.
                    if ([404, 502, 503, 504].includes(response.status)) {
                      console.error(`Retryable response: HTTP ${response.status} body=${JSON.stringify(body)}`);
                      process.exit(10);
                    }

                    // Authentication/config problems should fail immediately.
                    console.error(`Non-retryable response: HTTP ${response.status} body=${JSON.stringify(body)}`);
                    process.exit(20);
                  } catch (error) {
                    console.error(`Retryable request error: ${error}`);
                    process.exit(10);
                  }
                };

                run();
              '; then
              echo "Materialized view refresh webhook accepted."
              break
            fi

            exit_code=$?
            if [ "$exit_code" -eq 20 ]; then
              echo "::error::Materialized view refresh webhook failed with a non-retryable error"
              exit 1
            fi

            if [ "$attempt" -eq 24 ]; then
              echo "::error::Materialized view refresh webhook did not succeed after 24 attempts"
              exit 1
            fi

            echo "Retrying materialized view refresh webhook in 5s..."
            sleep 5
          done

      - uses: ./.github/actions/append-dispatcher-run-summary
        if: always()
        with:
          dispatching_run_id: ${{ inputs.dispatching_run_id != '' && inputs.dispatching_run_id || github.event.workflow_run.id }}
