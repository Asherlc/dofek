name: Deploy App

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (used to compute image tag if image_tag not provided)"
        required: false
        type: string
      image_tag:
        description: "Docker image tag to deploy directly (e.g. sha-abc1234)"
        required: false
        type: string
      server_host:
        description: "Docker SSH host (defaults to SERVER_HOST secret)"
        required: false
        type: string
      infisical_environment:
        description: "Infisical environment to export for the stack"
        required: false
        type: string
        default: prod
      stack_name:
        description: "Docker stack name"
        required: false
        type: string
        default: dofek
      public_url:
        description: "Public app URL"
        required: false
        type: string
        default: https://dofek.asherlc.com
      web_host_rule:
        description: "Traefik Host() rule for the app router"
        required: false
        type: string
        default: ""
      ota_base_url:
        description: "Public OTA base URL"
        required: false
        type: string
        default: https://ota.dofek.asherlc.com
      ota_host_rule:
        description: "Traefik Host() rule for OTA"
        required: false
        type: string
        default: ""
      portainer_host_rule:
        description: "Traefik Host() rule for Portainer"
        required: false
        type: string
        default: ""
      netdata_host_rule:
        description: "Traefik Host() rule for Netdata"
        required: false
        type: string
        default: ""
      databasus_host_rule:
        description: "Traefik Host() rule for Databasus"
        required: false
        type: string
        default: ""
      pgadmin_host_rule:
        description: "Traefik Host() rule for pgAdmin"
        required: false
        type: string
        default: ""
      dispatching_run_id:
        description: "Run ID of the workflow run that dispatched this workflow"
        required: false
        type: string
      refresh_materialized_views:
        description: "Trigger the materialized-view refresh webhook after stack deploy"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g. sha-abc1234). Defaults to latest."
        required: false
        default: "latest"
        type: string
      server_host:
        description: "Docker SSH host (defaults to SERVER_HOST secret)"
        required: false
        type: string
      infisical_environment:
        description: "Infisical environment to export for the stack"
        required: false
        default: prod
        type: string
      stack_name:
        description: "Docker stack name"
        required: false
        default: dofek
        type: string
      refresh_materialized_views:
        description: "Trigger the materialized-view refresh webhook after stack deploy"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-app-${{ inputs.stack_name || 'dofek' }}
  cancel-in-progress: false

jobs:
  app:
    name: Deploy App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      packages: read
      id-token: write
    env:
      DOCKER_HOST: ssh://root@${{ inputs.server_host != '' && inputs.server_host || secrets.SERVER_HOST }}
      DOCKER_SSH_COMMAND: ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10
      DEPLOY_ENVIRONMENT: ${{ inputs.infisical_environment || 'prod' }}
      STACK_NAME: ${{ inputs.stack_name || 'dofek' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Resolve image tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          INPUT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          elif [ -n "$INPUT_SHA" ]; then
            TAG="sha-$(echo "$INPUT_SHA" | head -c 7)"
          else
            echo "::error::Either image_tag or commit_sha must be provided"; exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh-host
        with:
          host: ${{ inputs.server_host != '' && inputs.server_host || secrets.SERVER_HOST }}
          private_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Export Infisical deploy secrets file via OIDC
        uses: ./.github/actions/export-infisical-dotenv
        with:
          env: ${{ inputs.infisical_environment || 'prod' }}
          template: .github/templates/infisical-dotenv.tmpl
          output_path: ${{ github.workspace }}/.env.${{ inputs.infisical_environment || 'prod' }}

      - name: Export deploy env for stack interpolation
        env:
          INFISICAL_ENV_FILE_PATH: ${{ github.workspace }}/.env.${{ inputs.infisical_environment || 'prod' }}
          PUBLIC_URL_INPUT: ${{ inputs.public_url || 'https://dofek.asherlc.com' }}
          WEB_HOST_RULE_INPUT: ${{ inputs.web_host_rule }}
          OTA_BASE_URL_INPUT: ${{ inputs.ota_base_url || 'https://ota.dofek.asherlc.com' }}
          OTA_HOST_RULE_INPUT: ${{ inputs.ota_host_rule }}
          PORTAINER_HOST_RULE_INPUT: ${{ inputs.portainer_host_rule }}
          NETDATA_HOST_RULE_INPUT: ${{ inputs.netdata_host_rule }}
          DATABASUS_HOST_RULE_INPUT: ${{ inputs.databasus_host_rule }}
          PGADMIN_HOST_RULE_INPUT: ${{ inputs.pgadmin_host_rule }}
        run: |
          cat "$INFISICAL_ENV_FILE_PATH" >> "$GITHUB_ENV"
          {
            echo "INFISICAL_ENV_FILE=$INFISICAL_ENV_FILE_PATH"
            echo "DEPLOY_ENVIRONMENT=$DEPLOY_ENVIRONMENT"
            echo "STACK_NAME=$STACK_NAME"
            echo "PUBLIC_URL=$PUBLIC_URL_INPUT"
            echo "OTA_BASE_URL=$OTA_BASE_URL_INPUT"
          } >> "$GITHUB_ENV"

          write_multiline_env() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              return 0
            fi
            {
              echo "${name}<<EOF"
              echo "$value"
              echo "EOF"
            } >> "$GITHUB_ENV"
          }

          write_multiline_env WEB_HOST_RULE "$WEB_HOST_RULE_INPUT"
          write_multiline_env OTA_HOST_RULE "$OTA_HOST_RULE_INPUT"
          write_multiline_env PORTAINER_HOST_RULE "$PORTAINER_HOST_RULE_INPUT"
          write_multiline_env NETDATA_HOST_RULE "$NETDATA_HOST_RULE_INPUT"
          write_multiline_env DATABASUS_HOST_RULE "$DATABASUS_HOST_RULE_INPUT"
          write_multiline_env PGADMIN_HOST_RULE "$PGADMIN_HOST_RULE_INPUT"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull deploy images
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          echo "Starting deploy with IMAGE_TAG=${IMAGE_TAG}"
          docker pull "ghcr.io/asherlc/dofek:${IMAGE_TAG}"
          docker pull "ghcr.io/asherlc/dofek-ml:${IMAGE_TAG}"
          docker pull "postgres:18-alpine"

      - name: Bootstrap stack (if DB service is missing)
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          if docker service inspect "${STACK_NAME}_db" >/dev/null 2>&1 && \
            docker service ps "${STACK_NAME}_db" --filter desired-state=running --format '{{.CurrentState}}' | grep -q '^Running'; then
            echo "Swarm DB service exists with a running task; skipping bootstrap deploy."
          else
            echo "Swarm DB service is missing or not running; running bootstrap stack deploy."
            docker stack deploy -c deploy/stack.yml --with-registry-auth "$STACK_NAME"
          fi

      - name: Wait for Postgres writable
        run: |
          for attempt in $(seq 1 36); do
            recovery_output=$(timeout 15s docker run --rm --network "${STACK_NAME}_default" \
              --env-file "$INFISICAL_ENV_FILE" \
              postgres:18-alpine sh -euc \
              "PGPASSWORD=\"\$POSTGRES_PASSWORD\" \
              psql --host=db --username=health --dbname=health --no-align --tuples-only --quiet \
              --command \"SELECT CASE WHEN pg_is_in_recovery() THEN 'recovery' ELSE 'writable' END;\"" 2>&1 || true)
            recovery_state="$(printf '%s\n' "$recovery_output" | tail -n 1 | tr -d '[:space:]')"
            if [ "$recovery_state" = "writable" ]; then
              echo "Postgres is writable."
              break
            fi
            if [ "$attempt" -eq 36 ]; then
              echo "::error::Postgres did not become writable within 180s"
              exit 1
            fi
            echo "Postgres readiness attempt ${attempt}/36: retrying in 5s..."
            sleep 5
          done

      - name: Run migrations
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          migration_output_file="$RUNNER_TEMP/migrate.log"
          for attempt in $(seq 1 12); do
            echo "Starting migration attempt ${attempt}/12..."
            if timeout 90s docker run --rm --network "${STACK_NAME}_default" \
              --env-file "$INFISICAL_ENV_FILE" \
              --entrypoint sh \
              "ghcr.io/asherlc/dofek:${IMAGE_TAG}" \
              -euc "export DATABASE_URL=\"postgres://health:\${POSTGRES_PASSWORD}@db:5432/health\"; exec ./entrypoint.sh migrate" >"$migration_output_file" 2>&1; then
              echo "Migration attempt ${attempt}/12 succeeded."
              break
            fi
            migration_exit_code=$?
            echo "Migration attempt ${attempt}/12 failed (exit code ${migration_exit_code})."
            echo "Migration output (last 60 lines):"
            tail -n 60 "$migration_output_file" || true
            if [ "$attempt" -eq 12 ]; then
              echo "::error::Migration failed after 12 attempts"
              exit 1
            fi
            echo "Migration attempt $attempt failed; retrying in 5s..."
            sleep 5
          done

      - name: Deploy stack
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          docker stack deploy -c deploy/stack.yml --with-registry-auth --prune --detach=false "$STACK_NAME"

      - name: Plan materialized view sync
        id: view_sync_plan
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          planner_output_file="$RUNNER_TEMP/view-sync-plan.log"
          timeout 90s docker run --rm --network "${STACK_NAME}_default" \
            --env-file "$INFISICAL_ENV_FILE" \
            --entrypoint sh \
            "ghcr.io/asherlc/dofek:${IMAGE_TAG}" \
            -euc "export DATABASE_URL=\"postgres://health:\${POSTGRES_PASSWORD}@db:5432/health\"; exec node --experimental-transform-types src/db/run-view-sync-planner.ts" >"$planner_output_file"

          echo "Materialized view sync planner output:"
          cat "$planner_output_file"

          planner_required="$(sed -n 's/^required=//p' "$planner_output_file" | tail -n 1)"
          planner_reasons="$(sed -n 's/^reasons=//p' "$planner_output_file" | tail -n 1)"

          if [ -z "$planner_required" ]; then
            echo "::error::Materialized view sync planner did not emit required=<bool>"
            exit 1
          fi

          echo "required=${planner_required}" >> "$GITHUB_OUTPUT"
          echo "reasons=${planner_reasons}" >> "$GITHUB_OUTPUT"

      - name: Fail on required materialized view maintenance
        if: steps.view_sync_plan.outputs.required == 'true' && inputs.refresh_materialized_views != true
        run: |
          echo "::error::Materialized view maintenance is required but automatic view sync is disabled: ${{ steps.view_sync_plan.outputs.reasons }}"
          exit 1

      - name: Run blocking materialized view maintenance
        if: inputs.refresh_materialized_views
        env:
          IMAGE_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          echo "Manual materialized view refresh requested by workflow input."

          timeout 50m docker run --rm --network "${STACK_NAME}_default" \
            --env-file "$INFISICAL_ENV_FILE" \
            --entrypoint sh \
            "ghcr.io/asherlc/dofek:${IMAGE_TAG}" \
            -euc "export DATABASE_URL=\"postgres://health:\${POSTGRES_PASSWORD}@db:5432/health\"; exec node --experimental-transform-types src/db/run-materialized-view-maintenance.ts sync"

      - uses: ./.github/actions/append-dispatcher-run-summary
        if: always()
        with:
          dispatching_run_id: ${{ inputs.dispatching_run_id != '' && inputs.dispatching_run_id || github.event.workflow_run.id }}
