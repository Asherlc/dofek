name: Review App

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  id-token: write
  issues: write
  packages: write
  pull-requests: write

concurrency:
  group: review-app-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-image:
    name: Build Review App Image
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: server
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: COMMIT_HASH=${{ github.sha }}
          secrets: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha,scope=server-review
          cache-to: type=gha,mode=max,scope=server-review

  deploy:
    name: Deploy Review App
    if: github.event.pull_request.head.repo.full_name == github.repository
    needs: [build-image]
    runs-on: ubuntu-latest
    env:
      FRONT_DOOR_HOST: ${{ secrets.SERVER_HOST }}
      IMAGE_TAG: pr-${{ github.event.pull_request.number }}
      REVIEW_TERRAFORM_WORKSPACE: dofek-review-pr-${{ github.event.pull_request.number }}
      TERRAFORM_ORGANIZATION: dofek
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Ensure review app Terraform workspace exists
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
        run: |
          set -euo pipefail

          workspace_url="https://app.terraform.io/api/v2/organizations/${TERRAFORM_ORGANIZATION}/workspaces/${REVIEW_TERRAFORM_WORKSPACE}"
          status_code="$(curl --silent --show-error --output /tmp/review-workspace.json --write-out '%{http_code}' \
            --header "Authorization: Bearer ${TF_API_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            "${workspace_url}")"

          case "$status_code" in
            200)
              exit 0
              ;;
            404)
              ;;
            *)
              echo "::error::Unexpected Terraform workspace lookup status ${status_code}"
              cat /tmp/review-workspace.json
              exit 1
              ;;
          esac

          create_payload="$(mktemp)"
          cat <<EOF > "$create_payload"
          {
            "data": {
              "type": "workspaces",
              "attributes": {
                "name": "${REVIEW_TERRAFORM_WORKSPACE}"
              }
            }
          }
          EOF

          curl --silent --show-error --fail \
            --request POST \
            --header "Authorization: Bearer ${TF_API_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            --data @"$create_payload" \
            "https://app.terraform.io/api/v2/organizations/${TERRAFORM_ORGANIZATION}/workspaces" \
            > /tmp/review-workspace.json

          workspace_id="$(jq -r '.data.id' /tmp/review-workspace.json)"
          if [ -z "$workspace_id" ] || [ "$workspace_id" = "null" ]; then
            echo "::error::Terraform workspace creation did not return a workspace id"
            cat /tmp/review-workspace.json
            exit 1
          fi

          tag_payload="$(mktemp)"
          cat <<EOF > "$tag_payload"
          {
            "data": [
              {
                "type": "tags",
                "attributes": {
                  "name": "review-app"
                }
              }
            ]
          }
          EOF

          curl --silent --show-error --fail \
            --request POST \
            --header "Authorization: Bearer ${TF_API_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            --data @"$tag_payload" \
            "https://app.terraform.io/api/v2/workspaces/${workspace_id}/relationships/tags" \
            > /dev/null

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Resolve front door IPv4
        id: front_door
        uses: ./.github/actions/resolve-host-ipv4
        with:
          host: ${{ env.FRONT_DOOR_HOST }}

      - name: Apply review app infrastructure
        id: terraform
        working-directory: deploy/review-apps
        env:
          TF_VAR_front_door_host: ${{ env.FRONT_DOOR_HOST }}
          TF_VAR_front_door_ipv4: ${{ steps.front_door.outputs.ipv4 }}
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_pr_number: ${{ github.event.pull_request.number }}
          TF_VAR_ssh_private_key: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail

          terraform init -lock-timeout=5m
          terraform workspace select "$REVIEW_TERRAFORM_WORKSPACE" || terraform workspace new "$REVIEW_TERRAFORM_WORKSPACE"
          terraform apply -auto-approve -lock-timeout=5m

          echo "review_host=$(terraform output -raw review_host)" >> "$GITHUB_OUTPUT"
          echo "review_url=$(terraform output -raw review_url)" >> "$GITHUB_OUTPUT"
          echo "review_server_ip=$(terraform output -raw review_server_ip)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh-host
        with:
          host: ${{ steps.terraform.outputs.review_server_ip }}
          private_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Export Infisical review env file via OIDC
        uses: ./.github/actions/export-infisical-dotenv
        with:
          template: .github/templates/infisical-dotenv.tmpl
          output_path: ${{ github.workspace }}/.env.review

      - name: Append review app overrides
        env:
          REVIEW_HOST: ${{ steps.terraform.outputs.review_host }}
        run: |
          set -euo pipefail

          {
            echo "ENABLE_DEV_LOGIN=true"
            echo "SLACK_SIGNING_SECRET="
            echo "SLACK_BOT_TOKEN="
            echo "SLACK_APP_TOKEN="
            echo "PUBLIC_URL=https://${REVIEW_HOST}"
          } >> "${{ github.workspace }}/.env.review"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Wait for review server Docker
        env:
          REVIEW_SERVER_IP: ${{ steps.terraform.outputs.review_server_ip }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 60); do
            if ssh -o ConnectTimeout=5 "root@${REVIEW_SERVER_IP}" 'docker info >/dev/null 2>&1'; then
              exit 0
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "::error::Review server Docker did not become ready within 300s"
              exit 1
            fi
            sleep 5
          done

      - name: Deploy review stack
        env:
          COMPOSE_PROJECT_NAME: dofek-review-pr-${{ github.event.pull_request.number }}
          DOCKER_HOST: ssh://root@${{ steps.terraform.outputs.review_server_ip }}
          REVIEW_ENV_FILE: ${{ github.workspace }}/.env.review
          REVIEW_HOST: ${{ steps.terraform.outputs.review_host }}
        run: |
          set -euo pipefail

          docker compose --env-file "$REVIEW_ENV_FILE" -p "$COMPOSE_PROJECT_NAME" -f deploy/review-apps/review-compose.yml pull web db redis
          docker compose --env-file "$REVIEW_ENV_FILE" -p "$COMPOSE_PROJECT_NAME" -f deploy/review-apps/review-compose.yml up -d db redis

          for attempt in $(seq 1 36); do
            if docker compose --env-file "$REVIEW_ENV_FILE" -p "$COMPOSE_PROJECT_NAME" -f deploy/review-apps/review-compose.yml exec -T db pg_isready -U health -d health; then
              break
            fi
            if [ "$attempt" -eq 36 ]; then
              echo "::error::Review app database did not become ready within 180s"
              exit 1
            fi
            sleep 5
          done

          docker compose --env-file "$REVIEW_ENV_FILE" -p "$COMPOSE_PROJECT_NAME" -f deploy/review-apps/review-compose.yml run --rm web migrate
          docker compose --env-file "$REVIEW_ENV_FILE" -p "$COMPOSE_PROJECT_NAME" -f deploy/review-apps/review-compose.yml run --rm web seed
          docker compose --env-file "$REVIEW_ENV_FILE" -p "$COMPOSE_PROJECT_NAME" -f deploy/review-apps/review-compose.yml up -d web

      - name: Wait for public review app healthcheck
        env:
          REVIEW_URL: ${{ steps.terraform.outputs.review_url }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 36); do
            if curl --fail --silent --show-error "${REVIEW_URL}/healthz" | grep -q ok; then
              exit 0
            fi
            if [ "$attempt" -eq 36 ]; then
              echo "::error::Review app did not become healthy at ${REVIEW_URL} within 180s"
              exit 1
            fi
            sleep 5
          done

      - name: Comment review app URL on PR
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728 # v2
        with:
          header: review-app
          message: |
            Review app is ready:

            - [Open review app](${{ steps.terraform.outputs.review_url }})
            - [Jump into seeded dashboard](${{ steps.terraform.outputs.review_url }}/auth/dev-login)

            This environment runs on a dedicated Hetzner server for PR #${{ github.event.pull_request.number }} and updates on each push.
