name: PR

on:
  pull_request:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-size:
    name: PR Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Check PR size
        run: |
          # Use -w to ignore whitespace-only changes (formatting) so auto-formatter
          # runs don't inflate the count and block PRs.
          STATS=$(git diff -w --numstat origin/${{ github.base_ref }}...HEAD)
          ADDITIONS=$(echo "$STATS" | awk '{ add += $1 } END { print add+0 }')
          DELETIONS=$(echo "$STATS" | awk '{ del += $2 } END { print del+0 }')
          FILES=$(git diff -w --name-only origin/${{ github.base_ref }}...HEAD | wc -l | tr -d ' ')
          echo "## PR Size" >> "$GITHUB_STEP_SUMMARY"
          echo "- **$ADDITIONS** additions, **$DELETIONS** deletions across **$FILES** files" >> "$GITHUB_STEP_SUMMARY"
          if [ "$ADDITIONS" -gt 2000 ]; then
            echo "::warning::Large PR: $ADDITIONS additions across $FILES files. Consider splitting into smaller PRs."
          fi
          if [ "$ADDITIONS" -gt 5000 ]; then
            echo "::error::PR exceeds 5000 additions ($ADDITIONS). Please split into smaller PRs."
            exit 1
          fi

  migration-lint:
    name: Migration Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Lint new migration SQL
        run: |
          NEW_MIGRATIONS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'drizzle/*.sql' || true)
          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "No new migrations to lint"
            exit 0
          fi
          pip install squawk-cli
          echo "Linting migrations:"
          echo "$NEW_MIGRATIONS"
          echo "$NEW_MIGRATIONS" | xargs squawk

  gate:
    name: PR Size & Migrations
    needs: [pr-size, migration-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          for result in \
            "${{ needs.pr-size.result }}" \
            "${{ needs.migration-lint.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required job failed or was cancelled"
              exit 1
            fi
          done
