name: E2E

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-e2e-web:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm exec cypress install
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build E2E images with cache
        uses: docker/bake-action@4a9a8d494466d37134e2bfca2d3a8de8fb2681ad # v5
        with:
          files: docker-compose.e2e.yml
          targets: |
            server
            client
          load: true
          set: |
            *.cache-from=type=gha,scope=e2e
            *.cache-to=type=gha,mode=max,scope=e2e
      - name: Scan server image (Grype)
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: e2e-server:latest
          fail-build: true
          severity-cutoff: critical
          only-fixed: true
      - name: Start e2e stack
        run: docker compose -f docker-compose.e2e.yml up -d --wait --no-build
      - run: pnpm e2e:web:run
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
