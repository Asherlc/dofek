name: Deploy Terraform

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy"
        required: false
        type: string
      dispatcher_run_url:
        description: "URL of the workflow run that dispatched this workflow"
        required: false
        type: string
    outputs:
      server_host:
        description: "Terraform-managed server host/IP for Docker SSH deploys"
        value: ${{ jobs.terraform.outputs.server_host }}
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to workflow ref HEAD)"
        required: false
        type: string

concurrency:
  group: deploy-terraform
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    outputs:
      server_host: ${{ steps.tf_outputs.outputs.server_host }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - name: Terraform Apply
        working-directory: deploy
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_ssh_private_key: ${{ secrets.DEPLOY_SSH_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$TF_VAR_cloudflare_api_token" || { echo "ERROR: missing required GitHub secret CLOUDFLARE_API_TOKEN" >&2; exit 1; }
          # -lock-timeout: HCP Terraform briefly holds the workspace lock during init/state ops.
          # When init is followed immediately by apply, apply can race the init lock release
          # (or collide with a stale lock from a prior failed run). Waiting up to 5 minutes
          # is benign in CI and avoids spurious "workspace already locked" failures.
          terraform init -lock-timeout=5m
          terraform apply -auto-approve -lock-timeout=5m

      - name: Terraform Outputs
        id: tf_outputs
        working-directory: deploy
        run: |
          echo "server_host=$(terraform output -raw server_ip)" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/append-dispatcher-run-summary
        if: always()
        with:
          dispatcher_run_url: ${{ inputs.dispatcher_run_url }}
          workflow_run_url: ${{ github.event.workflow_run.html_url }}
