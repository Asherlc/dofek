name: Deploy iOS

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy"
        required: false
        type: string
      ci_run_id:
        description: "CI run ID to include in deploy summary (optional)"
        required: false
        type: string
      dispatching_run_id:
        description: "Run ID of the workflow run that dispatched this workflow"
        required: false
        type: string
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: "CI run ID to include in deploy summary (optional)."
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-ios
  cancel-in-progress: true

jobs:
  check:
    name: Deploy Check
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.sha }}
      should_deploy: ${{ steps.detect.outputs.should_deploy }}
      ci_run_id: ${{ steps.find-run.outputs.run_id }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Resolve commit SHA
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SHA: ${{ inputs.commit_sha }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            echo "sha=$WORKFLOW_RUN_SHA" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_SHA" ]; then
            echo "sha=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "sha=$DISPATCH_SHA" >> "$GITHUB_OUTPUT"
          fi
      - name: Detect iOS native changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          SHA: ${{ steps.resolve.outputs.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual deploy requested"
            exit 0
          fi

          # Find the commit from the last iOS deploy that actually
          # uploaded to TestFlight. HEAD~1 misses native changes in
          # merge commits that bundle multiple PR commits — we need
          # to diff against the last commit that triggered a real deploy.
          #
          # Runs where should_deploy was false still show conclusion=success
          # (the deploy job is skipped, not failed), so we check that the
          # "Upload to TestFlight" job completed successfully.
          #
          # If the GitHub API is unavailable, fall back to deploying
          # rather than silently skipping a needed deploy.
          LAST_DEPLOY_SHA=""
          if ! RUNS=$(gh api "repos/${{ github.repository }}/actions/workflows/deploy-ios.yml/runs?status=success&per_page=100" \
            --jq '[.workflow_runs[] | select(.head_sha != "'"$SHA"'")] | .[].id' 2>/dev/null); then
            echo "GitHub API unavailable — deploying to avoid blocking releases"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for RUN_ID in $RUNS; do
            DEPLOY_JOB=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" \
              --jq '.jobs[] | select(.name == "Upload to TestFlight" and .conclusion == "success") | .id' 2>/dev/null || true)
            if [ -z "$DEPLOY_JOB" ]; then
              continue
            fi
            LAST_DEPLOY_SHA=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" --jq '.head_sha' 2>/dev/null || true)
            if [ -n "$LAST_DEPLOY_SHA" ]; then
              echo "Last actual deploy: run $RUN_ID (commit $LAST_DEPLOY_SHA)"
              break
            fi
          done

          if [ -z "$LAST_DEPLOY_SHA" ]; then
            echo "No previous successful deploy found — deploying"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Diff against the resolved SHA (not HEAD) so the comparison
          # matches the commit being deployed, even if main has advanced.
          DIFF_SHA="${SHA:-HEAD}"
          echo "Comparing $LAST_DEPLOY_SHA...$DIFF_SHA"
          DIFF=$(git diff --name-only "$LAST_DEPLOY_SHA"..."$DIFF_SHA")
          echo "$DIFF"
          if echo "$DIFF" | grep -qE '^packages/mobile/(app\.json|app\.config\.ts|targets/|modules/.*/ios/)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "iOS native changes detected"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "No iOS native changes since last deploy — skipping"
          fi
      - name: Resolve triggering CI run ID
        id: find-run
        if: steps.detect.outputs.should_deploy == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RUN_ID: ${{ inputs.ci_run_id }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            echo "run_id=$WORKFLOW_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "Using triggering CI run: $WORKFLOW_RUN_ID"
            exit 0
          fi

          if [ -n "$INPUT_RUN_ID" ]; then
            echo "run_id=$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "Using provided CI run: $INPUT_RUN_ID"
          else
            echo "run_id=" >> "$GITHUB_OUTPUT"
            echo "No CI run ID provided"
          fi
      - uses: ./.github/actions/append-dispatcher-run-summary
        if: always()
        with:
          dispatching_run_id: ${{ inputs.dispatching_run_id != '' && inputs.dispatching_run_id || github.event.workflow_run.id }}

  deploy:
    name: Upload to TestFlight
    needs: [check]
    if: |
      always() && (
        github.event_name != 'workflow_run' ||
        needs.check.outputs.should_deploy == 'true'
      )
    runs-on: macos-26
    timeout-minutes: 30
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      EXPO_PUBLIC_OTEL_ENDPOINT: ${{ secrets.EXPO_PUBLIC_OTEL_ENDPOINT }}
      EXPO_PUBLIC_OTEL_HEADERS: ${{ secrets.EXPO_PUBLIC_OTEL_HEADERS }}
    steps:
      - name: Resolve commit SHA
        id: sha
        env:
          CHECK_SHA: ${{ needs.check.outputs.commit_sha }}
          INPUT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [ -n "$CHECK_SHA" ]; then
            echo "ref=$CHECK_SHA" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_SHA" ]; then
            echo "ref=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ steps.sha.outputs.ref }}
      - uses: ./.github/actions/setup-node-pnpm
      - name: Validate mobile runtime env
        run: |
          if [ -z "${EXPO_PUBLIC_SENTRY_DSN:-}" ]; then
            echo "::error::Missing EXPO_PUBLIC_SENTRY_DSN secret required by packages/mobile/lib/telemetry.ts"
            exit 1
          fi
      - name: Generate native project
        working-directory: packages/mobile
        run: npx expo prebuild --clean --platform ios
      - name: Install CocoaPods dependencies
        run: cd packages/mobile/ios && pod install
      - name: Set build number
        id: build-number
        run: |
          cd packages/mobile/ios
          BUILD_NUMBER=$(date -u +%s)
          agvtool new-version -all "$BUILD_NUMBER"
          echo "value=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Build number: $BUILD_NUMBER"
      - name: Setup code signing
        env:
          DIST_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo -n "$DIST_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/dist-cert.p12
          security import $RUNNER_TEMP/dist-cert.p12 -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
      - name: Setup App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
      - name: Archive (Release, signed)
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: |
          set -o pipefail
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :teamID" packages/mobile/build/ExportOptions.plist)
          xcodebuild archive \
            -workspace packages/mobile/ios/Dofek.xcworkspace \
            -scheme Dofek \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Dofek.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            EXCLUDED_SOURCE_FILE_NAMES='*.test.swift' \
            2>&1 | tail -40
      - name: Export IPA & Upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Dofek.xcarchive \
            -exportOptionsPlist packages/mobile/build/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
      - name: Write job summary
        if: success()
        env:
          BUILD_NUMBER: ${{ steps.build-number.outputs.value }}
          COMMIT_SHA: ${{ steps.sha.outputs.ref }}
          CI_RUN_ID: ${{ needs.check.outputs.ci_run_id }}
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('packages/mobile/app.json'))['expo']['version'])")
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          {
            echo "## iOS Deploy"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version** | $VERSION |"
            echo "| **Build** | $BUILD_NUMBER |"
            echo "| **Commit** | \`${COMMIT_SHA:0:10}\` |"
            if [ -n "$CI_RUN_ID" ]; then
              echo "| **Triggered by** | [CI run #${CI_RUN_ID}](${REPO_URL}/actions/runs/${CI_RUN_ID}) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
