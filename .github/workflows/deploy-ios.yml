name: Deploy iOS

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy"
        required: true
        type: string
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to main HEAD)"
        required: false
        type: string

concurrency:
  group: deploy-ios
  cancel-in-progress: false

jobs:
  check:
    name: Deploy Check
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.sha }}
      should_deploy: ${{ steps.detect.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 2
      - name: Resolve commit SHA
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SHA: ${{ inputs.commit_sha }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SHA="$INPUT_SHA"
            if [ -z "$SHA" ]; then
              SHA=$(git ls-remote origin refs/heads/main | awk '{ print $1 }')
            fi
          else
            SHA="$WORKFLOW_RUN_SHA"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - name: Check if latest main HEAD and detect iOS changes
        id: detect
        env:
          SHA: ${{ steps.resolve.outputs.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          MAIN_HEAD=$(git ls-remote origin refs/heads/main | awk '{ print $1 }')

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual deploy requested for $SHA"
            exit 0
          fi

          if [ "$MAIN_HEAD" != "$SHA" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy for non-latest main commit"
            exit 0
          fi

          # Only deploy if non-OTA iOS files changed
          DIFF=$(git diff --name-only HEAD~1...HEAD)
          if echo "$DIFF" | grep -qE '^packages/mobile/(app\.json|app\.config\.ts|plugins/|targets/|native/|modules/.*/ios/)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "iOS native changes detected"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "No iOS native changes — skipping deploy"
          fi

  deploy:
    name: Build & Upload to TestFlight
    needs: [check]
    if: |
      always() && (
        github.event_name != 'workflow_run' ||
        needs.check.outputs.should_deploy == 'true'
      )
    runs-on: macos-26
    timeout-minutes: 60
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      DERIVED_DATA_PATH: ${{ github.workspace }}/DerivedData
    steps:
      - name: Resolve commit SHA
        id: sha
        env:
          CHECK_SHA: ${{ needs.check.outputs.commit_sha }}
          INPUT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [ -n "$CHECK_SHA" ]; then
            echo "ref=$CHECK_SHA" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_SHA" ]; then
            echo "ref=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$(git ls-remote origin refs/heads/main | awk '{ print $1 }')" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          ref: ${{ steps.sha.outputs.ref }}
      - uses: ./.github/actions/setup-node-pnpm
      - uses: ./.github/actions/setup-ccache
        with:
          cache-key-prefix: ccache-ios-release
      - name: Generate native project
        working-directory: packages/mobile
        run: npx expo prebuild --clean --platform ios
      - name: Download Sentry XCFramework
        run: packages/mobile/scripts/download-sentry-xcframework.sh
      - name: Cache CocoaPods
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/mobile/ios/Pods
          key: pods-v7-${{ hashFiles('packages/mobile/app.json', 'packages/mobile/app.config.ts', 'packages/mobile/plugins/**', 'packages/mobile/scripts/download-sentry-xcframework.sh') }}
      - name: Cache DerivedData
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: deriveddata-release-v1-${{ hashFiles('packages/mobile/app.json', 'packages/mobile/app.config.ts', 'packages/mobile/plugins/**', 'packages/mobile/modules/*/ios/**/*.swift', 'packages/mobile/modules/*/ios/**/*.m', 'packages/mobile/modules/*/ios/**/*.h') }}
          restore-keys: deriveddata-release-v1-
      - name: Install CocoaPods
        run: cd packages/mobile/ios && pod install
      - name: Setup code signing
        env:
          DEV_CERT_BASE64: ${{ secrets.IOS_DEVELOPMENT_CERT_BASE64 }}
          DEV_CERT_PASSWORD: ${{ secrets.IOS_DEVELOPMENT_CERT_PASSWORD }}
          DIST_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo -n "$DEV_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/dev-cert.p12
          security import $RUNNER_TEMP/dev-cert.p12 -P "$DEV_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          echo -n "$DIST_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/dist-cert.p12
          security import $RUNNER_TEMP/dist-cert.p12 -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
      - name: Setup App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
      - name: Set build number
        id: build-number
        run: |
          cd packages/mobile/ios
          BUILD_NUMBER=$(( $(git rev-list --count HEAD) + 1200 ))
          echo "Setting build number to $BUILD_NUMBER"
          echo "value=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build archive
        run: |
          cd packages/mobile/ios
          xcodebuild archive \
            -workspace Dofek.xcworkspace \
            -scheme Dofek \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Dofek.xcarchive \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM=68LEL35DQ9 \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CC=$RUNNER_TEMP/ccache-wrappers/ccache-clang \
            CPLUSPLUS=$RUNNER_TEMP/ccache-wrappers/ccache-clang++
      - name: Export IPA & Upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Dofek.xcarchive \
            -exportOptionsPlist packages/mobile/build/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
      - name: Write job summary
        if: success()
        env:
          BUILD_NUMBER: ${{ steps.build-number.outputs.value }}
          COMMIT_SHA: ${{ steps.sha.outputs.ref }}
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('packages/mobile/app.json'))['expo']['version'])")
          {
            echo "## iOS Deploy"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version** | $VERSION |"
            echo "| **Build** | $BUILD_NUMBER |"
            echo "| **Commit** | \`${COMMIT_SHA:0:10}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
