name: Deploy Web

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. sha-abc1234). Leave empty to list available."
        required: false
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  check:
    name: Deploy Check
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 1
      - name: Resolve deploy target
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.image_tag }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "$INPUT_TAG" ]; then
              # Manual deploy with explicit image tag
              echo "image_tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
              echo "should_deploy=true" >> "$GITHUB_OUTPUT"
              echo "Deploying image: $INPUT_TAG"
            else
              # Manual deploy — list available images and deploy latest
              echo "No image tag specified. Querying GHCR for available images..."

              IMAGES=$(gh api "/users/asherlc/packages/container/dofek/versions" \
                --jq '[.[] | select(.metadata.container.tags | any(startswith("sha-"))) | {tag: (.metadata.container.tags[] | select(startswith("sha-"))), created: .created_at}] | .[0:20]')

              {
                echo "## Available Docker Images"
                echo ""
                echo "| Tag | Created |"
                echo "|-----|---------|"
                echo "$IMAGES" | jq -r '.[] | "| `\(.tag)` | \(.created) |"'
              } >> "$GITHUB_STEP_SUMMARY"

              LATEST_TAG=$(echo "$IMAGES" | jq -r '.[0].tag')

              if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
                echo "::error::No Docker images found in GHCR"
                exit 1
              fi

              {
                echo ""
                echo "**Auto-deploying latest: \`$LATEST_TAG\`**"
                echo ""
                echo "To deploy a specific version, re-run with the \`image_tag\` input."
              } >> "$GITHUB_STEP_SUMMARY"

              echo "image_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
              echo "should_deploy=true" >> "$GITHUB_OUTPUT"
              echo "Auto-selected latest available image: $LATEST_TAG"
            fi
          else
            # Auto-trigger from CI workflow_run
            SHA="$WORKFLOW_RUN_SHA"
            MAIN_HEAD=$(git ls-remote origin refs/heads/main | awk '{ print $1 }')
            SHORT_SHA=$(echo "$SHA" | head -c 7)
            TAG="sha-${SHORT_SHA}"

            if [ "$MAIN_HEAD" != "$SHA" ]; then
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              echo "Skipping deploy — not latest main (CI SHA: $SHA, main HEAD: $MAIN_HEAD)"
            else
              # Verify image exists (CI just built it, but confirm)
              if ! gh api "/users/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/packages/container/dofek/versions" \
                  --jq ".[].metadata.container.tags[]" 2>/dev/null | grep -q "$TAG"; then
                echo "::error::Docker image $TAG not found. CI may not have pushed it."
                exit 1
              fi

              {
                echo "image_tag=$TAG"
                echo "should_deploy=true"
              } >> "$GITHUB_OUTPUT"
              echo "Deploying CI image: $TAG"
            fi
          fi

  deploy-app:
    name: Deploy App
    needs: [check]
    if: needs.check.outputs.should_deploy == 'true'
    uses: ./.github/workflows/deploy-app.yml
    with:
      image_tag: ${{ needs.check.outputs.image_tag }}
    secrets: inherit

  cleanup-images:
    name: Cleanup Images
    needs: [deploy-app]
    if: always() && needs.deploy-app.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Prune unused images
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh "root@${SERVER_HOST}" \
            'docker image prune -af --filter "until=72h"' \
            || echo "Image cleanup failed (non-fatal)"
