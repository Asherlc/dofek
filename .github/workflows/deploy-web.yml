name: Deploy Web

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g. sha-abc1234). Defaults to latest."
        required: false
        default: "latest"
        type: string

permissions:
  contents: read
  packages: read
  id-token: write

env:
  DISPATCHER_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  check:
    name: Deploy Check
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
    steps:
      - name: Resolve deploy target
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.image_tag }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG:-latest}"
            echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploying image: $TAG"
            exit 0
          fi

          SHA="$WORKFLOW_RUN_SHA"
          SHORT_SHA=$(echo "$SHA" | head -c 7)
          TAG="sha-${SHORT_SHA}"
          OWNER_LOWER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')

          require_tag() {
            local package_name="$1"
            if ! gh api "/users/${OWNER_LOWER}/packages/container/${package_name}/versions" \
              --jq '.[].metadata.container.tags[]?' 2>/dev/null | grep -Fxq "$TAG"; then
              echo "::error::Docker image ${package_name}:$TAG not found. CI may not have pushed it."
              exit 1
            fi
          }

          require_tag "dofek"
          require_tag "dofek-ml"

          {
            echo "image_tag=$TAG"
            echo "should_deploy=true"
          } >> "$GITHUB_OUTPUT"
          echo "Deploying CI image tag across stack services: $TAG"

      - uses: ./.github/actions/append-dispatcher-run-summary
        if: always()
        with:
          workflow_run_url: ${{ github.event.workflow_run.html_url }}

  terraform:
    name: Deploy Infra
    needs: [check]
    if: needs.check.outputs.should_deploy == 'true'
    uses: ./.github/workflows/deploy-terraform.yml
    with:
      dispatcher_run_url: ${{ env.DISPATCHER_RUN_URL }}
    secrets: inherit

  deploy-app:
    name: Deploy Stack
    needs: [check, terraform]
    if: needs.check.outputs.should_deploy == 'true'
    uses: ./.github/workflows/deploy-app.yml
    with:
      image_tag: ${{ needs.check.outputs.image_tag }}
      server_host: ${{ needs.terraform.outputs.server_host }}
      dispatcher_run_url: ${{ env.DISPATCHER_RUN_URL }}
    secrets: inherit

  # Image cleanup runs on the server via docuum (see stack.yml).
