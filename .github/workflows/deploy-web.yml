name: Deploy Web

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to main HEAD)"
        required: false
        type: string

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  check:
    name: Deploy Check
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.sha }}
      should_deploy: ${{ steps.latest.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 1
      - name: Resolve commit SHA
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SHA: ${{ inputs.commit_sha }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SHA="$INPUT_SHA"
            if [ -z "$SHA" ]; then
              SHA=$(git ls-remote origin refs/heads/main | awk '{ print $1 }')
            fi
          else
            SHA="$WORKFLOW_RUN_SHA"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved commit SHA: $SHA"
      - name: Check if latest main HEAD
        id: latest
        env:
          SHA: ${{ steps.resolve.outputs.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          MAIN_HEAD=$(git ls-remote origin refs/heads/main | awk '{ print $1 }')
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual deploy requested for $SHA"
          elif [ "$MAIN_HEAD" = "$SHA" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploying latest main commit: $SHA"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy for non-latest main commit: $SHA (main HEAD is $MAIN_HEAD)"
          fi
      - name: Verify Docker image exists
        if: steps.latest.outputs.should_deploy == 'true'
        env:
          SHA: ${{ steps.resolve.outputs.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(echo "$SHA" | head -c 7)
          IMAGE="ghcr.io/asherlc/dofek:sha-${SHORT_SHA}"
          echo "Checking for image: $IMAGE"
          if ! gh api "/orgs/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/packages/container/dofek/versions" \
              --jq ".[].metadata.container.tags[]" 2>/dev/null | grep -q "sha-${SHORT_SHA}"; then
            echo "::error::Docker image $IMAGE not found in GHCR. CI must build and push the image before deploy."
            exit 1
          fi
          echo "Image found: $IMAGE"

  terraform:
    name: Terraform Apply
    needs: [check]
    if: needs.check.outputs.should_deploy == 'true'
    uses: ./.github/workflows/deploy-terraform.yml
    with:
      commit_sha: ${{ needs.check.outputs.commit_sha }}
    secrets: inherit

  deploy-app:
    name: Deploy App
    needs: [check, terraform]
    uses: ./.github/workflows/deploy-app.yml
    with:
      commit_sha: ${{ needs.check.outputs.commit_sha }}
    secrets: inherit

  cleanup-images:
    name: Cleanup Images
    needs: [deploy-app]
    if: always() && needs.deploy-app.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Prune unused images
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh "root@${SERVER_HOST}" \
            'docker image prune -af --filter "until=72h"' \
            || echo "Image cleanup failed (non-fatal)"
