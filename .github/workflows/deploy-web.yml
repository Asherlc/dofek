name: Deploy Web

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g. sha-abc1234). Defaults to latest."
        required: false
        default: "latest"
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  check:
    name: Deploy Check
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
    steps:
      - name: Resolve deploy target
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.image_tag }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG:-latest}"
            echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploying image: $TAG"
          else
            # Auto-trigger from CI workflow_run
            SHA="$WORKFLOW_RUN_SHA"
            SHORT_SHA=$(echo "$SHA" | head -c 7)
            TAG="sha-${SHORT_SHA}"

            # Verify image exists (CI just built it, but confirm)
            if ! gh api "/users/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/packages/container/dofek/versions" \
                --jq ".[].metadata.container.tags[]" 2>/dev/null | grep -q "$TAG"; then
              echo "::error::Docker image $TAG not found. CI may not have pushed it."
              exit 1
            fi

            {
              echo "image_tag=$TAG"
              echo "should_deploy=true"
            } >> "$GITHUB_OUTPUT"
            echo "Deploying CI image: $TAG"
          fi

  deploy-app:
    name: Deploy App
    needs: [check]
    if: needs.check.outputs.should_deploy == 'true'
    uses: ./.github/workflows/deploy-app.yml
    with:
      image_tag: ${{ needs.check.outputs.image_tag }}
    secrets: inherit

  deploy-ml:
    name: Deploy ML
    needs: [check]
    if: needs.check.outputs.should_deploy == 'true'
    uses: ./.github/workflows/deploy-ml.yml
    with:
      image_tag: ${{ needs.check.outputs.image_tag }}
    secrets: inherit

  cleanup-images:
    name: Cleanup Images
    needs: [deploy-app, deploy-ml]
    if: always() && (needs.deploy-app.result == 'success' || needs.deploy-ml.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Prune unused images
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh "root@${SERVER_HOST}" \
            'docker image prune -af --filter "until=72h"' \
            || echo "Image cleanup failed (non-fatal)"
