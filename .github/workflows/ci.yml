name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Security & supply chain ────────────────────────────────────────────

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm audit --prod --audit-level=critical

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Check for forbidden licenses
        run: |
          npx license-checker --production --excludePrivatePackages \
            --failOn "GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later;AGPL-1.0-only;AGPL-3.0-only;AGPL-3.0-or-later" \
            --summary

  action-pinning:
    name: Action Pinning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Verify all actions are SHA-pinned
        run: |
          # Extract only actual YAML uses: directives (indented, not inside run: blocks)
          UNPINNED=$(awk '
            /^[[:space:]]*run:[[:space:]]*\|/ { in_run=1; next }
            /^[[:space:]]*run:[[:space:]]*[^|]/ { in_run=0 }
            in_run && /^[[:space:]]{2,}[^-]/ { next }
            in_run && /^[[:space:]]*-/ { in_run=0 }
            /^[[:space:]]+uses:/ { print FILENAME ":" NR ":" $0 }
          ' .github/workflows/*.yml .github/actions/**/*.yml \
            | grep -vE '@[0-9a-f]{40}' \
            | grep -vE 'uses: \./' \
            || true)
          if [ -n "$UNPINNED" ]; then
            echo "::error::Found unpinned GitHub Actions (must use full commit SHA):"
            echo "$UNPINNED"
            exit 1
          fi
          echo "All actions are SHA-pinned"

  security-gate:
    name: Security & Dependencies
    needs: [secret-scan, audit, license-check, action-pinning]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          for result in \
            "${{ needs.secret-scan.result }}" \
            "${{ needs.audit.result }}" \
            "${{ needs.license-check.result }}" \
            "${{ needs.action-pinning.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required job failed or was cancelled"
              exit 1
            fi
          done

  # ── Static analysis ────────────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Typecheck all packages
        run: |
          pnpm tsc --noEmit &
          pid1=$!
          (cd packages/server && pnpm tsc --noEmit) &
          pid2=$!
          (cd packages/web && pnpm exec tsr generate && pnpm tsc --noEmit) &
          pid3=$!
          fail=0
          wait $pid1 || fail=1
          wait $pid2 || fail=1
          wait $pid3 || fail=1
          exit $fail

  sherif:
    name: Sherif
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm exec sherif

  knip:
    name: Knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm knip

  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm exec cspell --no-progress

  import-boundaries:
    name: Import Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm exec depcruise --config .dependency-cruiser.cjs src/ packages/

  python-checks:
    name: Python Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ml
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Format check
        run: uv run ruff format --check src/ tests/
      - name: Type check
        run: uv run mypy src/ tests/
      - name: Tests
        run: uv run pytest --cov --cov-report=xml

  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
      - run: cd deploy/deploy-config && terraform init -backend=false && terraform validate

  quality-gate:
    name: Lint & Static Analysis
    needs: [lint, typecheck, sherif, knip, spellcheck, import-boundaries, python-checks, hadolint, terraform-validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          for result in \
            "${{ needs.lint.result }}" \
            "${{ needs.typecheck.result }}" \
            "${{ needs.sherif.result }}" \
            "${{ needs.knip.result }}" \
            "${{ needs.spellcheck.result }}" \
            "${{ needs.import-boundaries.result }}" \
            "${{ needs.python-checks.result }}" \
            "${{ needs.hadolint.result }}" \
            "${{ needs.terraform-validate.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required job failed or was cancelled"
              exit 1
            fi
          done

  # ── Tests ──────────────────────────────────────────────────────────────

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm exec vitest run --project unit --coverage
        env:
          VITEST_COVERAGE_SKIP_THRESHOLDS: "true"
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: coverage/lcov.info
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-unit
          path: coverage/

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm exec vitest run --project integration --coverage
        timeout-minutes: 10
        env:
          VITEST_COVERAGE_SKIP_THRESHOLDS: "true"
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: coverage/lcov.info
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-integration
          path: coverage/

  coverage:
    name: Coverage
    needs: [test-unit, test-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-unit
          path: coverage-unit
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-integration
          path: coverage-integration
      - name: Merge and check coverage
        run: |
          mkdir -p .nyc_output
          cp coverage-unit/coverage-final.json .nyc_output/unit.json
          cp coverage-integration/coverage-final.json .nyc_output/integration.json
          pnpm exec nyc merge .nyc_output merged-coverage.json
          mkdir -p final-coverage
          cp merged-coverage.json final-coverage/coverage-final.json
          pnpm exec nyc report --temp-dir final-coverage --reporter=text-summary
          pnpm exec nyc check-coverage --temp-dir final-coverage \
            --lines 93.5 --branches 89 --functions 94.5 --statements 93.5
      - name: Diff coverage (changed lines only)
        if: github.event_name == 'pull_request'
        run: |
          pip install diff-cover
          # Generate lcov from merged coverage
          pnpm exec nyc report --temp-dir final-coverage --reporter=lcov --report-dir diff-coverage-lcov
          diff-cover diff-coverage-lcov/lcov.info \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=80 \
            --markdown-report diff-coverage.md || DIFF_FAILED=1
          if [ -f diff-coverage.md ]; then
            cat diff-coverage.md >> "$GITHUB_STEP_SUMMARY"
          fi
          exit ${DIFF_FAILED:-0}

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Build web bundle
        run: cd packages/web && pnpm run build
      - name: Check bundle size
        run: pnpm exec size-limit

  test-gate:
    name: Unit & Integration Tests
    needs: [test-unit, test-integration, coverage, bundle-size]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          for result in \
            "${{ needs.test-unit.result }}" \
            "${{ needs.test-integration.result }}" \
            "${{ needs.coverage.result }}" \
            "${{ needs.bundle-size.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required job failed or was cancelled"
              exit 1
            fi
          done

  # ── E2E ────────────────────────────────────────────────────────────────

  test-e2e-web:
    name: E2E Tests (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm exec cypress install
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - name: Build E2E images with cache
        uses: docker/bake-action@4a9a8d494466d37134e2bfca2d3a8de8fb2681ad # v5
        with:
          files: docker-compose.e2e.yml
          targets: |
            server
            client
          load: true
          set: |
            *.cache-from=type=gha,scope=e2e
            *.cache-to=type=gha,mode=max,scope=e2e
      - name: Scan server image (Grype)
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: e2e-server:latest
          fail-build: true
          severity-cutoff: critical
          only-fixed: true
      - name: Start e2e stack
        run: docker compose -f docker-compose.e2e.yml up -d --wait --no-build
      - run: pnpm e2e:web:run
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  # ── Mobile ─────────────────────────────────────────────────────────────

  check-mobile-changes:
    name: Check Mobile Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- packages/mobile/)
            if [ -n "$CHANGED" ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "iOS files changed:"
              echo "$CHANGED"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No iOS changes detected, skipping native build"
            fi
          fi

  test-mobile:
    name: Mobile Tests
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm exec vitest run --project mobile

  build-mobile:
    name: Mobile Metro Bundle
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Verify iOS Metro bundle
        run: cd packages/mobile && pnpm expo export --platform ios --clear

  lint-ios-podspecs:
    name: iOS Podspec Lint
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Validate podspec deployment targets
        run: |
          APP_TARGET=$(python3 -c "import json; print(json.load(open('packages/mobile/app.json'))['expo']['ios']['deploymentTarget'])")
          echo "App deployment target: iOS $APP_TARGET"
          FAILED=0
          for spec in packages/mobile/modules/*/ios/*.podspec; do
            SPEC_TARGET=$(grep -oP "s\.platform\s*=\s*:ios,\s*'\K[^']+" "$spec")
            echo "  $(basename "$spec"): iOS $SPEC_TARGET"
            if [ "$(printf '%s\n' "$APP_TARGET" "$SPEC_TARGET" | sort -V | head -1)" != "$APP_TARGET" ]; then
              echo "  ERROR: podspec targets iOS $SPEC_TARGET which is below app target iOS $APP_TARGET"
              FAILED=1
            fi
          done
          exit $FAILED

  build-ios-native:
    name: iOS Native Build
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Download Sentry XCFramework
        run: packages/mobile/scripts/download-sentry-xcframework.sh
      - name: Cache CocoaPods
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/mobile/ios/Pods
          key: pods-v6-${{ hashFiles('packages/mobile/ios/Podfile', 'packages/mobile/ios/Podfile.lock', 'packages/mobile/scripts/download-sentry-xcframework.sh') }}
          restore-keys: pods-v6-
      - name: Install CocoaPods dependencies
        run: cd packages/mobile/ios && pod install
      - name: Set build number
        if: github.ref == 'refs/heads/main'
        run: |
          cd packages/mobile/ios
          # Offset ensures continuity with builds uploaded before the workflow
          # split (highest previously uploaded build was ~1816).
          BUILD_NUMBER=$(( $(git rev-list --count HEAD) + 1200 ))
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Archive (Release, no signing)
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace packages/mobile/ios/Dofek.xcworkspace \
            -scheme Dofek \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Dofek.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tail -40
        timeout-minutes: 25

  build-watchos:
    name: watchOS Build
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Build Watch target for simulator
        run: |
          xcodebuild build \
            -project packages/mobile/ios/Dofek.xcodeproj \
            -target DofekWatch \
            -sdk watchsimulator \
            -configuration Debug \
            -destination 'generic/platform=watchOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20
        timeout-minutes: 5

  test-swift:
    name: Swift Tests
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/mobile/modules/health-kit/.build
          key: swift-build-v1-${{ hashFiles('packages/mobile/modules/health-kit/Package.swift') }}
          restore-keys: swift-build-v1-
      - name: Run Swift tests with coverage
        run: |
          cd packages/mobile/modules/health-kit
          bash scripts/check-coverage.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: swift-coverage
          path: packages/mobile/modules/health-kit/.build/debug/codecov/
          retention-days: 7

  mutation-swift:
    name: Swift Mutation Testing
    needs: check-mobile-changes
    runs-on: macos-14
    if: github.event_name == 'pull_request' && needs.check-mobile-changes.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/mobile/modules/health-kit/.build
          key: swift-build-v1-${{ hashFiles('packages/mobile/modules/health-kit/Package.swift') }}
          restore-keys: swift-build-v1-
      - name: Install Muter
        run: brew install muter-mutation-testing/formulae/muter
      - name: Get changed Swift files
        id: changed
        run: |
          # Filter to mutatable Swift source files, strip prefix for Muter's working directory
          CHANGED=$(git diff --name-only origin/main...HEAD \
            | { grep '\.swift$' || true; } \
            | { grep -v 'Tests/' || true; } \
            | { grep -v 'HealthKitModule.swift' || true; } \
            | { grep -v 'Package.swift' || true; } \
            | sed 's|^packages/mobile/modules/health-kit/||' \
            | tr '\n' ',' \
            | sed 's/,$//')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Mutating changed Swift files: $CHANGED"
      - name: Run Muter
        if: steps.changed.outputs.files != ''
        working-directory: packages/mobile/modules/health-kit
        timeout-minutes: 30
        run: |
          muter --files-to-mutate "${{ steps.changed.outputs.files }}" || {
            EXIT_CODE=$?
            # Exit 255 = "no mutatable code found" — expected for incremental runs
            # when changed files have no patterns Muter's operators can target
            if [ $EXIT_CODE -eq 255 ]; then
              echo "Muter found no mutatable code in changed files — skipping."
              exit 0
            fi
            exit $EXIT_CODE
          }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: muter-report
          path: packages/mobile/modules/health-kit/muter_logs/
          retention-days: 7

  ios-gate:
    name: iOS & watchOS
    needs: [check-mobile-changes, test-mobile, build-mobile, lint-ios-podspecs, build-ios-native, build-watchos, test-swift, mutation-swift]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          for result in \
            "${{ needs.check-mobile-changes.result }}" \
            "${{ needs.test-mobile.result }}" \
            "${{ needs.build-mobile.result }}" \
            "${{ needs.lint-ios-podspecs.result }}" \
            "${{ needs.build-ios-native.result }}" \
            "${{ needs.build-watchos.result }}" \
            "${{ needs.test-swift.result }}" \
            "${{ needs.mutation-swift.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required job failed or was cancelled"
              exit 1
            fi
          done

  # ── Mutation testing ───────────────────────────────────────────────────

  mutation-prep:
    name: Mutation Prep
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shards: ${{ steps.shard.outputs.shards }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Compute changed files and split into shards
        id: shard
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF_RANGE="origin/main...HEAD"
          else
            DIFF_RANGE="HEAD~1...HEAD"
          fi

          CANDIDATES=$(git diff --name-only $DIFF_RANGE \
            | { grep '\.ts$' || true; } \
            | { grep -v '\.test\.ts$' || true; } \
            | { grep -v '\.cy\.ts$' || true; } \
            | { grep -v 'test-helpers\.ts$' || true; } \
            | { grep -v '\.d\.ts$' || true; } \
            | { grep -v '\.gen\.ts$' || true; } \
            | { grep -v '\.config\.' || true; } \
            | { grep -v 'drizzle/' || true; } \
            | { grep -v 'src/db/schema\.ts$' || true; } \
            | { grep -v 'scripts/' || true; } \
            | { grep -v 'packages/mobile/' || true; } \
            | { grep -v '\.storybook/' || true; } \
            | { grep -v '\.stories\.ts$' || true; })

          ALL_FILES=()
          for f in $CANDIDATES; do
            [ ! -f "$f" ] && continue
            ALL_FILES+=("$f")
          done

          COUNT=${#ALL_FILES[@]}
          if [ "$COUNT" -eq 0 ]; then
            echo "shards=[]" >> "$GITHUB_OUTPUT"
            echo "No files to mutate"
            exit 0
          fi

          # Split into shards of up to 5 files each
          SHARD_SIZE=5
          SHARDS="["
          for (( i=0; i<COUNT; i+=SHARD_SIZE )); do
            CHUNK=""
            for (( j=i; j<i+SHARD_SIZE && j<COUNT; j++ )); do
              CHUNK="${CHUNK:+$CHUNK,}${ALL_FILES[$j]}"
            done
            [ "$i" -gt 0 ] && SHARDS="$SHARDS,"
            SHARDS="$SHARDS\"$CHUNK\""
          done
          SHARDS="$SHARDS]"

          echo "shards=$SHARDS" >> "$GITHUB_OUTPUT"
          echo "Split $COUNT files into shards: $SHARDS"

  mutation:
    name: Stryker (${{ strategy.job-index }})
    needs: mutation-prep
    if: needs.mutation-prep.outputs.shards != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
    strategy:
      fail-fast: false
      matrix:
        files: ${{ fromJSON(needs.mutation-prep.outputs.shards) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Restore Stryker incremental cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-v2-${{ github.head_ref || 'main' }}-${{ hashFiles(matrix.files) }}-${{ github.sha }}
          restore-keys: |
            stryker-v2-${{ github.head_ref || 'main' }}-${{ hashFiles(matrix.files) }}-
            stryker-v2-main-${{ hashFiles(matrix.files) }}-
          save-always: true
      - name: Run Stryker
        run: pnpm test:mutation --mutate "${{ matrix.files }}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: mutation-report-${{ strategy.job-index }}
          path: reports/mutation/
          retention-days: 7

  mutation-gate:
    name: Mutation Testing
    needs: [mutation-prep, mutation]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.mutation.result }}" = "failure" ] || [ "${{ needs.mutation.result }}" = "cancelled" ]; then
            echo "Mutation testing failed or was cancelled"
            exit 1
          fi

  # ── PR quality gates ───────────────────────────────────────────────────

  pr-size:
    name: PR Size
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Check PR size
        run: |
          # Use -w to ignore whitespace-only changes (formatting) so auto-formatter
          # runs don't inflate the count and block PRs.
          STATS=$(git diff -w --numstat origin/${{ github.base_ref }}...HEAD)
          ADDITIONS=$(echo "$STATS" | awk '{ add += $1 } END { print add+0 }')
          DELETIONS=$(echo "$STATS" | awk '{ del += $2 } END { print del+0 }')
          FILES=$(git diff -w --name-only origin/${{ github.base_ref }}...HEAD | wc -l | tr -d ' ')
          echo "## PR Size" >> "$GITHUB_STEP_SUMMARY"
          echo "- **$ADDITIONS** additions, **$DELETIONS** deletions across **$FILES** files" >> "$GITHUB_STEP_SUMMARY"
          if [ "$ADDITIONS" -gt 2000 ]; then
            echo "::warning::Large PR: $ADDITIONS additions across $FILES files. Consider splitting into smaller PRs."
          fi
          if [ "$ADDITIONS" -gt 8000 ]; then
            echo "::error::PR exceeds 8000 additions ($ADDITIONS). Please split into smaller PRs."
            exit 1
          fi

  migration-lint:
    name: Migration Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Lint new migration SQL
        run: |
          NEW_MIGRATIONS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'drizzle/*.sql' || true)
          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "No new migrations to lint"
            exit 0
          fi
          pip install squawk-cli
          echo "Linting migrations:"
          echo "$NEW_MIGRATIONS"
          echo "$NEW_MIGRATIONS" | xargs squawk

  pr-gate:
    name: PR Size & Migrations
    needs: [pr-size, migration-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          for result in \
            "${{ needs.pr-size.result }}" \
            "${{ needs.migration-lint.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required job failed or was cancelled"
              exit 1
            fi
          done

  # ── CI Gate ────────────────────────────────────────────────────────────

  ci-gate:
    name: CI Gate
    needs: [security-gate, quality-gate, test-gate, test-e2e-web, ios-gate, mutation-gate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all CI results
        run: |
          for result in \
            "${{ needs.security-gate.result }}" \
            "${{ needs.quality-gate.result }}" \
            "${{ needs.test-gate.result }}" \
            "${{ needs.test-e2e-web.result }}" \
            "${{ needs.ios-gate.result }}" \
            "${{ needs.mutation-gate.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "CI gate failed — blocking deploy"
              exit 1
            fi
          done

  storybook-preview:
    name: Storybook Preview
    needs: [ci-gate]
    if: github.event_name == 'pull_request' && needs.ci-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build Storybook
        run: pnpm storybook:web:build

      - name: Prepare preview metadata
        id: preview
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          STORYBOOK_PREVIEW_BASE_URL: ${{ secrets.STORYBOOK_PREVIEW_BASE_URL }}
        run: |
          set -euo pipefail

          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Storybook preview for forked PR (repository secrets are unavailable)."
            exit 0
          fi

          missing=()
          [ -n "${R2_ENDPOINT:-}" ] || missing+=("R2_ENDPOINT")
          [ -n "${R2_ACCESS_KEY_ID:-}" ] || missing+=("R2_ACCESS_KEY_ID")
          [ -n "${R2_SECRET_ACCESS_KEY:-}" ] || missing+=("R2_SECRET_ACCESS_KEY")
          [ -n "${R2_BUCKET:-}" ] || missing+=("R2_BUCKET")
          [ -n "${STORYBOOK_PREVIEW_BASE_URL:-}" ] || missing+=("STORYBOOK_PREVIEW_BASE_URL")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Storybook preview missing required GitHub secrets: ${missing[*]}"
            exit 1
          fi

          BASE_URL="${STORYBOOK_PREVIEW_BASE_URL%/}"
          PREVIEW_PREFIX="storybook/pr-${{ github.event.pull_request.number }}"
          PREVIEW_URL="$BASE_URL/pr-${{ github.event.pull_request.number }}/"

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "preview_prefix=$PREVIEW_PREFIX" >> "$GITHUB_OUTPUT"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Deploy Storybook to R2
        if: steps.preview.outputs.ready == 'true'
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          aws s3 sync packages/web/storybook-static/ "s3://$R2_BUCKET/${{ steps.preview.outputs.preview_prefix }}/" \
            --delete \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "no-cache"

      - name: Comment preview URL on PR
        if: steps.preview.outputs.ready == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python <<'PY'
          import json
          import os
          import urllib.request

          api_url = os.environ["GITHUB_API_URL"]
          repository = os.environ["REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]
          preview_url = os.environ["PREVIEW_URL"]
          commit_sha = os.environ["COMMIT_SHA"][:8]
          marker = "<!-- codex-storybook-preview -->"
          body = (
              f"{marker}\n"
              f"Storybook preview for `{commit_sha}` is ready: [Open Storybook]({preview_url})\n\n"
              f"This comment updates automatically on each PR push."
          )

          def request(url: str, method: str = "GET", data: dict | None = None) -> dict | list:
              payload = None if data is None else json.dumps(data).encode("utf-8")
              req = urllib.request.Request(
                  url,
                  data=payload,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read().decode("utf-8"))

          comments_url = f"{api_url}/repos/{repository}/issues/{pr_number}/comments"
          comments = request(comments_url)
          existing = next(
              (
                  comment
                  for comment in comments
                  if marker in comment.get("body", "")
              ),
              None,
          )

          if existing is None:
              request(comments_url, method="POST", data={"body": body})
          else:
              request(existing["url"], method="PATCH", data={"body": body})
          PY

  # ── Deploy (main only) ────────────────────────────────────────────────

  check-native-changes:
    name: Check Native iOS Changes
    needs: [ci-gate]
    if: always() && needs.ci-gate.result == 'success' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — forcing TestFlight upload"
          else
            CHANGED=$(git diff --name-only HEAD~1...HEAD -- \
              'packages/mobile/ios/**' \
              'packages/mobile/modules/*/ios/**' \
              'packages/mobile/modules/*/Package.swift' \
              'packages/mobile/app.json' \
              'packages/mobile/modules/*/expo-module.config.json')
            if [ -n "$CHANGED" ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Native iOS files changed:"
              echo "$CHANGED"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No native iOS changes, skipping TestFlight upload"
            fi
          fi

  ios-release:
    name: iOS TestFlight
    needs: check-native-changes
    if: always() && needs.check-native-changes.result == 'success' && needs.check-native-changes.outputs.changed == 'true'
    runs-on: macos-26
    timeout-minutes: 60
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0 # Full history needed for git rev-list build number
      - uses: ./.github/actions/setup-node-pnpm

      - name: Download Sentry XCFramework
        run: packages/mobile/scripts/download-sentry-xcframework.sh

      - name: Cache CocoaPods
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/mobile/ios/Pods
          key: pods-v6-${{ hashFiles('packages/mobile/ios/Podfile', 'packages/mobile/ios/Podfile.lock', 'packages/mobile/scripts/download-sentry-xcframework.sh') }}

      - name: Install CocoaPods
        run: cd packages/mobile/ios && pod install

      - name: Setup code signing
        env:
          DEV_CERT_BASE64: ${{ secrets.IOS_DEVELOPMENT_CERT_BASE64 }}
          DEV_CERT_PASSWORD: ${{ secrets.IOS_DEVELOPMENT_CERT_PASSWORD }}
          DIST_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo -n "$DEV_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/dev-cert.p12
          security import $RUNNER_TEMP/dev-cert.p12 -P "$DEV_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          echo -n "$DIST_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/dist-cert.p12
          security import $RUNNER_TEMP/dist-cert.p12 -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Setup App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Set build number
        run: |
          cd packages/mobile/ios
          # Offset ensures continuity with builds uploaded before the workflow
          # split (highest previously uploaded build was ~1816).
          BUILD_NUMBER=$(( $(git rev-list --count HEAD) + 1200 ))
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build archive
        run: |
          cd packages/mobile/ios
          xcodebuild archive \
            -workspace Dofek.xcworkspace \
            -scheme Dofek \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Dofek.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM=68LEL35DQ9

      - name: Diagnose archive signing
        if: always()
        run: |
          echo "=== Keychain identities ==="
          security find-identity -v -p codesigning
          echo ""

          echo "=== Archive structure ==="
          find "$RUNNER_TEMP/Dofek.xcarchive/Products" -maxdepth 3 -type d 2>/dev/null || true
          echo ""

          echo "=== Archive top-level products ==="
          ls -la "$RUNNER_TEMP/Dofek.xcarchive/Products/Applications/" 2>/dev/null || true
          echo ""

          echo "=== Main app codesign ==="
          codesign -dvv "$RUNNER_TEMP/Dofek.xcarchive/Products/Applications/Dofek.app" 2>&1 || true
          echo ""

          echo "=== Main app entitlements ==="
          codesign -d --entitlements - "$RUNNER_TEMP/Dofek.xcarchive/Products/Applications/Dofek.app" 2>&1 || true
          echo ""

          echo "=== Watch app codesign ==="
          find "$RUNNER_TEMP/Dofek.xcarchive" -name "DofekWatch.app" -exec sh -c 'echo "--- $1 ---"; codesign -dvv "$1" 2>&1' _ {} \; || true
          echo ""

          echo "=== Watch app entitlements ==="
          find "$RUNNER_TEMP/Dofek.xcarchive" -name "DofekWatch.app" -exec sh -c 'echo "--- $1 ---"; codesign -d --entitlements - "$1" 2>&1' _ {} \; || true
          echo ""

          echo "=== Embedded provisioning profiles ==="
          find "$RUNNER_TEMP/Dofek.xcarchive" -name "embedded.mobileprovision" -exec sh -c '
            echo "--- $1 ---"
            security cms -D -i "$1" 2>/dev/null | grep -E "AppIDName|Name|TeamIdentifier|TeamName|ProvisionsAllDevices|ProvisionedDevices|ExpirationDate|com\.apple\.developer" | head -30
          ' _ {} \; || true
          echo ""

          echo "=== Provisioning profiles dir ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles dir"
          echo ""

          echo "=== Archive Info.plist ==="
          cat "$RUNNER_TEMP/Dofek.xcarchive/Info.plist" 2>/dev/null | head -60 || true

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Dofek.xcarchive \
            -exportOptionsPlist packages/mobile/ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload to TestFlight
        if: success()
        run: |
          OUTPUT=$(xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/Dofek.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "UPLOAD FAILED"; then
            echo "::error::altool upload failed"
            exit 1
          fi

      - name: Dump distribution logs
        if: failure()
        run: |
          find /var/folders -name "*.xcdistributionlogs" -print 2>/dev/null | while read logdir; do
            echo "--- $logdir ---"
            find "$logdir" -type f -exec sh -c 'echo "== $1 =="; cat "$1"' _ {} \;
          done

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  ota-deploy:
    name: OTA Deploy
    needs: [ci-gate]
    if: always() && needs.ci-gate.result == 'success' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Export iOS bundle
        run: cd packages/mobile && pnpm expo export --platform ios --clear

      - name: Generate metadata and stage release
        run: |
          RELEASE_ID="$(date +%Y-%m-%d)-${GITHUB_SHA::8}"
          STAGING_DIR="$RUNNER_TEMP/ota/$RELEASE_ID"
          mkdir -p "$STAGING_DIR/bundles" "$STAGING_DIR/assets"

          # Generate metadata.json
          node --experimental-transform-types scripts/generate-ota-metadata.ts \
            --dist packages/mobile/dist \
            --runtime-version 1.0 \
            --output "$STAGING_DIR/metadata.json"

          # Copy bundle files
          find packages/mobile/dist -name '*.hbc' -o -name '*.js' | while read -r f; do
            cp "$f" "$STAGING_DIR/bundles/"
          done

          # Copy asset files
          if [ -d packages/mobile/dist/assets ]; then
            cp packages/mobile/dist/assets/* "$STAGING_DIR/assets/" 2>/dev/null || true
          fi

          echo "RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"
          echo "STAGING_DIR=$STAGING_DIR" >> "$GITHUB_ENV"

      - name: Validate OTA R2 secrets
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "${R2_ENDPOINT:-}" ] || missing+=("R2_ENDPOINT")
          [ -n "${R2_ACCESS_KEY_ID:-}" ] || missing+=("R2_ACCESS_KEY_ID")
          [ -n "${R2_SECRET_ACCESS_KEY:-}" ] || missing+=("R2_SECRET_ACCESS_KEY")
          [ -n "${R2_BUCKET:-}" ] || missing+=("R2_BUCKET")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::OTA deploy missing required GitHub secrets: ${missing[*]}"
            exit 1
          fi

      - name: Deploy OTA assets to R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          : "${R2_ENDPOINT:?Missing R2_ENDPOINT}"
          : "${R2_ACCESS_KEY_ID:?Missing R2_ACCESS_KEY_ID}"
          : "${R2_SECRET_ACCESS_KEY:?Missing R2_SECRET_ACCESS_KEY}"
          : "${R2_BUCKET:?Missing R2_BUCKET}"

          R2_RELEASE_PREFIX="mobile-ota/releases/$RELEASE_ID"
          R2_RELEASE_URL="s3://$R2_BUCKET/$R2_RELEASE_PREFIX"
          R2_POINTER_KEY="mobile-ota/current-release.json"
          R2_POINTER_URL="s3://$R2_BUCKET/$R2_POINTER_KEY"

          # Upload release artifacts under a versioned prefix.
          # Pointer flip happens last for an atomic switch.

          if [ -d "$STAGING_DIR/bundles" ]; then
            aws s3 cp "$STAGING_DIR/bundles/" "$R2_RELEASE_URL/bundles/" \
              --recursive \
              --region auto \
              --endpoint-url "$R2_ENDPOINT" \
              --cache-control "public, immutable, max-age=31536000"
          fi

          if [ -d "$STAGING_DIR/assets" ]; then
            aws s3 cp "$STAGING_DIR/assets/" "$R2_RELEASE_URL/assets/" \
              --recursive \
              --region auto \
              --endpoint-url "$R2_ENDPOINT" \
              --cache-control "public, immutable, max-age=31536000"
          fi

          aws s3 cp "$STAGING_DIR/metadata.json" "$R2_RELEASE_URL/metadata.json" \
            --region auto \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "no-cache"

          POINTER_FILE="$RUNNER_TEMP/current-release.json"
          printf '{"releaseId":"%s"}\n' "$RELEASE_ID" > "$POINTER_FILE"
          aws s3 cp "$POINTER_FILE" "$R2_POINTER_URL" \
            --region auto \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "no-cache"

          echo "OTA update deployed: r2://$R2_BUCKET/$R2_RELEASE_PREFIX"
          echo "Current release pointer: r2://$R2_BUCKET/$R2_POINTER_KEY -> $RELEASE_ID"

  deploy-config:
    name: Deploy Config
    needs: [ci-gate]
    if: always() && needs.ci-gate.result == 'success' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 2
      - name: Check for config changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1...HEAD -- \
            deploy/Caddyfile \
            deploy/docker-compose.yml \
            deploy/otel-collector-config.yaml)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Config files changed:"
            echo "$CHANGED"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No config changes, skipping deploy"
          fi
      - name: Setup Terraform
        if: steps.changes.outputs.changed == 'true'
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
      - name: Setup SSH
        if: steps.changes.outputs.changed == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
      - name: Terraform Apply
        if: steps.changes.outputs.changed == 'true'
        working-directory: deploy/deploy-config
        env:
          TF_VAR_server_ip: ${{ secrets.SERVER_HOST }}
        run: |
          terraform init
          terraform apply -auto-approve

  docker:
    name: Docker (${{ matrix.target }})
    needs: [ci-gate]
    if: always() && needs.ci-gate.result == 'success' && github.ref == 'refs/heads/main'
    concurrency:
      group: docker
      cancel-in-progress: false
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: server
            suffix: ""
          - target: client
            suffix: "-client"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: COMMIT_HASH=${{ github.sha }}
          secrets: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
