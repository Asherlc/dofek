name: Docker Build & Push

on:
  push:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  wait-for-ci:
    name: Wait for CircleCI
    runs-on: ubuntu-latest
    permissions:
      statuses: read
    steps:
      - name: Wait for CircleCI checks to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          PATTERN="^ci/circleci:"
          MAX_WAIT=1800  # 30 minutes
          INTERVAL=30
          elapsed=0

          echo "Waiting for CircleCI statuses matching '$PATTERN' on $SHA"

          while [ $elapsed -lt $MAX_WAIT ]; do
            # Get all commit statuses (CircleCI reports via status API, not checks API)
            statuses=$(gh api "repos/$REPO/commits/$SHA/status" --jq '
              .statuses | map(select(.context | test("^ci/circleci:")))
            ')

            count=$(echo "$statuses" | jq 'length')
            if [ "$count" -eq 0 ]; then
              echo "No CircleCI statuses found yet, waiting ${INTERVAL}s... (${elapsed}s elapsed)"
              sleep $INTERVAL
              elapsed=$((elapsed + INTERVAL))
              continue
            fi

            pending=$(echo "$statuses" | jq '[.[] | select(.state == "pending")] | length')
            failed=$(echo "$statuses" | jq '[.[] | select(.state == "failure" or .state == "error")] | length')
            success=$(echo "$statuses" | jq '[.[] | select(.state == "success")] | length')

            echo "CircleCI statuses: $success success, $pending pending, $failed failed (of $count total)"

            if [ "$failed" -gt 0 ]; then
              echo "::error::CircleCI checks failed"
              echo "$statuses" | jq '.[] | select(.state == "failure" or .state == "error") | "\(.context): \(.state)"'
              exit 1
            fi

            if [ "$pending" -eq 0 ]; then
              echo "All $count CircleCI checks passed!"
              exit 0
            fi

            sleep $INTERVAL
            elapsed=$((elapsed + INTERVAL))
          done

          echo "::error::Timed out waiting for CircleCI checks after ${MAX_WAIT}s"
          exit 1

  docker:
    name: Docker (${{ matrix.target }})
    needs: [wait-for-ci]
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: server
            suffix: ""
          - target: client
            suffix: "-client"
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
