name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck all packages
        run: |
          pnpm tsc --noEmit &
          pid1=$!
          (cd packages/server && pnpm tsc --noEmit) &
          pid2=$!
          (cd packages/web && pnpm exec tsr generate && pnpm tsc --noEmit) &
          pid3=$!
          fail=0
          wait $pid1 || fail=1
          wait $pid2 || fail=1
          wait $pid3 || fail=1
          exit $fail

  knip:
    name: Knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm knip

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --project unit --coverage
        env:
          VITEST_COVERAGE_SKIP_THRESHOLDS: "true"
      - uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --project integration --coverage
        timeout-minutes: 10
        env:
          VITEST_COVERAGE_SKIP_THRESHOLDS: "true"
      - uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage/

  coverage:
    name: Coverage
    needs: [test-unit, test-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit
      - uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration
      - name: Merge and check coverage
        run: |
          npm install -g nyc
          mkdir -p .nyc_output
          cp coverage-unit/coverage-final.json .nyc_output/unit.json
          cp coverage-integration/coverage-final.json .nyc_output/integration.json
          nyc merge .nyc_output merged-coverage.json
          mkdir -p final-coverage
          cp merged-coverage.json final-coverage/coverage-final.json
          nyc report --temp-dir final-coverage --reporter=text-summary
          nyc check-coverage --temp-dir final-coverage \
            --lines 93.5 --branches 89 --functions 94.5 --statements 93.5

  test-mobile:
    name: Mobile Tests
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --project mobile

  build-mobile:
    name: Mobile Metro Bundle
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify iOS Metro bundle
        run: cd packages/mobile && pnpm expo export --platform ios --clear

  lint-ios-podspecs:
    name: iOS Podspec Lint
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate podspec deployment targets
        run: |
          APP_TARGET=$(python3 -c "import json; print(json.load(open('packages/mobile/app.json'))['expo']['ios']['deploymentTarget'])")
          echo "App deployment target: iOS $APP_TARGET"
          FAILED=0
          for spec in packages/mobile/modules/*/ios/*.podspec; do
            SPEC_TARGET=$(grep -oP "s\.platform\s*=\s*:ios,\s*'\K[^']+" "$spec")
            echo "  $(basename "$spec"): iOS $SPEC_TARGET"
            if [ "$(printf '%s\n' "$APP_TARGET" "$SPEC_TARGET" | sort -V | head -1)" != "$APP_TARGET" ]; then
              echo "  ERROR: podspec targets iOS $SPEC_TARGET which is below app target iOS $APP_TARGET"
              FAILED=1
            fi
          done
          exit $FAILED

  check-mobile-changes:
    name: Check Mobile Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- packages/mobile/)
            if [ -n "$CHANGED" ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "iOS files changed:"
              echo "$CHANGED"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No iOS changes detected, skipping native build"
            fi
          fi

  build-ios-native:
    name: iOS Native Build
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: packages/mobile/ios/Pods
          key: pods-${{ hashFiles('packages/mobile/ios/Podfile.lock') }}
          restore-keys: pods-
      - name: Install CocoaPods dependencies
        run: cd packages/mobile/ios && pod install
      - name: Build for simulator
        run: |
          xcodebuild build \
            -workspace packages/mobile/ios/Dofek.xcworkspace \
            -scheme Dofek \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20
        timeout-minutes: 20

  ios-gate:
    name: iOS Native Gate
    needs: [check-mobile-changes, test-mobile, build-mobile, lint-ios-podspecs, build-ios-native, test-swift]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check iOS job results
        run: |
          for result in \
            "${{ needs.check-mobile-changes.result }}" \
            "${{ needs.test-mobile.result }}" \
            "${{ needs.build-mobile.result }}" \
            "${{ needs.lint-ios-podspecs.result }}" \
            "${{ needs.build-ios-native.result }}" \
            "${{ needs.test-swift.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "An iOS job failed or was cancelled"
              exit 1
            fi
          done

  test-e2e-web:
    name: E2E Tests (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec cypress install
      - uses: docker/setup-buildx-action@v3
      - name: Build E2E images with cache
        uses: docker/bake-action@v5
        with:
          files: docker-compose.e2e.yml
          targets: |
            server
            client
          load: true
          set: |
            *.cache-from=type=gha,scope=e2e
            *.cache-to=type=gha,mode=max,scope=e2e
      - name: Start e2e stack
        run: docker compose -f docker-compose.e2e.yml up -d --wait --no-build
      - run: pnpm e2e:web:run
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore Stryker incremental cache
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-v2-${{ github.head_ref || 'main' }}-${{ github.sha }}
          restore-keys: |
            stryker-v2-${{ github.head_ref || 'main' }}-
            stryker-v2-main-
      - name: Get changed files
        if: github.event_name == 'pull_request'
        id: changed
        run: |
          # Filter to .ts source files, excluding tests, config, etc.
          # Also skip files with < 15 changed lines (trivial changes like import
          # additions, mechanical renames, or removing a column)
          CANDIDATES=$(git diff --name-only origin/main...HEAD \
            | { grep '\.ts$' || true; } \
            | { grep -v '\.test\.ts$' || true; } \
            | { grep -v '\.cy\.ts$' || true; } \
            | { grep -v 'test-helpers\.ts$' || true; } \
            | { grep -v '\.d\.ts$' || true; } \
            | { grep -v '\.gen\.ts$' || true; } \
            | { grep -v '\.config\.' || true; } \
            | { grep -v 'drizzle/' || true; } \
            | { grep -v 'src/db/schema\.ts$' || true; } \
            | { grep -v 'scripts/' || true; } \
            | { grep -v 'packages/mobile/' || true; })
          FILES=""
          for f in $CANDIDATES; do
            LINES=$(git diff --numstat origin/main...HEAD -- "$f" | awk '{print $1+$2}')
            if [ "$LINES" -ge 15 ]; then
              FILES="${FILES:+$FILES,}$f"
            fi
          done
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Mutating changed files: $FILES"
      - name: Run Stryker (changed files)
        if: github.event_name == 'pull_request' && steps.changed.outputs.files != ''
        run: pnpm test:mutation --mutate "${{ steps.changed.outputs.files }}"
      - name: Run Stryker (full suite)
        if: github.event_name == 'push'
        run: pnpm test:mutation
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 7

  test-swift:
    name: Swift Tests
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: packages/mobile/modules/health-kit/.build
          key: swift-build-v1-${{ hashFiles('packages/mobile/modules/health-kit/Package.swift') }}
          restore-keys: swift-build-v1-
      - name: Run Swift tests with coverage
        run: |
          cd packages/mobile/modules/health-kit
          bash scripts/check-coverage.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swift-coverage
          path: packages/mobile/modules/health-kit/.build/debug/codecov/
          retention-days: 7

  mutation-swift:
    name: Swift Mutation Testing
    needs: check-mobile-changes
    runs-on: macos-14
    if: github.event_name == 'pull_request' && needs.check-mobile-changes.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        with:
          path: packages/mobile/modules/health-kit/.build
          key: swift-build-v1-${{ hashFiles('packages/mobile/modules/health-kit/Package.swift') }}
          restore-keys: swift-build-v1-
      - name: Install Muter
        run: brew install muter-mutation-testing/formulae/muter
      - name: Get changed Swift files
        id: changed
        run: |
          # Filter to mutatable Swift source files, strip prefix for Muter's working directory
          CHANGED=$(git diff --name-only origin/main...HEAD \
            | { grep '\.swift$' || true; } \
            | { grep -v 'Tests/' || true; } \
            | { grep -v 'HealthKitModule.swift' || true; } \
            | { grep -v 'Package.swift' || true; } \
            | sed 's|^packages/mobile/modules/health-kit/||' \
            | tr '\n' ',' \
            | sed 's/,$//')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Mutating changed Swift files: $CHANGED"
      - name: Run Muter
        if: steps.changed.outputs.files != ''
        working-directory: packages/mobile/modules/health-kit
        timeout-minutes: 30
        run: |
          muter --files-to-mutate "${{ steps.changed.outputs.files }}" || {
            EXIT_CODE=$?
            # Exit 255 = "no mutatable code found" — expected for incremental runs
            # when changed files have no patterns Muter's operators can target
            if [ $EXIT_CODE -eq 255 ]; then
              echo "Muter found no mutatable code in changed files — skipping."
              exit 0
            fi
            exit $EXIT_CODE
          }
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: muter-report
          path: packages/mobile/modules/health-kit/muter_logs/
          retention-days: 7

  ios-release:
    name: iOS TestFlight
    needs: [lint, typecheck, knip, coverage, test-mobile, build-mobile]
    if: github.ref == 'refs/heads/main'
    runs-on: macos-15
    timeout-minutes: 60
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: packages/mobile/ios/Pods
          key: pods-${{ hashFiles('packages/mobile/ios/Podfile.lock') }}

      - name: Install CocoaPods
        run: cd packages/mobile/ios && pod install

      - name: Setup code signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Setup App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Set build number
        run: |
          cd packages/mobile/ios
          agvtool new-version -all ${{ github.run_number }}

      - name: Build archive
        run: |
          cd packages/mobile/ios
          xcodebuild archive \
            -workspace Dofek.xcworkspace \
            -scheme Dofek \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Dofek.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=68LEL35DQ9

      - name: Export & upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Dofek.xcarchive \
            -exportOptionsPlist packages/mobile/ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  ota-deploy:
    name: OTA Deploy
    needs: [lint, typecheck, knip, coverage, build-mobile]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Export iOS bundle
        run: cd packages/mobile && pnpm expo export --platform ios --clear

      - name: Generate metadata and stage release
        run: |
          RELEASE_DIR="$(date +%Y-%m-%d)-${GITHUB_SHA::8}"
          STAGING_DIR="$RUNNER_TEMP/ota/$RELEASE_DIR"
          mkdir -p "$STAGING_DIR/bundles" "$STAGING_DIR/assets"

          # Generate metadata.json
          node --experimental-transform-types scripts/generate-ota-metadata.ts \
            --dist packages/mobile/dist \
            --runtime-version 1.0 \
            --output "$STAGING_DIR/metadata.json"

          # Copy bundle files
          find packages/mobile/dist -name '*.hbc' -o -name '*.js' | while read -r f; do
            cp "$f" "$STAGING_DIR/bundles/"
          done

          # Copy asset files
          if [ -d packages/mobile/dist/assets ]; then
            cp packages/mobile/dist/assets/* "$STAGING_DIR/assets/" 2>/dev/null || true
          fi

          echo "RELEASE_DIR=$RELEASE_DIR" >> "$GITHUB_ENV"
          echo "STAGING_DIR=$STAGING_DIR" >> "$GITHUB_ENV"

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Upload release directory
          ssh root@"$SERVER_HOST" "mkdir -p /opt/dofek/updates/$RELEASE_DIR"
          scp -r "$STAGING_DIR"/* root@"$SERVER_HOST":/opt/dofek/updates/"$RELEASE_DIR"/

          # Atomic symlink switch
          ssh root@"$SERVER_HOST" "ln -sfn /opt/dofek/updates/$RELEASE_DIR /opt/dofek/updates/current"

          # Clean up old releases (keep last 10)
          ssh root@"$SERVER_HOST" 'cd /opt/dofek/updates && ls -dt 20*/ | tail -n +11 | xargs rm -rf'

          echo "OTA update deployed: $RELEASE_DIR"

  docker:
    name: Docker (${{ matrix.target }})
    needs: [lint, typecheck, knip, coverage, test-e2e-web, ios-gate]
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: docker
      cancel-in-progress: false
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: server
            suffix: ""
          - target: client
            suffix: "-client"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: COMMIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
