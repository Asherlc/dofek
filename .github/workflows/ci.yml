name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck all packages
        run: |
          pnpm tsc --noEmit &
          pid1=$!
          (cd packages/server && pnpm tsc --noEmit) &
          pid2=$!
          (cd packages/web && pnpm exec tsr generate && pnpm tsc --noEmit) &
          pid3=$!
          fail=0
          wait $pid1 || fail=1
          wait $pid2 || fail=1
          wait $pid3 || fail=1
          exit $fail

  knip:
    name: Knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm knip

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --project unit

  test-integration:
    name: Full Suite + Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --coverage
        timeout-minutes: 10

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec cypress install
      - name: Build and start e2e stack
        run: docker compose -f docker-compose.e2e.yml up -d --build --wait
      - run: pnpm e2e:run
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore Stryker incremental cache
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-${{ github.head_ref }}
          restore-keys: |
            stryker-main
      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/main...HEAD \
            | { grep '\.ts$' || true; } \
            | { grep -v '\.test\.ts$' || true; } \
            | { grep -v 'test-helpers\.ts$' || true; } \
            | { grep -v '\.d\.ts$' || true; } \
            | { grep -v '\.config\.' || true; } \
            | { grep -v 'drizzle/' || true; } \
            | { grep -v 'scripts/' || true; } \
            | { grep -v 'packages/ios/' || true; } \
            | tr '\n' ',' \
            | sed 's/,$//')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Mutating changed files: $FILES"
      - name: Run Stryker
        if: steps.changed.outputs.files != ''
        run: pnpm test:mutation --mutate "${{ steps.changed.outputs.files }}"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 7

  docker:
    name: Docker (${{ matrix.target }})
    needs: [lint, typecheck, knip, test-unit, test-integration]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: server
            suffix: ""
          - target: client
            suffix: "-client"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
