name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-web:
    uses: ./.github/workflows/build-web.yml
    secrets: inherit

  review-app-web:
    if: github.event_name == 'pull_request'
    needs: [build-web]
    uses: ./.github/workflows/review-app-web.yml
    secrets: inherit
