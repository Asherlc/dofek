name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  packages: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── CI ─────────────────────────────────────────────────────────────────

  build-mobile:
    name: Build Mobile
    uses: ./.github/workflows/build-mobile.yml
    secrets: inherit

  build-web:
    name: Build Web
    uses: ./.github/workflows/build-web.yml
    secrets: inherit

  test:
    name: Test
    uses: ./.github/workflows/test.yml
    secrets: inherit

  ci-gate:
    name: CI Gate
    needs: [build-mobile, build-web, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all CI results
        run: |
          for result in \
            "${{ needs.build-mobile.result }}" \
            "${{ needs.build-web.result }}" \
            "${{ needs.test.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "CI gate failed"
              exit 1
            fi
          done
      - name: Link triggered deploys
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          {
            echo "## Triggered Deploys"
            echo ""
            echo "- [Deploy Web](${REPO_URL}/actions/workflows/deploy-web.yml)"
            echo "- [Deploy iOS](${REPO_URL}/actions/workflows/deploy-ios.yml)"
            echo "- [Deploy OTA](${REPO_URL}/actions/workflows/deploy-ota.yml)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Docker image (main only, after CI passes) ─────────────────────────

  docker:
    name: Docker Build & Push
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,value=${{ github.sha }}
            type=raw,value=latest
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: server
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: COMMIT_HASH=${{ github.sha }}
          secrets: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  # ── Review apps (PR only, depend on builds not tests) ──────────────────

  build-storybook:
    name: Build Storybook
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/build-storybook.yml
    secrets: inherit

  # TODO: enable once dofek-web-previews R2 bucket is created
  # review-app-web:
  #   name: Review App — Web
  #   if: github.event_name == 'pull_request'
  #   needs: [build-web]
  #   uses: ./.github/workflows/review-app-web.yml
  #   secrets: inherit

  review-app-storybook:
    name: Review App — Storybook
    if: github.event_name == 'pull_request'
    needs: [build-storybook]
    uses: ./.github/workflows/review-app-storybook.yml
    secrets: inherit
