name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck all packages
        run: |
          pnpm tsc --noEmit &
          pid1=$!
          (cd packages/server && pnpm tsc --noEmit) &
          pid2=$!
          (cd packages/web && pnpm exec tsr generate && pnpm tsc --noEmit) &
          pid3=$!
          fail=0
          wait $pid1 || fail=1
          wait $pid2 || fail=1
          wait $pid3 || fail=1
          exit $fail

  knip:
    name: Knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm knip

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --project unit --reporter=blob --coverage.enabled --coverage.reporter=json --coverage.thresholds.lines=0 --coverage.thresholds.functions=0 --coverage.thresholds.branches=0 --coverage.thresholds.statements=0
      - run: mv .vitest-reports/blob.json .vitest-reports/unit.json
      - uses: actions/upload-artifact@v4
        with:
          name: blob-unit
          path: .vitest-reports/
          include-hidden-files: true
          retention-days: 1

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --project integration --reporter=blob --coverage.enabled --coverage.reporter=json --coverage.thresholds.lines=0 --coverage.thresholds.functions=0 --coverage.thresholds.branches=0 --coverage.thresholds.statements=0
        timeout-minutes: 10
      - run: mv .vitest-reports/blob.json .vitest-reports/integration.json
      - uses: actions/upload-artifact@v4
        with:
          name: blob-integration
          path: .vitest-reports/
          include-hidden-files: true
          retention-days: 1

  coverage:
    name: Coverage
    needs: [test-unit, test-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          pattern: blob-*
          path: .vitest-reports/
          merge-multiple: true
      - run: pnpm exec vitest --merge-reports --coverage

  test-ios:
    name: iOS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run --project ios

  build-ios:
    name: iOS Metro Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify iOS Metro bundle
        run: cd packages/ios && pnpm expo export --platform ios --clear

  check-ios-changes:
    name: Check iOS Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for iOS file changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          else
            BASE="HEAD~1"
          fi
          if git diff --name-only "$BASE"...HEAD | grep -q '^packages/ios/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-ios-native:
    name: iOS Xcode Build
    needs: check-ios-changes
    if: needs.check-ios-changes.outputs.changed == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prebuild and install pods
        run: |
          cd packages/ios
          npx expo prebuild --no-install
          cd ios && pod install
      - name: Lint podspecs
        run: |
          for spec in packages/ios/modules/*/ios/*.podspec; do
            echo "Linting $spec"
            pod lib lint "$spec" --quick --allow-warnings
          done
      - name: Build for simulator
        run: |
          cd packages/ios/ios
          xcodebuild build \
            -workspace Dofek.xcworkspace \
            -scheme Dofek \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            -quiet

  test-e2e-web:
    name: E2E Tests (Web)
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Parallel setup — Docker build + deps install
        run: |
          docker compose -f docker-compose.e2e.yml build &
          DOCKER_PID=$!
          pnpm install --frozen-lockfile
          pnpm exec cypress install
          wait $DOCKER_PID
      - name: Start e2e stack
        run: docker compose -f docker-compose.e2e.yml up -d --wait
      - run: pnpm e2e:web:run
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore Stryker incremental cache
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-v2-${{ github.head_ref }}-${{ github.sha }}
          restore-keys: |
            stryker-v2-${{ github.head_ref }}-
            stryker-v2-main
      - name: Get changed files
        id: changed
        run: |
          # Filter to .ts source files, excluding tests, config, etc.
          # Also skip files with < 15 changed lines (trivial changes like import
          # additions, mechanical renames, or removing a column)
          CANDIDATES=$(git diff --name-only origin/main...HEAD \
            | { grep '\.ts$' || true; } \
            | { grep -v '\.test\.ts$' || true; } \
            | { grep -v '\.cy\.ts$' || true; } \
            | { grep -v 'test-helpers\.ts$' || true; } \
            | { grep -v '\.d\.ts$' || true; } \
            | { grep -v '\.gen\.ts$' || true; } \
            | { grep -v '\.config\.' || true; } \
            | { grep -v 'drizzle/' || true; } \
            | { grep -v 'src/db/schema\.ts$' || true; } \
            | { grep -v 'scripts/' || true; } \
            | { grep -v 'packages/ios/' || true; })
          FILES=""
          for f in $CANDIDATES; do
            LINES=$(git diff --numstat origin/main...HEAD -- "$f" | awk '{print $1+$2}')
            if [ "$LINES" -ge 15 ]; then
              FILES="${FILES:+$FILES,}$f"
            fi
          done
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Mutating changed files: $FILES"
      - name: Run Stryker
        if: steps.changed.outputs.files != ''
        run: pnpm test:mutation --mutate "${{ steps.changed.outputs.files }}"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 7

  docker:
    name: Docker (${{ matrix.target }})
    needs: [lint, typecheck, knip, coverage, test-e2e-web, test-ios, build-ios]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: server
            suffix: ""
          - target: client
            suffix: "-client"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: COMMIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
