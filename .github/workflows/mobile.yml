name: Mobile

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check-mobile-changes:
    name: Check Mobile Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- packages/mobile/)
            if [ -n "$CHANGED" ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "iOS files changed:"
              echo "$CHANGED"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No iOS changes detected, skipping native build"
            fi
          fi

  test-mobile:
    name: Mobile Tests
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm exec vitest run --project mobile

  build-mobile:
    name: Mobile Metro Bundle
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Verify iOS Metro bundle
        run: cd packages/mobile && pnpm expo export --platform ios --clear

  lint-ios-podspecs:
    name: iOS Podspec Lint
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Validate podspec deployment targets
        run: |
          APP_TARGET=$(python3 -c "import json; print(json.load(open('packages/mobile/app.json'))['expo']['ios']['deploymentTarget'])")
          echo "App deployment target: iOS $APP_TARGET"
          FAILED=0
          for spec in packages/mobile/modules/*/ios/*.podspec; do
            SPEC_TARGET=$(grep -oP "s\.platform\s*=\s*:ios,\s*'\K[^']+" "$spec")
            echo "  $(basename "$spec"): iOS $SPEC_TARGET"
            if [ "$(printf '%s\n' "$APP_TARGET" "$SPEC_TARGET" | sort -V | head -1)" != "$APP_TARGET" ]; then
              echo "  ERROR: podspec targets iOS $SPEC_TARGET which is below app target iOS $APP_TARGET"
              FAILED=1
            fi
          done
          exit $FAILED

  build-ios-native:
    name: iOS Native Build
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Download Sentry XCFramework
        run: packages/mobile/scripts/download-sentry-xcframework.sh
      - name: Cache CocoaPods
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/mobile/ios/Pods
          key: pods-v6-${{ hashFiles('packages/mobile/ios/Podfile', 'packages/mobile/ios/Podfile.lock', 'packages/mobile/scripts/download-sentry-xcframework.sh') }}
          restore-keys: pods-v6-
      - name: Install CocoaPods dependencies
        run: cd packages/mobile/ios && pod install
      - name: Set build number
        if: github.ref == 'refs/heads/main'
        run: |
          cd packages/mobile/ios
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Archive (Release, no signing)
        env:
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace packages/mobile/ios/Dofek.xcworkspace \
            -scheme Dofek \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Dofek.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tail -40
        timeout-minutes: 25

  build-watchos:
    name: watchOS Build
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Build Watch target for simulator
        run: |
          xcodebuild build \
            -project packages/mobile/ios/Dofek.xcodeproj \
            -target DofekWatch \
            -sdk watchsimulator \
            -configuration Debug \
            -destination 'generic/platform=watchOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20
        timeout-minutes: 5

  test-swift:
    name: Swift Tests
    needs: check-mobile-changes
    if: needs.check-mobile-changes.outputs.changed == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/mobile/modules/health-kit/.build
          key: swift-build-v1-${{ hashFiles('packages/mobile/modules/health-kit/Package.swift') }}
          restore-keys: swift-build-v1-
      - name: Run Swift tests with coverage
        run: |
          cd packages/mobile/modules/health-kit
          bash scripts/check-coverage.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: swift-coverage
          path: packages/mobile/modules/health-kit/.build/debug/codecov/
          retention-days: 7

  mutation-swift:
    name: Swift Mutation Testing
    needs: check-mobile-changes
    runs-on: macos-14
    if: github.event_name == 'pull_request' && needs.check-mobile-changes.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/mobile/modules/health-kit/.build
          key: swift-build-v1-${{ hashFiles('packages/mobile/modules/health-kit/Package.swift') }}
          restore-keys: swift-build-v1-
      - name: Install Muter
        run: brew install muter-mutation-testing/formulae/muter
      - name: Get changed Swift files
        id: changed
        run: |
          # Filter to mutatable Swift source files, strip prefix for Muter's working directory
          CHANGED=$(git diff --name-only origin/main...HEAD \
            | { grep '\.swift$' || true; } \
            | { grep -v 'Tests/' || true; } \
            | { grep -v 'HealthKitModule.swift' || true; } \
            | { grep -v 'Package.swift' || true; } \
            | sed 's|^packages/mobile/modules/health-kit/||' \
            | tr '\n' ',' \
            | sed 's/,$//')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Mutating changed Swift files: $CHANGED"
      - name: Run Muter
        if: steps.changed.outputs.files != ''
        working-directory: packages/mobile/modules/health-kit
        timeout-minutes: 30
        run: |
          muter --files-to-mutate "${{ steps.changed.outputs.files }}" || {
            EXIT_CODE=$?
            # Exit 255 = "no mutatable code found" — expected for incremental runs
            # when changed files have no patterns Muter's operators can target
            if [ $EXIT_CODE -eq 255 ]; then
              echo "Muter found no mutatable code in changed files — skipping."
              exit 0
            fi
            exit $EXIT_CODE
          }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: muter-report
          path: packages/mobile/modules/health-kit/muter_logs/
          retention-days: 7

  gate:
    name: iOS & watchOS
    needs: [check-mobile-changes, test-mobile, build-mobile, lint-ios-podspecs, build-ios-native, build-watchos, test-swift, mutation-swift]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          for result in \
            "${{ needs.check-mobile-changes.result }}" \
            "${{ needs.test-mobile.result }}" \
            "${{ needs.build-mobile.result }}" \
            "${{ needs.lint-ios-podspecs.result }}" \
            "${{ needs.build-ios-native.result }}" \
            "${{ needs.build-watchos.result }}" \
            "${{ needs.test-swift.result }}" \
            "${{ needs.mutation-swift.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required job failed or was cancelled"
              exit 1
            fi
          done
