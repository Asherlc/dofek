name: Semgrep

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Run project-specific rules (blocking)
        run: semgrep scan --config .semgrep/ --error --sarif --output semgrep-custom.sarif
      - name: Run community rules (informational)
        if: always()
        run: semgrep scan --config auto --sarif --output semgrep-auto.sarif || true
      - name: Merge SARIF results
        if: always()
        run: |
          # Upload whichever SARIF files exist
          if [ -f semgrep-custom.sarif ]; then cp semgrep-custom.sarif semgrep.sarif; fi
      - uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3 # v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true
