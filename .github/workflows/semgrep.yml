name: Semgrep

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Run project-specific rules (blocking)
        run: semgrep scan --config .semgrep/ --error
      - name: Run community rules (informational)
        if: always()
        run: semgrep scan --config auto --sarif --output semgrep.sarif || true
      - uses: github/codeql-action/upload-sarif@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3 # v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true
