name: Deploy Infra Compose

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to workflow ref HEAD)"
        required: false
        type: string

jobs:
  infra-compose:
    name: Deploy Infra Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_wrapper: false
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Copy compose and config to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          scp deploy/docker-compose.deploy.yml "root@${SERVER_HOST}:/opt/dofek/"
          scp deploy/otel-collector-config.yaml "root@${SERVER_HOST}:/opt/dofek/"
      - name: Deploy infra services
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh "root@${SERVER_HOST}" bash -s <<'DEPLOY'
            set -euo pipefail
            cd /opt/dofek

            # Pull updated infra images
            docker compose --env-file .env.prod --env-file .env.deploy \
              -f docker-compose.deploy.yml pull \
              db redis collector ota db-backup traefik portainer netdata

            # Recreate only changed infra services (web/worker use rollout separately)
            docker compose --env-file .env.prod --env-file .env.deploy \
              -f docker-compose.deploy.yml up -d \
              db redis collector ota db-backup traefik portainer netdata
          DEPLOY
      - name: Wait for DB and upgrade extension
        env:
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set -euo pipefail
          echo "Waiting for DB to accept connections..."
          for attempt in $(seq 1 30); do
            if ssh "root@${SERVER_HOST}" "docker exec dofek-db pg_isready -U health -d health" 2>/dev/null; then
              echo "DB is ready"
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "::error::DB not ready after 60s"
              exit 1
            fi
            echo "Attempt $attempt/30 - waiting..."
            sleep 2
          done

          # Open SSH tunnel for Terraform DB access
          ssh -f -N -L 5432:127.0.0.1:5432 "root@${SERVER_HOST}"

          cd deploy/db
          terraform init
          terraform apply -auto-approve
