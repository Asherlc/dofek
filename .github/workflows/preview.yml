name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
  schedule:
    # Safety net: clean up orphaned preview servers daily at 03:00 UTC
    - cron: '0 3 * * *'

concurrency:
  group: preview-${{ github.event.number || 'cleanup' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # R2 credentials for Terraform S3 backend (state persistence)
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT }}

jobs:
  # ── Build PR-tagged Docker images ──────────────────────────────────────

  build-images:
    name: Build Docker
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=pr-${{ github.event.number }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: server
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: COMMIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=server-pr
          cache-to: type=gha,mode=max,scope=server-pr

  # ── Deploy preview server ──────────────────────────────────────────────

  deploy:
    name: Deploy Preview
    needs: [build-images]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      preview_url: ${{ steps.apply.outputs.preview_url }}
      server_ip: ${{ steps.apply.outputs.server_ip }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: deploy/preview
        run: terraform init

      - name: Select Workspace
        working-directory: deploy/preview
        run: terraform workspace select -or-create pr-${{ github.event.number }}

      - name: Terraform Apply
        id: apply
        working-directory: deploy/preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform apply -auto-approve \
            -var="pr_number=${{ github.event.number }}" \
            -var="server_image_tag=pr-${{ github.event.number }}" \
            -var="commit_sha=${{ github.sha }}" \
            -var="hcloud_token=${{ secrets.HCLOUD_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
            -var="ghcr_username=${{ github.repository_owner }}" \
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}"

          echo "preview_url=$(terraform output -raw preview_url)" >> "$GITHUB_OUTPUT"
          echo "server_ip=$(terraform output -raw server_ip)" >> "$GITHUB_OUTPUT"

      - name: Wait for Server Ready
        env:
          SERVER_IP: ${{ steps.apply.outputs.server_ip }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_NAME: dofek-preview-pr-${{ github.event.number }}
        run: |
          URL="${{ steps.apply.outputs.preview_url }}"
          echo "=== Preview Health Check ==="
          echo "Server: $SERVER_NAME ($SERVER_IP)"
          echo "URL:    $URL"
          echo ""

          HETZNER_API="https://api.hetzner.cloud/v1"
          AUTH="Authorization: Bearer $HCLOUD_TOKEN"

          # Get the server ID for actions API
          SERVER_ID="$(curl -sf -H "$AUTH" "$HETZNER_API/servers?name=$SERVER_NAME" | jq -r '.servers[0].id // empty')"
          echo "Hetzner server ID: $SERVER_ID"
          echo ""

          prev_step=""
          for i in $(seq 1 60); do
            # 1. Check HTTP health — are we done?
            http="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 "$URL/healthz" 2>/dev/null || echo 000)"
            if [ "$http" -ge 200 ] && [ "$http" -lt 400 ]; then
              echo "✓ Server is ready (HTTP $http)"
              exit 0
            fi

            # 2. Read cloud-init step from server labels
            server_json="$(curl -sf -H "$AUTH" "$HETZNER_API/servers/$SERVER_ID" 2>/dev/null)"
            ci_step="$(echo "$server_json" | jq -r '.server.labels.cloud_init // "pending"')"
            hetzner_status="$(echo "$server_json" | jq -r '.server.status // "unknown"')"

            # 3. Read latest Hetzner action (create_server, start_server, etc.)
            latest_action="$(curl -sf -H "$AUTH" "$HETZNER_API/servers/$SERVER_ID/actions?sort=started:desc&per_page=1" 2>/dev/null \
              | jq -r '.actions[0] | "\(.command) \(.status) \(.progress)%"' 2>/dev/null || echo "unknown")"

            # Only log when something changes, or every 5th attempt
            if [ "$ci_step" != "$prev_step" ] || (( i % 5 == 0 )); then
              echo "[$(date -u +%H:%M:%S)] server=$hetzner_status | cloud-init=$ci_step | action=$latest_action | HTTP=$http"
              prev_step="$ci_step"
            fi

            # Fail fast on cloud-init failure
            if [ "$ci_step" = "failed" ]; then
              echo ""
              echo "::error::cloud-init reported failure"

              # Read failure_reason label
              reason="$(echo "$server_json" | jq -r '.server.labels.failure_reason // "unknown"')"
              echo "Failure reason: $reason"
              echo ""

              # Try to fetch full diagnostics via Hetzner API (server metadata)
              echo "=== Server Actions ==="
              curl -sf -H "$AUTH" "$HETZNER_API/servers/$SERVER_ID/actions?sort=started:desc&per_page=5" 2>/dev/null \
                | jq -r '.actions[] | "[" + .started + "] " + .command + " " + .status + " " + (.progress|tostring) + "%"' 2>/dev/null || echo "  (unavailable)"

              exit 1
            fi
            sleep 10
          done

          echo ""
          echo "::error::Server did not become reachable within 10 minutes"
          echo "Final state: server=$hetzner_status | cloud-init=$ci_step"
          echo ""
          echo "=== Server Actions ==="
          curl -sf -H "$AUTH" "$HETZNER_API/servers/$SERVER_ID/actions?sort=started:desc&per_page=5" 2>/dev/null \
            | jq -r '.actions[] | "[" + .started + "] " + .command + " " + .status + " " + (.progress|tostring) + "%"' 2>/dev/null || echo "  (unavailable)"
          exit 1

      - name: Comment PR with Preview URL
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          issue-number: ${{ github.event.number }}
          body: |
            ## Preview Environment

            | | |
            |---|---|
            | **URL** | ${{ steps.apply.outputs.preview_url }} |
            | **Login** | ${{ steps.apply.outputs.preview_url }}/auth/dev-login |
            | **Server** | `${{ steps.apply.outputs.server_ip }}` |
            | **Commit** | ${{ github.sha }} |

            > Use the login URL above to mint the seeded `dev-session` cookie for the preview database.
            > _(Email+password login for previews is on the [roadmap](../blob/main/README.md#authentication-follow-ups))_

  # ── Publish mobile OTA update for PR ──────────────────────────────────

  publish-mobile-ota:
    name: Publish Mobile OTA
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      # 5 preview slots: each PR gets a deterministic slot so multiple PRs
      # can be tested in parallel on different preview build variants.
      PREVIEW_SLOTS: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Assign preview slot
        id: slot
        run: |
          SLOT=$(( (${{ github.event.number }} % $PREVIEW_SLOTS) + 1 ))
          echo "number=$SLOT" >> "$GITHUB_OUTPUT"
          echo "channel=preview-$SLOT" >> "$GITHUB_OUTPUT"
          echo "PR #${{ github.event.number }} → preview slot $SLOT (channel: preview-$SLOT)"

      - name: Publish OTA to PR branch
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eoas@2.3.16 publish \
            --branch "pr-${{ github.event.number }}" \
            --platform ios \
            --nonInteractive \
            --message "PR #${{ github.event.number }}: ${{ github.event.pull_request.title }}"

      - name: Map preview channel to PR branch
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CHANNEL: ${{ steps.slot.outputs.channel }}
        run: |
          # Point this slot's channel at the PR branch so the matching
          # preview build variant picks up the update.
          npx eas-cli@latest channel:edit "$CHANNEL" \
            --branch "pr-${{ github.event.number }}" \
            --non-interactive 2>/dev/null || \
          npx eas-cli@latest channel:create "$CHANNEL" \
            --branch "pr-${{ github.event.number }}" \
            --non-interactive 2>/dev/null || true

      - name: Comment PR with Mobile Preview Info
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          issue-number: ${{ github.event.number }}
          body: |
            ## Mobile Preview

            | | |
            |---|---|
            | **Preview Slot** | `${{ steps.slot.outputs.number }}` of ${{ env.PREVIEW_SLOTS }} |
            | **Channel** | `${{ steps.slot.outputs.channel }}` |
            | **OTA Branch** | `pr-${{ github.event.number }}` |
            | **Deep Link** | `dofek://preview/pr-${{ github.event.number }}` |
            | **Commit** | ${{ github.sha }} |

            **To test on device:**
            1. Install **Dofek Preview ${{ steps.slot.outputs.number }}** on your iOS device (if not already installed)
            2. Tap deep link: `dofek://preview/pr-${{ github.event.number }}`
            3. The app checks for the PR update and reloads automatically

            > Each preview slot is a separate app (`com.dofek.preview-${{ steps.slot.outputs.number }}`).
            > Multiple PRs can be tested in parallel using different slots.

  # ── Teardown on PR close ───────────────────────────────────────────────

  teardown:
    name: Teardown Preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: deploy/preview
        run: terraform init

      - name: Select Workspace
        working-directory: deploy/preview
        run: |
          terraform workspace select pr-${{ github.event.number }} || {
            echo "Workspace pr-${{ github.event.number }} not found — nothing to tear down"
            exit 0
          }

      - name: Terraform Destroy
        working-directory: deploy/preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform destroy -auto-approve \
            -var="pr_number=${{ github.event.number }}" \
            -var="server_image_tag=pr-${{ github.event.number }}" \
            -var="commit_sha=destroy" \
            -var="hcloud_token=${{ secrets.HCLOUD_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
            -var="ghcr_username=${{ github.repository_owner }}" \
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}"

      - name: Delete Workspace
        working-directory: deploy/preview
        run: |
          terraform workspace select default
          terraform workspace delete pr-${{ github.event.number }} || true

      - name: Delete PR Docker Images
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const suffixes = [''];
            for (const suffix of suffixes) {
              const packageName = `dofek${suffix}`;
              try {
                const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                  package_type: 'container',
                  package_name: packageName,
                  username: context.repo.owner,
                  per_page: 100,
                });
                for (const version of versions.data) {
                  if (version.metadata?.container?.tags?.includes(`pr-${{ github.event.number }}`)) {
                    await github.rest.packages.deletePackageVersionForUser({
                      package_type: 'container',
                      package_name: packageName,
                      username: context.repo.owner,
                      package_version_id: version.id,
                    });
                    console.log(`Deleted ${packageName}:pr-${{ github.event.number }}`);
                  }
                }
              } catch (error) {
                console.log(`Skipping ${packageName} cleanup: ${error.message}`);
              }
            }

  # ── Clean up OTA branch on PR close ────────────────────────────────────

  cleanup-mobile-ota:
    name: Cleanup Mobile OTA
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Delete OTA branch
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Best-effort cleanup — branch may not exist if OTA was never published
          npx eas-cli@latest branch:delete "pr-${{ github.event.number }}" \
            --non-interactive 2>/dev/null || true

  # ── Scheduled cleanup (safety net for orphaned servers) ────────────────

  cleanup:
    name: Cleanup Orphaned Previews
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: deploy/preview
        run: terraform init

      - name: Destroy Orphaned Environments
        working-directory: deploy/preview
        env:
          GH_TOKEN: ${{ github.token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          # List all Hetzner servers with the preview label
          # Use hcloud CLI via Docker since it's not installed
          SERVERS=$(docker run --rm -e HCLOUD_TOKEN hetznercloud/cli server list -l purpose=preview -o columns=name,created -o noheader 2>/dev/null || true)

          if [ -z "$SERVERS" ]; then
            echo "No preview servers found"
            exit 0
          fi

          echo "Found preview servers:"
          echo "$SERVERS"

          CUTOFF=$(date -u -d '72 hours ago' +%s 2>/dev/null || date -u -v-72H +%s)

          echo "$SERVERS" | while read -r name created_at; do
            SERVER_TS=$(date -u -d "$created_at" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%S" "$created_at" +%s)
            if [ "$SERVER_TS" -lt "$CUTOFF" ]; then
              PR_NUM=$(echo "$name" | sed 's/dofek-preview-pr-//')
              PR_STATE="$(gh pr view "$PR_NUM" --json state --jq .state 2>/dev/null || echo "MISSING")"

              if [ "$PR_STATE" = "OPEN" ]; then
                echo "PR #$PR_NUM is still open — keeping $name"
                continue
              fi

              echo "Server $name is older than 72h and PR state is $PR_STATE — destroying"

              # Try Terraform destroy first (clean path)
              if terraform workspace select "pr-$PR_NUM" 2>/dev/null; then
                terraform destroy -auto-approve \
                  -var="pr_number=$PR_NUM" \
                  -var="server_image_tag=pr-$PR_NUM" \
                  -var="commit_sha=cleanup" \
                  -var="hcloud_token=${{ secrets.HCLOUD_TOKEN }}" \
                  -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
                  -var="ghcr_username=${{ github.repository_owner }}" \
                  -var="ghcr_token=${{ secrets.GHCR_TOKEN }}" && \
                terraform workspace select default && \
                terraform workspace delete "pr-$PR_NUM" || true
              else
                # Fallback: workspace missing — delete resources directly
                echo "No Terraform workspace for pr-$PR_NUM — deleting server directly"
                docker run --rm -e HCLOUD_TOKEN hetznercloud/cli server delete "$name" || true
                # DNS record cleanup via Cloudflare API
                ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"
                RECORD_ID=$(curl -sf -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
                  "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=pr-${PR_NUM}.preview.dofek.fit&type=A" \
                  | jq -r '.result[0].id // empty')
                if [ -n "$RECORD_ID" ]; then
                  curl -sf -X DELETE -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
                    "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}" || true
                  echo "Deleted DNS record for pr-${PR_NUM}.preview.dofek.fit"
                fi
              fi
            else
              echo "Server $name is still within 72h — keeping"
            fi
          done
