name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
  schedule:
    # Safety net: clean up orphaned preview servers daily at 03:00 UTC
    - cron: '0 3 * * *'

concurrency:
  group: preview-${{ github.event.number || 'cleanup' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # R2 credentials for Terraform S3 backend (state persistence)
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT }}

jobs:
  # ── Build PR-tagged Docker images ──────────────────────────────────────

  build-images:
    name: Build Docker
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=pr-${{ github.event.number }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: server
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: COMMIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=server-pr
          cache-to: type=gha,mode=max,scope=server-pr

  # ── Deploy preview server ──────────────────────────────────────────────

  deploy:
    name: Deploy Preview
    needs: [build-images]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      preview_url: ${{ steps.apply.outputs.preview_url }}
      server_ip: ${{ steps.apply.outputs.server_ip }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: deploy/preview
        run: terraform init

      - name: Select Workspace
        working-directory: deploy/preview
        run: terraform workspace select -or-create pr-${{ github.event.number }}

      - name: Terraform Apply
        id: apply
        working-directory: deploy/preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform apply -auto-approve \
            -var="pr_number=${{ github.event.number }}" \
            -var="server_image_tag=pr-${{ github.event.number }}" \
            -var="hcloud_token=${{ secrets.HCLOUD_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
            -var="ghcr_username=${{ github.repository_owner }}" \
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

          echo "preview_url=$(terraform output -raw preview_url)" >> "$GITHUB_OUTPUT"
          echo "server_ip=$(terraform output -raw server_ip)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_IP: ${{ steps.apply.outputs.server_ip }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          for attempt in 1 2 3; do
            tmp="$(mktemp)"
            if ssh-keyscan -T 10 -H "$SERVER_IP" > "$tmp" 2>/dev/null && [ -s "$tmp" ]; then
              mv "$tmp" ~/.ssh/known_hosts
              break
            fi
            rm -f "$tmp"
            echo "ssh-keyscan attempt $attempt, retrying..."
            sleep 10
          done

      - name: Redeploy services
        env:
          SERVER_IP: ${{ steps.apply.outputs.server_ip }}
        run: |
          # Pull latest images and restart services.
          # Idempotent: on first deploy cloud-init already started services,
          # on subsequent pushes this pulls the new PR-tagged image and recreates.
          ssh root@"$SERVER_IP" bash -s <<'SCRIPT'
            set -euo pipefail
            cd /opt/dofek

            # Wait for Docker to be installed (cloud-init may still be running on first deploy)
            for i in $(seq 1 30); do
              if command -v docker &>/dev/null; then break; fi
              echo "Waiting for Docker install (attempt $i/30)..."
              sleep 10
            done

            docker compose pull --quiet
            docker compose up -d --remove-orphans --force-recreate
          SCRIPT

      - name: Wait for Server Ready
        run: |
          URL="${{ steps.apply.outputs.preview_url }}"
          echo "Waiting for $URL to become reachable..."
          for i in $(seq 1 60); do
            status="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 "$URL/healthz" 2>/dev/null || echo 000)"
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "Server is ready (HTTP $status)!"
              exit 0
            fi
            echo "Attempt $i/60 — got HTTP $status, waiting 10s..."
            sleep 10
          done
          echo "::warning::Server did not become reachable within 10 minutes"

      - name: Comment PR with Preview URL
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          issue-number: ${{ github.event.number }}
          body: |
            ## Preview Environment

            | | |
            |---|---|
            | **URL** | ${{ steps.apply.outputs.preview_url }} |
            | **Login** | ${{ steps.apply.outputs.preview_url }}/auth/dev-login |
            | **Server** | `${{ steps.apply.outputs.server_ip }}` |
            | **Commit** | ${{ github.sha }} |

            > Use the login URL above to mint the seeded `dev-session` cookie for the preview database.
            > _(Email+password login for previews is on the [roadmap](../blob/main/README.md#authentication-follow-ups))_

  # ── Teardown on PR close ───────────────────────────────────────────────

  teardown:
    name: Teardown Preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: deploy/preview
        run: terraform init

      - name: Select Workspace
        working-directory: deploy/preview
        run: |
          terraform workspace select pr-${{ github.event.number }} || {
            echo "Workspace pr-${{ github.event.number }} not found — nothing to tear down"
            exit 0
          }

      - name: Terraform Destroy
        working-directory: deploy/preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          terraform destroy -auto-approve \
            -var="pr_number=${{ github.event.number }}" \
            -var="server_image_tag=pr-${{ github.event.number }}" \
            -var="hcloud_token=${{ secrets.HCLOUD_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
            -var="ghcr_username=${{ github.repository_owner }}" \
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Delete Workspace
        working-directory: deploy/preview
        run: |
          terraform workspace select default
          terraform workspace delete pr-${{ github.event.number }} || true

      - name: Delete PR Docker Images
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const suffixes = [''];
            for (const suffix of suffixes) {
              const packageName = `dofek${suffix}`;
              try {
                const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                  package_type: 'container',
                  package_name: packageName,
                  username: context.repo.owner,
                  per_page: 100,
                });
                for (const version of versions.data) {
                  if (version.metadata?.container?.tags?.includes(`pr-${{ github.event.number }}`)) {
                    await github.rest.packages.deletePackageVersionForUser({
                      package_type: 'container',
                      package_name: packageName,
                      username: context.repo.owner,
                      package_version_id: version.id,
                    });
                    console.log(`Deleted ${packageName}:pr-${{ github.event.number }}`);
                  }
                }
              } catch (error) {
                console.log(`Skipping ${packageName} cleanup: ${error.message}`);
              }
            }

  # ── Scheduled cleanup (safety net for orphaned servers) ────────────────

  cleanup:
    name: Cleanup Orphaned Previews
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: deploy/preview
        run: terraform init

      - name: Destroy Orphaned Environments
        working-directory: deploy/preview
        env:
          GH_TOKEN: ${{ github.token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          # List all Hetzner servers with the preview label
          # Use hcloud CLI via Docker since it's not installed
          SERVERS=$(docker run --rm -e HCLOUD_TOKEN hetznercloud/cli server list -l purpose=preview -o columns=name,created -o noheader 2>/dev/null || true)

          if [ -z "$SERVERS" ]; then
            echo "No preview servers found"
            exit 0
          fi

          echo "Found preview servers:"
          echo "$SERVERS"

          CUTOFF=$(date -u -d '72 hours ago' +%s 2>/dev/null || date -u -v-72H +%s)

          echo "$SERVERS" | while read -r name created_at; do
            SERVER_TS=$(date -u -d "$created_at" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%S" "$created_at" +%s)
            if [ "$SERVER_TS" -lt "$CUTOFF" ]; then
              PR_NUM=$(echo "$name" | sed 's/dofek-preview-pr-//')
              PR_STATE="$(gh pr view "$PR_NUM" --json state --jq .state 2>/dev/null || echo "MISSING")"

              if [ "$PR_STATE" = "OPEN" ]; then
                echo "PR #$PR_NUM is still open — keeping $name"
                continue
              fi

              echo "Server $name is older than 72h and PR state is $PR_STATE — destroying"

              # Try Terraform destroy first (clean path)
              if terraform workspace select "pr-$PR_NUM" 2>/dev/null; then
                terraform destroy -auto-approve \
                  -var="pr_number=$PR_NUM" \
                  -var="server_image_tag=pr-$PR_NUM" \
                  -var="hcloud_token=${{ secrets.HCLOUD_TOKEN }}" \
                  -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" \
                  -var="ghcr_username=${{ github.repository_owner }}" \
                  -var="ghcr_token=${{ secrets.GHCR_TOKEN }}" \
                  -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" && \
                terraform workspace select default && \
                terraform workspace delete "pr-$PR_NUM" || true
              else
                # Fallback: workspace missing — delete resources directly
                echo "No Terraform workspace for pr-$PR_NUM — deleting server directly"
                docker run --rm -e HCLOUD_TOKEN hetznercloud/cli server delete "$name" || true
                # DNS record cleanup via Cloudflare API
                ZONE_ID="${{ secrets.CLOUDFLARE_ZONE_ID }}"
                RECORD_ID=$(curl -sf -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
                  "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=pr-${PR_NUM}.preview.dofek.fit&type=A" \
                  | jq -r '.result[0].id // empty')
                if [ -n "$RECORD_ID" ]; then
                  curl -sf -X DELETE -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
                    "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}" || true
                  echo "Deleted DNS record for pr-${PR_NUM}.preview.dofek.fit"
                fi
              fi
            else
              echo "Server $name is still within 72h — keeping"
            fi
          done
