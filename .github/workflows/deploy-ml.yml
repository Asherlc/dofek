name: Deploy ML

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. sha-abc1234)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (e.g. sha-abc1234). Defaults to latest."
        required: false
        default: "latest"
        type: string

concurrency:
  group: deploy-ml
  cancel-in-progress: false

jobs:
  ml:
    name: Deploy ML Worker
    runs-on: ubuntu-latest
    env:
      DOCKER_HOST: ssh://root@${{ secrets.SERVER_HOST }}
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Update training-export-worker
        env:
          TAG: ${{ inputs.image_tag || 'latest' }}
        run: |
          docker service update \
            --image "ghcr.io/asherlc/dofek-ml:${TAG}" \
            --with-registry-auth \
            dofek_training-export-worker
