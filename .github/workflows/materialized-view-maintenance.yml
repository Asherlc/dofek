name: Materialized View Maintenance

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to run maintenance from"
        required: false
        default: "latest"
        type: string
      view_name:
        description: "Canonical materialized view to rebuild"
        required: false
        default: "fitness.provider_stats"
        type: choice
        options:
          - "fitness.provider_stats"
          - "fitness.activity_summary"
          - "fitness.deduped_sensor"
          - "fitness.v_daily_metrics"
          - "fitness.v_activity"
          - "fitness.v_sleep"
          - "fitness.v_body_measurement"
      server_host:
        description: "Docker SSH host (defaults to SERVER_HOST secret)"
        required: false
        type: string
      infisical_environment:
        description: "Infisical environment to export"
        required: false
        default: prod
        type: string
      stack_name:
        description: "Docker stack name"
        required: false
        default: dofek
        type: string

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: materialized-view-maintenance-${{ inputs.stack_name || 'dofek' }}
  cancel-in-progress: false

jobs:
  rebuild:
    name: Rebuild Materialized View
    runs-on: ubuntu-latest
    env:
      DOCKER_HOST: ssh://root@${{ inputs.server_host != '' && inputs.server_host || secrets.SERVER_HOST }}
      DOCKER_SSH_COMMAND: ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=10
      INFISICAL_ENVIRONMENT: ${{ inputs.infisical_environment || 'prod' }}
      STACK_NAME: ${{ inputs.stack_name || 'dofek' }}
      VIEW_NAME: ${{ inputs.view_name || 'fitness.provider_stats' }}
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh-host
        with:
          host: ${{ inputs.server_host != '' && inputs.server_host || secrets.SERVER_HOST }}
          private_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Export Infisical deploy secrets file via OIDC
        uses: ./.github/actions/export-infisical-dotenv
        with:
          env: ${{ inputs.infisical_environment || 'prod' }}
          template: .github/templates/infisical-dotenv.tmpl
          output_path: ${{ github.workspace }}/.env.${{ inputs.infisical_environment || 'prod' }}

      - name: Export dotenv path
        run: echo "INFISICAL_ENV_FILE=${GITHUB_WORKSPACE}/.env.${INFISICAL_ENVIRONMENT}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull maintenance images
        run: |
          docker pull "ghcr.io/asherlc/dofek:${IMAGE_TAG}"
          docker pull "postgres:18-alpine"

      - name: Wait for Postgres writable
        run: |
          for attempt in $(seq 1 36); do
            recovery_output=$(timeout 15s docker run --rm --network "${STACK_NAME}_default" \
              --env-file "$INFISICAL_ENV_FILE" \
              postgres:18-alpine sh -euc \
              "PGPASSWORD=\"\$POSTGRES_PASSWORD\" \
              psql --host=db --username=health --dbname=health --no-align --tuples-only --quiet \
              --command \"SELECT CASE WHEN pg_is_in_recovery() THEN 'recovery' ELSE 'writable' END;\"" 2>&1 || true)
            recovery_state="$(printf '%s\n' "$recovery_output" | tail -n 1 | tr -d '[:space:]')"
            if [ "$recovery_state" = "writable" ]; then
              echo "Postgres is writable."
              break
            fi
            if [ "$attempt" -eq 36 ]; then
              echo "::error::Postgres did not become writable within 180s"
              exit 1
            fi
            echo "Postgres readiness attempt ${attempt}/36: retrying in 5s..."
            sleep 5
          done

      - name: Plan materialized view sync before rebuild
        run: |
          timeout 90s docker run --rm --network "${STACK_NAME}_default" \
            --env-file "$INFISICAL_ENV_FILE" \
            --entrypoint sh \
            "ghcr.io/asherlc/dofek:${IMAGE_TAG}" \
            -euc 'export DATABASE_URL="postgres://health:${POSTGRES_PASSWORD}@db:5432/health"; exec node --experimental-transform-types src/db/run-view-sync-planner.ts'

      - name: Cancel target refreshes and rebuild materialized view
        run: |
          timeout 50m docker run --rm --network "${STACK_NAME}_default" \
            --env-file "$INFISICAL_ENV_FILE" \
            --env VIEW_NAME="$VIEW_NAME" \
            --entrypoint sh \
            "ghcr.io/asherlc/dofek:${IMAGE_TAG}" \
            -euc 'export DATABASE_URL="postgres://health:${POSTGRES_PASSWORD}@db:5432/health"; exec node --experimental-transform-types src/db/run-materialized-view-maintenance.ts rebuild "$VIEW_NAME"'

      - name: Run post-rebuild materialized view sync
        run: |
          timeout 50m docker run --rm --network "${STACK_NAME}_default" \
            --env-file "$INFISICAL_ENV_FILE" \
            --entrypoint sh \
            "ghcr.io/asherlc/dofek:${IMAGE_TAG}" \
            -euc 'export DATABASE_URL="postgres://health:${POSTGRES_PASSWORD}@db:5432/health"; exec node --experimental-transform-types src/db/run-materialized-view-maintenance.ts sync'

      - name: Verify materialized view planner is clean
        run: |
          planner_output_file="$RUNNER_TEMP/view-sync-plan-after-maintenance.log"
          timeout 90s docker run --rm --network "${STACK_NAME}_default" \
            --env-file "$INFISICAL_ENV_FILE" \
            --entrypoint sh \
            "ghcr.io/asherlc/dofek:${IMAGE_TAG}" \
            -euc 'export DATABASE_URL="postgres://health:${POSTGRES_PASSWORD}@db:5432/health"; exec node --experimental-transform-types src/db/run-view-sync-planner.ts' >"$planner_output_file"

          cat "$planner_output_file"
          planner_required="$(sed -n 's/^required=//p' "$planner_output_file" | tail -n 1)"
          planner_reasons="$(sed -n 's/^reasons=//p' "$planner_output_file" | tail -n 1)"

          if [ "$planner_required" != "false" ]; then
            echo "::error::Materialized view maintenance is still required: ${planner_reasons}"
            exit 1
          fi
