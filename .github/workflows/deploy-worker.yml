name: Deploy Worker

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to workflow ref HEAD)"
        required: false
        type: string

jobs:
  worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.commit_sha != '' && inputs.commit_sha || github.sha }}
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Deploy worker via docker rollout
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          SHA_TAG="sha-$(git rev-parse --short HEAD)"
          ssh "root@${SERVER_HOST}" bash -s -- "$GHCR_TOKEN" "$SHA_TAG" <<'DEPLOY'
            set -euo pipefail
            GHCR_TOKEN="$1"
            SHA_TAG="$2"
            cd /opt/dofek

            # Authenticate with GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u asherlc --password-stdin

            # Pull the new image
            docker pull "ghcr.io/asherlc/dofek:${SHA_TAG}"

            # Persist the image tag for future compose operations
            echo "IMAGE_TAG=${SHA_TAG}" > .env.deploy

            # Zero-downtime rollout (docker rollout is a CLI plugin, not a compose subcommand)
            docker rollout -f docker-compose.deploy.yml worker
          DEPLOY
