name: Mutation

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  mutation-prep:
    name: Mutation Prep
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shards: ${{ steps.shard.outputs.shards }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Compute changed files and split into shards
        id: shard
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF_RANGE="origin/main...HEAD"
            MIN_LINES=15
          else
            DIFF_RANGE="HEAD~1...HEAD"
            MIN_LINES=0
          fi

          CANDIDATES=$(git diff --name-only $DIFF_RANGE \
            | { grep '\.ts$' || true; } \
            | { grep -v '\.test\.ts$' || true; } \
            | { grep -v '\.cy\.ts$' || true; } \
            | { grep -v 'test-helpers\.ts$' || true; } \
            | { grep -v '\.d\.ts$' || true; } \
            | { grep -v '\.gen\.ts$' || true; } \
            | { grep -v '\.config\.' || true; } \
            | { grep -v 'drizzle/' || true; } \
            | { grep -v 'src/db/schema\.ts$' || true; } \
            | { grep -v 'scripts/' || true; } \
            | { grep -v 'packages/mobile/' || true; })

          ALL_FILES=()
          for f in $CANDIDATES; do
            if [ "$MIN_LINES" -gt 0 ]; then
              LINES=$(git diff --numstat $DIFF_RANGE -- "$f" | awk '{print $1+$2}')
              [ "$LINES" -lt "$MIN_LINES" ] && continue
            elif [ ! -f "$f" ]; then
              continue
            fi
            ALL_FILES+=("$f")
          done

          COUNT=${#ALL_FILES[@]}
          if [ "$COUNT" -eq 0 ]; then
            echo "shards=[]" >> "$GITHUB_OUTPUT"
            echo "No files to mutate"
            exit 0
          fi

          # Split into shards of up to 5 files each
          SHARD_SIZE=5
          SHARDS="["
          for (( i=0; i<COUNT; i+=SHARD_SIZE )); do
            CHUNK=""
            for (( j=i; j<i+SHARD_SIZE && j<COUNT; j++ )); do
              CHUNK="${CHUNK:+$CHUNK,}${ALL_FILES[$j]}"
            done
            [ "$i" -gt 0 ] && SHARDS="$SHARDS,"
            SHARDS="$SHARDS\"$CHUNK\""
          done
          SHARDS="$SHARDS]"

          echo "shards=$SHARDS" >> "$GITHUB_OUTPUT"
          echo "Split $COUNT files into shards: $SHARDS"

  mutation:
    name: Stryker (${{ strategy.job-index }})
    needs: mutation-prep
    if: needs.mutation-prep.outputs.shards != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
    strategy:
      fail-fast: false
      matrix:
        files: ${{ fromJSON(needs.mutation-prep.outputs.shards) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Restore Stryker incremental cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-v2-${{ github.head_ref || 'main' }}-${{ hashFiles(matrix.files) }}-${{ github.sha }}
          restore-keys: |
            stryker-v2-${{ github.head_ref || 'main' }}-${{ hashFiles(matrix.files) }}-
            stryker-v2-main-${{ hashFiles(matrix.files) }}-
          save-always: true
      - name: Run Stryker
        run: pnpm test:mutation --mutate "${{ matrix.files }}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: mutation-report-${{ strategy.job-index }}
          path: reports/mutation/
          retention-days: 7

  gate:
    name: Mutation Testing
    needs: [mutation-prep, mutation]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.mutation.result }}" = "failure" ] || [ "${{ needs.mutation.result }}" = "cancelled" ]; then
            echo "Mutation testing failed or was cancelled"
            exit 1
          fi
