name: Mobile Preview OTA

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'

concurrency:
  group: mobile-preview-ota-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish Mobile Preview OTA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm
      - name: Check mobile changes
        id: mobile-changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- packages/mobile/)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Load mobile preview secrets from Infisical
        if: steps.mobile-changes.outputs.changed == 'true'
        uses: ./.github/actions/load-infisical-secrets
        with:
          keys: |
            EXPO_TOKEN
            EXPO_PUBLIC_SENTRY_DSN
            EXPO_PUBLIC_OTEL_ENDPOINT
            EXPO_PUBLIC_OTEL_HEADERS

      - name: Publish OTA to PR branch
        if: steps.mobile-changes.outputs.changed == 'true'
        working-directory: packages/mobile
        env:
          PR_NUMBER: ${{ github.event.number }}
          DEBUG: true
          RELEASE_CHANNEL: staging
        run: |
          for attempt in 1 2 3 4 5; do
            status_code=$(/usr/bin/curl -s -o /dev/null -w "%{http_code}" "https://ota.dofek.asherlc.com/hc" || true)
            if [ "$status_code" = "200" ]; then
              break
            fi

            if [ "$attempt" = "5" ]; then
              echo "::error::OTA server healthcheck failed with status ${status_code:-none} after 5 attempts"
              exit 1
            fi

            echo "OTA server not ready yet (status ${status_code:-none}), retrying..."
            sleep 5
          done

          max_attempts=3
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            set +e
            publish_output=$(npx eoas@2.3.17 publish \
              --branch "pr-${{ github.event.number }}" \
              --platform ios \
              --nonInteractive \
              --packageRunner npx 2>&1)
            publish_exit_code=$?
            set -e
            echo "$publish_output"

            if [ "$publish_exit_code" -eq 0 ]; then
              break
            fi

            if echo "$publish_output" | grep -q "Failed to request upload URL: 404 page not found" && [ "$attempt" -lt "$max_attempts" ]; then
              echo "Transient OTA 404 detected during publish, retrying in 15s..."
              attempt=$((attempt + 1))
              sleep 15
              continue
            fi

            exit "$publish_exit_code"
          done

          if [ "$publish_exit_code" -ne 0 ]; then
            exit "$publish_exit_code"
          fi

      - name: Generate comment body
        if: steps.mobile-changes.outputs.changed == 'true'
        env:
          PR_NUMBER: ${{ github.event.number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          DEEP_LINK="dofek://preview/pr-$PR_NUMBER"
          ENCODED_LINK=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$DEEP_LINK', safe=''))")
          QR_IMAGE_URL="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=$ENCODED_LINK"
          cat > /tmp/mobile-preview-comment.md <<COMMENT_BODY
          ## Mobile Preview

          **Scan to open on device:**

          ![QR code for $DEEP_LINK]($QR_IMAGE_URL)

          | | |
          |---|---|
          | **Channel** | \`pr-$PR_NUMBER\` |
          | **Deep Link** | \`$DEEP_LINK\` |
          | **Commit** | $COMMIT_SHA |

          **To test on device:**
          1. Build and install the preview client: \`PREVIEW_CHANNEL=pr-$PR_NUMBER npx expo prebuild --clean -p ios\`
          2. Or tap deep link on an existing preview build: \`$DEEP_LINK\`

          > Each PR gets its own channel. Build a preview client with \`PREVIEW_CHANNEL=pr-{N}\` to test.
          COMMENT_BODY

      - name: Comment PR with Mobile Preview Info
        if: steps.mobile-changes.outputs.changed == 'true'
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728 # v2
        with:
          header: mobile-preview
          path: /tmp/mobile-preview-comment.md
