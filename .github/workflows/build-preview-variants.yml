name: Build Preview Variants

# Builds ad-hoc signed preview app variants (one per slot) so testers can
# install them on physical devices and receive PR-specific OTA updates.
# Only runs when native iOS code changes on main.

on:
  push:
    branches: [main]
    paths:
      - 'packages/mobile/ios/**'
      - 'packages/mobile/modules/*/ios/**'
      - 'packages/mobile/modules/*/Package.swift'
      - 'packages/mobile/app.json'
      - 'packages/mobile/app.config.ts'
      - 'packages/mobile/modules/*/expo-module.config.json'
  workflow_dispatch:
    inputs:
      slots:
        description: 'Number of preview slots to build (1-5)'
        required: false
        default: '5'

concurrency:
  group: build-preview-variants
  cancel-in-progress: true

env:
  PREVIEW_SLOTS: ${{ github.event.inputs.slots || '5' }}

jobs:
  build-matrix:
    name: Generate Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
    steps:
      - name: Generate slot matrix
        id: matrix
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const slots = parseInt(process.env.PREVIEW_SLOTS, 10);
            const matrix = Array.from({ length: slots }, (_, index) => index + 1);
            return JSON.stringify({ slot: matrix });

  build-preview:
    name: Preview Slot ${{ matrix.slot }}
    needs: build-matrix
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
      fail-fast: false
    env:
      PREVIEW_SLOT: ${{ matrix.slot }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-pnpm

      - name: Regenerate native project for preview slot
        working-directory: packages/mobile
        run: npx expo prebuild --clean --platform ios

      - name: Download Sentry XCFramework
        run: packages/mobile/scripts/download-sentry-xcframework.sh

      - name: Cache CocoaPods
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/mobile/ios/Pods
          key: pods-preview-${{ matrix.slot }}-${{ hashFiles('packages/mobile/ios/Podfile', 'packages/mobile/ios/Podfile.lock') }}
          restore-keys: pods-preview-${{ matrix.slot }}-

      - name: Install CocoaPods
        run: cd packages/mobile/ios && pod install

      - name: Setup code signing
        env:
          DEV_CERT_BASE64: ${{ secrets.IOS_DEVELOPMENT_CERT_BASE64 }}
          DEV_CERT_PASSWORD: ${{ secrets.IOS_DEVELOPMENT_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo -n "$DEV_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/dev-cert.p12
          security import $RUNNER_TEMP/dev-cert.p12 -P "$DEV_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Setup App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Build archive
        run: |
          cd packages/mobile/ios
          xcodebuild archive \
            -workspace Dofek.xcworkspace \
            -scheme Dofek \
            -configuration Release \
            -archivePath $RUNNER_TEMP/DofekPreview-${{ matrix.slot }}.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM=68LEL35DQ9
        timeout-minutes: 25

      - name: Export IPA (development/ad-hoc)
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/DofekPreview-${{ matrix.slot }}.xcarchive \
            -exportOptionsPlist packages/mobile/ios/PreviewExportOptions.plist \
            -exportPath $RUNNER_TEMP/export-${{ matrix.slot }} \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dofek-preview-${{ matrix.slot }}
          path: ${{ runner.temp }}/export-${{ matrix.slot }}/*.ipa
          retention-days: 90

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  create-preview-channels:
    name: Ensure Preview Channels
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Create channel if missing
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest channel:create "preview-${{ matrix.slot }}" \
            --non-interactive 2>/dev/null || true
