name: Secret Sync

on:
  repository_dispatch:
    types: [infisical-secrets-updated]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run sync in dry-run mode (no Dokploy updates or deploys)"
        type: boolean
        default: false
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: secret-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Infisical to Dokploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm
      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | bash
          sudo apt-get update
          sudo apt-get install -y infisical
      - name: Sync managed secrets
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          DOKPLOY_HOST: ${{ secrets.DOKPLOY_HOST }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_WEB_APP_ID: ${{ secrets.DOKPLOY_WEB_APP_ID }}
          DOKPLOY_WORKER_APP_ID: ${{ secrets.DOKPLOY_WORKER_APP_ID }}
        run: |
          set -euo pipefail
          dry_run_flag=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            dry_run_flag="--dry-run"
          fi

          pnpm tsx scripts/sync-dokploy-env-from-infisical.ts \
            --environment=prod \
            --apps=web,worker \
            --managed-keys-file=deploy/dokploy/managed-secret-keys.json \
            --fail-on-missing=true \
            $dry_run_flag
