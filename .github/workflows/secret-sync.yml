name: Secret Sync

on:
  repository_dispatch:
    types: [infisical-secrets-updated]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run mode (export secrets but don't restart services)"
        type: boolean
        default: false
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: secret-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Infisical to Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical
      - name: Export secrets from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          # Export as JSON and convert to unquoted KEY=VALUE format.
          # infisical's dotenv format wraps values in single quotes, which
          # some Docker Compose versions include literally in the value.
          infisical export --env=prod --format=json \
            | python3 -c "
          import json, sys
          for item in json.load(sys.stdin):
              print(f'{item[\"key\"]}={item[\"value\"]}')
          " > .env.prod.new
          chmod 600 .env.prod.new
          echo "Exported $(wc -l < .env.prod.new) secrets"
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Sync secrets to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run — comparing secrets on server:"
            ssh "root@${SERVER_HOST}" cat /opt/dofek/.env.prod \
              | diff - .env.prod.new || true
            exit 0
          fi

          # Upload secrets atomically
          scp .env.prod.new "root@${SERVER_HOST}:/opt/dofek/.env.prod.new"
          ssh "root@${SERVER_HOST}" bash -s <<'DEPLOY'
            set -euo pipefail
            chmod 600 /opt/dofek/.env.prod.new
            mv /opt/dofek/.env.prod.new /opt/dofek/.env.prod

            cd /opt/dofek
            docker compose --env-file .env.prod --env-file .env.deploy \
              -f docker-compose.deploy.yml restart web worker ota collector
            echo "Secrets synced and services restarted"
          DEPLOY
