name: Secret Sync

on:
  repository_dispatch:
    types: [infisical-secrets-updated]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run mode (export secrets but don't restart services)"
        type: boolean
        default: false
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: secret-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Infisical to Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install Infisical CLI
        env:
          INFISICAL_VERSION: 0.43.72
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y "infisical=${INFISICAL_VERSION}"
      - name: Export secrets from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          infisical export --env=prod --format=dotenv > .env.prod.new
          chmod 600 .env.prod.new
          echo "Exported $(wc -l < .env.prod.new) secrets"
      - name: Inject OTA signing keys
        env:
          OTA_PRIVATE_KEY_B64: ${{ secrets.OTA_PRIVATE_KEY_B64 }}
          OTA_PUBLIC_KEY_B64: ${{ secrets.OTA_PUBLIC_KEY_B64 }}
        run: |
          if [ -z "$OTA_PRIVATE_KEY_B64" ]; then
            echo "Error: OTA_PRIVATE_KEY_B64 GitHub secret is not set" >&2
            exit 1
          fi
          if [ -z "$OTA_PUBLIC_KEY_B64" ]; then
            echo "Error: OTA_PUBLIC_KEY_B64 GitHub secret is not set" >&2
            exit 1
          fi
          echo "OTA_PRIVATE_KEY_B64=$OTA_PRIVATE_KEY_B64" >> .env.prod.new
          echo "OTA_PUBLIC_KEY_B64=$OTA_PUBLIC_KEY_B64" >> .env.prod.new
      - name: Validate required deploy secrets
        run: |
          set -euo pipefail
          required_vars=(
            CLOUDFLARE_API_TOKEN
            POSTGRES_PASSWORD
            PGADMIN_DEFAULT_EMAIL
            PGADMIN_DEFAULT_PASSWORD
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
            OTA_JWT_SECRET
          )
          missing_vars=()
          for required_var in "${required_vars[@]}"; do
            if ! grep -Eq "^${required_var}=.+" .env.prod.new; then
              missing_vars+=("${required_var}")
            fi
          done
          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Error: missing required deploy vars in Infisical prod: ${missing_vars[*]}" >&2
            echo "Set them with: infisical secrets set --env=prod KEY=value" >&2
            exit 1
          fi
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Sync secrets to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run — comparing secret keys (values not shown):"
            scp "root@${SERVER_HOST}:/opt/dofek/.env.prod" .env.prod.current
            grep -oP '^[A-Za-z_][A-Za-z0-9_]*(?==)' .env.prod.current | sort > keys.current
            grep -oP '^[A-Za-z_][A-Za-z0-9_]*(?==)' .env.prod.new | sort > keys.new
            diff -u keys.current keys.new || true
            echo "Current: $(wc -l < keys.current) keys, New: $(wc -l < keys.new) keys"
            exit 0
          fi

          # Upload secrets atomically
          scp .env.prod.new "root@${SERVER_HOST}:/opt/dofek/.env.prod.new"
          ssh "root@${SERVER_HOST}" bash -s <<'DEPLOY'
            set -euo pipefail
            chmod 600 /opt/dofek/.env.prod.new
            mv /opt/dofek/.env.prod.new /opt/dofek/.env.prod

            # Use "up -d" instead of "restart" so Docker Compose re-reads
            # the env file and re-interpolates compose variables. "restart"
            # reuses the old container config and ignores env file changes.
            cd /opt/dofek
            docker compose --env-file .env.prod --env-file .env.deploy \
              -f docker-compose.deploy.yml up -d --force-recreate \
              web worker ota collector
            echo "Secrets synced and services recreated"
          DEPLOY
