name: Secret Sync

on:
  repository_dispatch:
    types: [infisical-secrets-updated]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run mode (export secrets but don't restart services)"
        type: boolean
        default: false
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: secret-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Infisical to Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Export secrets from Infisical
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          # Pass the token via env var (not positional arg) to avoid process listing exposure
          ssh -o SendEnv=INFISICAL_TOKEN "root@${SERVER_HOST}" bash -s -- "$DRY_RUN" <<'SYNC'
            set -euo pipefail
            DRY_RUN="$1"

            # Export secrets from Infisical to .env file
            infisical export --env=prod --format=dotenv \
              > /opt/dofek/.env.prod.new

            chmod 600 /opt/dofek/.env.prod.new

            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry run — comparing secrets:"
              diff /opt/dofek/.env.prod /opt/dofek/.env.prod.new || true
              rm /opt/dofek/.env.prod.new
              exit 0
            fi

            # Atomically replace the env file
            mv /opt/dofek/.env.prod.new /opt/dofek/.env.prod

            # Restart services that use env_file to pick up new secrets
            cd /opt/dofek
            docker compose --env-file .env.prod --env-file .env.deploy \
              -f docker-compose.deploy.yml restart web worker ota collector
            echo "Secrets synced and services restarted"
          SYNC
