name: Deploy OTA

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy"
        required: true
        type: string
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to main HEAD)"
        required: false
        type: string

concurrency:
  group: deploy-ota
  cancel-in-progress: false

jobs:
  # Only runs for workflow_run triggers — validates CI passed and commit is latest
  check:
    name: Deploy Check
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.sha }}
      should_deploy: ${{ steps.latest.outputs.should_deploy }}
    steps:
      - if: github.event.workflow_run.conclusion != 'success'
        run: |
          echo "CI did not succeed — skipping deploy"
          exit 1
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 1
      - name: Resolve commit SHA
        id: resolve
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
      - name: Check if latest main HEAD
        id: latest
        run: |
          MAIN_HEAD=$(git ls-remote origin refs/heads/main | awk '{ print $1 }')
          if [ "$MAIN_HEAD" = "${{ steps.resolve.outputs.sha }}" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy for non-latest main commit"
          fi

  deploy:
    name: Publish OTA
    needs: [check]
    if: |
      always() && (
        github.event_name != 'workflow_run' ||
        needs.check.outputs.should_deploy == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve commit SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "ref=${{ needs.check.outputs.commit_sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.commit_sha }}" ]; then
            echo "ref=${{ inputs.commit_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ steps.sha.outputs.ref }}
      - uses: ./.github/actions/setup-node-pnpm
      - name: Wait for OTA server
        run: |
          for attempt in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://ota.dofek.asherlc.com/manifest || true)
            if [ "$status" -ge 200 ] && [ "$status" -lt 500 ]; then
              echo "OTA server is healthy"
              exit 0
            fi
            echo "Waiting for OTA server... (attempt $attempt/30)"
            sleep 2
          done
          echo "OTA server did not become healthy in time"
          exit 1
      - name: Publish OTA update
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eoas@2.3.16 publish --branch main --platform ios --nonInteractive
      - name: Ensure production channel maps to main branch
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest channel:edit production \
            --branch main \
            --non-interactive 2>/dev/null || \
          npx eas-cli@latest channel:create production \
            --branch main \
            --non-interactive
