name: Deploy OTA

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy"
        required: true
        type: string
      dispatcher_run_url:
        description: "URL of the workflow run that dispatched this workflow"
        required: false
        type: string
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to main HEAD)"
        required: false
        type: string

concurrency:
  group: deploy-ota
  cancel-in-progress: true

jobs:
  check:
    name: Deploy Check
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 1
      - name: Resolve commit SHA
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SHA: ${{ inputs.commit_sha }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SHA="$INPUT_SHA"
            if [ -z "$SHA" ]; then
              SHA=$(git ls-remote origin refs/heads/main | awk '{ print $1 }')
            fi
          else
            SHA="$WORKFLOW_RUN_SHA"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

  deploy:
    name: Publish OTA
    needs: [check]
    if: |
      always() && (
        github.event_name != 'workflow_run' ||
        needs.check.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve commit SHA
        id: sha
        env:
          CHECK_SHA: ${{ needs.check.outputs.commit_sha }}
          INPUT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [ -n "$CHECK_SHA" ]; then
            echo "ref=$CHECK_SHA" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_SHA" ]; then
            echo "ref=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$(git ls-remote origin refs/heads/main | awk '{ print $1 }')" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ steps.sha.outputs.ref }}
      - uses: ./.github/actions/setup-node-pnpm
      - name: Wait for OTA server
        run: |
          for attempt in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://ota.dofek.asherlc.com/manifest || true)
            if [ "$status" -ge 200 ] && [ "$status" -lt 500 ]; then
              echo "OTA server is healthy"
              exit 0
            fi
            echo "Waiting for OTA server... (attempt $attempt/30)"
            sleep 2
          done
          echo "OTA server did not become healthy in time"
          exit 1
      - name: Publish OTA update
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_OTEL_ENDPOINT: ${{ secrets.EXPO_PUBLIC_OTEL_ENDPOINT }}
          EXPO_PUBLIC_OTEL_HEADERS: ${{ secrets.EXPO_PUBLIC_OTEL_HEADERS }}
          DEBUG: true
          RELEASE_CHANNEL: production
        run: npx eoas@2.3.16 publish --branch main --platform ios --nonInteractive

      - uses: ./.github/actions/append-dispatcher-run-summary
        if: always()
        with:
          dispatcher_run_url: ${{ inputs.dispatcher_run_url }}
          workflow_run_url: ${{ github.event.workflow_run.html_url }}
