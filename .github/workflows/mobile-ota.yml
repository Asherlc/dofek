name: Mobile OTA

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'

concurrency:
  group: mobile-ota-${{ github.event.number }}
  cancel-in-progress: ${{ github.event.action != 'closed' }}

jobs:
  publish:
    name: Publish Mobile OTA
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Publish OTA to PR branch
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          npx eoas@2.3.16 publish \
            --branch "pr-$PR_NUMBER" \
            --platform ios \
            --nonInteractive \
            --packageRunner npx

      - name: Create channel for PR
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          # Create a dynamic channel for this PR and point it at the PR branch.
          # Channel is created on first push, updated on subsequent pushes.
          npx eas-cli@latest channel:edit "pr-$PR_NUMBER" \
            --branch "pr-$PR_NUMBER" \
            --non-interactive 2>/dev/null || \
          npx eas-cli@latest channel:create "pr-$PR_NUMBER" \
            --branch "pr-$PR_NUMBER" \
            --non-interactive 2>/dev/null || true

      - name: Comment PR with Mobile Preview Info
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          issue-number: ${{ github.event.number }}
          body-includes: <!-- mobile-preview-comment -->
          body: |
            <!-- mobile-preview-comment -->
            ## Mobile Preview

            <img src="https://quickchart.io/qr?text=dofek%3A%2F%2Fpreview%2Fpr-${{ github.event.number }}&size=200" alt="QR Code" width="200" />

            | | |
            |---|---|
            | **Channel** | `pr-${{ github.event.number }}` |
            | **Deep Link** | `dofek://preview/pr-${{ github.event.number }}` |
            | **Commit** | ${{ github.sha }} |

            **To test on device:**
            1. Build and install the preview client: `PREVIEW_CHANNEL=pr-${{ github.event.number }} npx expo prebuild --clean -p ios`
            2. Or tap deep link on an existing preview build: `dofek://preview/pr-${{ github.event.number }}`

            > Each PR gets its own channel. Build a preview client with `PREVIEW_CHANNEL=pr-{N}` to test.

  cleanup:
    name: Cleanup Mobile OTA
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Delete OTA channel and branch
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Best-effort cleanup — channel/branch may not exist if OTA was never published
          npx eas-cli@latest channel:delete "pr-${{ github.event.number }}" \
            --non-interactive 2>/dev/null || true
          npx eas-cli@latest branch:delete "pr-${{ github.event.number }}" \
            --non-interactive 2>/dev/null || true
