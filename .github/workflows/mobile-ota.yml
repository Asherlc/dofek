name: Mobile OTA

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'

concurrency:
  group: mobile-ota-${{ github.event.number }}
  cancel-in-progress: ${{ github.event.action != 'closed' }}

jobs:
  publish:
    name: Publish Mobile OTA
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Wait for valid OTA server TLS
        run: |
          for attempt in $(seq 1 18); do
            cert_subject=$(echo | openssl s_client -connect ota.dofek.asherlc.com:443 \
              -servername ota.dofek.asherlc.com 2>/dev/null \
              | openssl x509 -noout -subject 2>/dev/null || true)
            if [ -n "$cert_subject" ] && ! echo "$cert_subject" | grep -q "TRAEFIK DEFAULT"; then
              echo "Valid TLS certificate: $cert_subject"
              exit 0
            fi
            echo "Waiting for valid TLS cert... (attempt $attempt/18, current: ${cert_subject:-none})"
            sleep 10
          done
          echo "::error::OTA server at ota.dofek.asherlc.com is serving a self-signed certificate. Traefik ACME may have failed — check server logs."
          exit 1

      - name: Publish OTA to PR branch
        working-directory: packages/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          npx eoas@2.3.16 publish \
            --branch "pr-$PR_NUMBER" \
            --platform ios \
            --nonInteractive \
            --packageRunner npx

      - name: Create channel for PR
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          # Create a dynamic channel for this PR and point it at the PR branch.
          # Channel is created on first push, updated on subsequent pushes.
          npx eas-cli@latest channel:edit "pr-$PR_NUMBER" \
            --branch "pr-$PR_NUMBER" \
            --non-interactive 2>/dev/null || \
          npx eas-cli@latest channel:create "pr-$PR_NUMBER" \
            --branch "pr-$PR_NUMBER" \
            --non-interactive 2>/dev/null || true

      - name: Generate comment body
        env:
          PR_NUMBER: ${{ github.event.number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          DEEP_LINK="dofek://preview/pr-$PR_NUMBER"
          ENCODED_LINK=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$DEEP_LINK', safe=''))")
          QR_IMAGE_URL="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=$ENCODED_LINK"
          cat > /tmp/mobile-preview-comment.md <<COMMENT_BODY
          ## Mobile Preview

          **Scan to open on device:**

          ![QR code for $DEEP_LINK]($QR_IMAGE_URL)

          | | |
          |---|---|
          | **Channel** | \`pr-$PR_NUMBER\` |
          | **Deep Link** | \`$DEEP_LINK\` |
          | **Commit** | $COMMIT_SHA |

          **To test on device:**
          1. Build and install the preview client: \`PREVIEW_CHANNEL=pr-$PR_NUMBER npx expo prebuild --clean -p ios\`
          2. Or tap deep link on an existing preview build: \`$DEEP_LINK\`

          > Each PR gets its own channel. Build a preview client with \`PREVIEW_CHANNEL=pr-{N}\` to test.
          COMMENT_BODY

      - name: Comment PR with Mobile Preview Info
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728 # v2
        with:
          header: mobile-preview
          path: /tmp/mobile-preview-comment.md

  cleanup:
    name: Cleanup Mobile OTA
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: ./.github/actions/setup-node-pnpm

      - name: Delete OTA channel and branch
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Best-effort cleanup — channel/branch may not exist if OTA was never published
          npx eas-cli@latest channel:delete "pr-${{ github.event.number }}" \
            --non-interactive 2>/dev/null || true
          npx eas-cli@latest branch:delete "pr-${{ github.event.number }}" \
            --non-interactive 2>/dev/null || true
