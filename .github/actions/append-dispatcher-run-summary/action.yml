name: Append Dispatcher Run Summary
description: Append a dispatcher workflow run link to the GitHub job summary.

inputs:
  dispatching_run_id:
    description: Run ID for the workflow that dispatched the current run.
    required: false

runs:
  using: composite
  steps:
    - name: Append dispatcher link
      shell: bash
      env:
        INPUT_DISPATCHING_RUN_ID: ${{ inputs.dispatching_run_id }}
        GH_TOKEN: ${{ github.token }}
      run: |
        dispatching_run_id="$INPUT_DISPATCHING_RUN_ID"
        if [ -z "$dispatching_run_id" ]; then
          exit 0
        fi

        dispatcher_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${dispatching_run_id}"
        dispatcher_title="Run #${dispatching_run_id}"

        if run_metadata=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${dispatching_run_id}" --jq '[.name, .html_url] | @tsv' 2>/dev/null); then
          IFS=$'\t' read -r fetched_title fetched_url <<< "$run_metadata"
          if [ -n "$fetched_url" ]; then
            dispatcher_url="$fetched_url"
          fi
          if [ -n "$fetched_title" ]; then
            dispatcher_title="$fetched_title"
          fi
        fi

        echo "- Dispatcher workflow run: [${dispatcher_title}](${dispatcher_url})" >> "$GITHUB_STEP_SUMMARY"
