name: Load Infisical Secrets
description: Login with GitHub OIDC and export selected Infisical secrets to GITHUB_ENV
inputs:
  env:
    description: Infisical environment name
    required: false
    default: prod
  project_id:
    description: Infisical project/workspace ID. Falls back to .infisical.json workspaceId when omitted.
    required: false
    default: ""
  machine_identity_id:
    description: Infisical machine identity ID for OIDC auth
    required: false
    default: 46b66f72-0c77-4cfe-be1b-a43395e77be7
  keys:
    description: Newline or comma separated secret names to export
    required: true
runs:
  using: composite
  steps:
    - name: Install Infisical CLI
      shell: bash
      run: |
        set -euo pipefail

        if command -v infisical >/dev/null 2>&1; then
          exit 0
        fi

        if [ "${RUNNER_OS}" = "Linux" ]; then
          curl -1sLf "https://artifacts-cli.infisical.com/setup.deb.sh" | sudo -E bash
          sudo apt-get update
          sudo apt-get install -y infisical
          exit 0
        fi

        if [ "${RUNNER_OS}" = "macOS" ]; then
          brew update
          brew install infisical
          exit 0
        fi

        echo "::error::Unsupported runner OS for Infisical CLI install: ${RUNNER_OS}"
        exit 1

    - name: Export Infisical secrets
      shell: bash
      env:
        INFISICAL_ENV: ${{ inputs.env }}
        INFISICAL_PROJECT_ID: ${{ inputs.project_id }}
        INFISICAL_MACHINE_IDENTITY_ID: ${{ inputs.machine_identity_id }}
        INFISICAL_KEYS: ${{ inputs.keys }}
      run: |
        set -euo pipefail

        if ! command -v jq >/dev/null 2>&1; then
          echo "::error::Missing jq; required for OIDC token parsing"
          exit 1
        fi

        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
          echo "::error::Missing GitHub OIDC request env vars; ensure workflow permissions include id-token: write"
          exit 1
        fi

        oidc_token="$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')"
        if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
          echo "::error::Failed to mint GitHub OIDC token"
          exit 1
        fi

        infisical_access_token="$(infisical login \
          --method=oidc-auth \
          --machine-identity-id="$INFISICAL_MACHINE_IDENTITY_ID" \
          --jwt="$oidc_token" \
          --plain \
          --silent)"

        if [ -z "$infisical_access_token" ]; then
          echo "::error::Infisical OIDC login returned empty access token"
          exit 1
        fi

        project_id="$INFISICAL_PROJECT_ID"
        if [ -z "$project_id" ] && [ -f ".infisical.json" ]; then
          project_id="$(jq -r '.workspaceId // empty' .infisical.json)"
        fi
        if [ -z "$project_id" ]; then
          echo "::error::Missing Infisical project ID. Set input 'project_id' or add workspaceId to .infisical.json"
          exit 1
        fi

        keys="$(printf '%s\n' "$INFISICAL_KEYS" | tr ',' '\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' | sed '/^$/d')"
        if [ -z "$keys" ]; then
          echo "::error::No secret keys provided to load-infisical-secrets action"
          exit 1
        fi

        while IFS= read -r key; do
          if ! value="$(infisical secrets get "$key" --env="$INFISICAL_ENV" --projectId="$project_id" --token="$infisical_access_token" --plain --silent 2>&1)"; then
            echo "::error::Failed to fetch Infisical secret: $key (env=$INFISICAL_ENV, project=$project_id)"
            echo "$value"
            exit 1
          fi

          if [ -z "$value" ]; then
            echo "::error::Missing required Infisical secret: $key (env=$INFISICAL_ENV)"
            exit 1
          fi

          if printf '%s' "$value" | grep -q $'\n'; then
            marker="INFISICAL_${key}_$(uuidgen)"
            {
              echo "${key}<<${marker}"
              printf '%s\n' "$value"
              echo "$marker"
            } >> "$GITHUB_ENV"
          else
            echo "${key}=${value}" >> "$GITHUB_ENV"
          fi
        done <<< "$keys"
