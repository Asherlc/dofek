name: Load Expo secrets from Infisical
description: |
  Exports EXPO_PUBLIC_* secrets from Infisical (prod environment) into
  GITHUB_ENV so that Metro inlines them at bundle time. Used by every job
  that produces a JS bundle: expo export, eoas publish, and xcodebuild.

inputs:
  infisical-token:
    description: Infisical service token (INFISICAL_TOKEN secret)
    required: true

runs:
  using: composite
  steps:
    - name: Install Infisical CLI (Linux)
      if: runner.os == 'Linux'
      env:
        INFISICAL_VERSION: "0.43.72"
      shell: bash
      run: |
        curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
        sudo apt-get update && sudo apt-get install -y "infisical=${INFISICAL_VERSION}"

    - name: Install Infisical CLI (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install infisical/get-cli/infisical

    - name: Export EXPO_PUBLIC_* secrets to environment
      shell: bash
      env:
        INFISICAL_TOKEN: ${{ inputs.infisical-token }}
      run: |
        infisical export --env=prod --format=dotenv | grep '^EXPO_PUBLIC_' >> "$GITHUB_ENV"
