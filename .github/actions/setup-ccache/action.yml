name: Setup ccache for Xcode
description: Install ccache, configure it for Xcode, create compiler wrappers, and restore cache

inputs:
  cache-key-prefix:
    description: Prefix for the cache key (e.g. ccache-ios, ccache-ios-release)
    required: true

runs:
  using: composite
  steps:
    - name: Install and configure ccache
      shell: bash
      run: |
        brew install ccache
        ccache --set-config=max_size=1G
        ccache --set-config=sloppiness=clang_index_store,file_stat_matches,include_file_ctime,include_file_mtime,ivfsoverlay,pch_defines,modules,system_headers,time_macros
        ccache --set-config=depend_mode=true
        ccache --set-config=compiler_check=content
        CCACHE_BIN=$(which ccache)
        CLANG_PATH=$(xcrun --find clang)
        CLANGXX_PATH=$(xcrun --find clang++)
        WRAPPER_DIR="$RUNNER_TEMP/ccache-wrappers"
        mkdir -p "$WRAPPER_DIR"
        cat > "$WRAPPER_DIR/ccache-clang" <<WRAPPER
        #!/bin/bash
        exec "$CCACHE_BIN" "$CLANG_PATH" "\$@"
        WRAPPER
        cat > "$WRAPPER_DIR/ccache-clang++" <<WRAPPER
        #!/bin/bash
        exec "$CCACHE_BIN" "$CLANGXX_PATH" "\$@"
        WRAPPER
        chmod +x "$WRAPPER_DIR/ccache-clang" "$WRAPPER_DIR/ccache-clang++"
    - name: Cache ccache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/Library/Caches/ccache
        key: ${{ inputs.cache-key-prefix }}-${{ hashFiles('packages/mobile/app.json', 'packages/mobile/app.config.ts', 'packages/mobile/plugins/**') }}
        restore-keys: ${{ inputs.cache-key-prefix }}-
