rules:
  - id: no-process-env-in-shared-packages
    pattern: process.env.$VAR
    paths:
      include:
        - "**/packages/format/"
        - "**/packages/scoring/"
        - "**/packages/nutrition/"
        - "**/packages/training/"
        - "**/packages/stats/"
        - "**/packages/recovery/"
        - "**/packages/onboarding/"
        - "**/packages/providers-meta/"
        - "**/packages/zones/"
      exclude:
        - "**/**.test.ts"
    message: >
      Shared domain packages must not read process.env directly.
      Accept configuration via function parameters or dependency injection.
    languages: [typescript, javascript]
    severity: ERROR

  - id: no-console-log-in-production
    pattern: console.log(...)
    paths:
      exclude:
        - "**/**.test.ts"
        - "**/**.test.tsx"
        - "**/test-helpers.ts"
        - "**/scripts/"
        - "**/cypress/"
        - "**/packages/mobile/"
    message: >
      Use the project logger (winston) instead of console.log in production code.
    languages: [typescript, javascript]
    severity: ERROR

  - id: no-fetch-in-provider-without-retry
    pattern: fetch($URL, ...)
    paths:
      include:
        - "**/src/providers/"
      exclude:
        - "**/**.test.ts"
        - "**/src/providers/http-client.ts"
    message: >
      Use the provider's authenticated fetch with retry logic (http-client.ts)
      instead of bare fetch() in provider code.
    languages: [typescript, javascript]
    severity: ERROR
