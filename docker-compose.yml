# Dev backing services. Run the app outside Docker for fast iteration.
#
# Usage:
#   docker compose up -d
#   pnpm dev              # sync runner
#   cd packages/web && pnpm dev   # Vite dev server
#   cd packages/server && pnpm dev # Express API server

services:
  db:
    image: timescale/timescaledb:2.26.2-pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: health
      POSTGRES_USER: health
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-health}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d health"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:26.3.3.20-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: fitness
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-health}
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    restart: unless-stopped
    user: "0:0"
    environment:
      AXIOM_API_TOKEN: ${AXIOM_API_TOKEN}
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./deploy/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  db_data:
  clickhouse_data:
  redis_data:
