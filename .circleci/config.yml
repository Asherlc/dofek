version: 2.1

executors:
  node:
    docker:
      - image: cimg/node:22.14
    resource_class: medium

  machine:
    machine:
      image: ubuntu-2404:current
    resource_class: medium

commands:
  setup:
    description: Checkout, install pnpm, restore cache, install deps
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: corepack enable && corepack prepare pnpm@latest --activate
      - restore_cache:
          keys:
            - pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-store-v1-
      - run: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store

jobs:
  lint:
    executor: node
    steps:
      - setup
      - run: pnpm lint

  typescript:
    executor: node
    steps:
      - setup
      - run: cd packages/web && pnpm exec tsr generate
      - run:
          name: Typecheck all packages
          command: |
            pnpm tsc --noEmit &
            pid1=$!
            (cd packages/server && pnpm tsc --noEmit) &
            pid2=$!
            (cd packages/web && pnpm tsc --noEmit) &
            pid3=$!
            fail=0
            wait $pid1 || fail=1
            wait $pid2 || fail=1
            wait $pid3 || fail=1
            exit $fail

  knip:
    executor: node
    steps:
      - setup
      - run: pnpm knip

  test-unit:
    executor: node
    steps:
      - setup
      - run:
          name: Run unit tests with coverage
          command: pnpm exec vitest run --config vitest.config.unit.ts --coverage
          environment:
            NODE_OPTIONS: --max-old-space-size=3072
      - store_artifacts:
          path: coverage

  test-integration:
    docker:
      - image: cimg/node:22.14
      - image: timescale/timescaledb:latest-pg16
        environment:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
    resource_class: large
    environment:
      TEST_DATABASE_URL: postgres://test:test@localhost:5432/test
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - setup
      - run:
          name: Wait for TimescaleDB
          command: |
            for i in $(seq 1 30); do
              if node -e "const net = require('net'); const s = net.connect(5432, 'localhost', () => { s.end(); process.exit(0); }); s.on('error', () => process.exit(1));" 2>/dev/null; then
                echo "Database is ready"
                exit 0
              fi
              sleep 1
            done
            echo "Database did not become ready in time"
            exit 1
      - run:
          name: Run integration tests
          command: pnpm exec vitest run --config vitest.config.ts "integration.test"

  test-e2e:
    executor: machine
    steps:
      - checkout
      - restore_cache:
          keys:
            - docker-e2e-v1-{{ checksum "Dockerfile" }}-{{ checksum "docker-compose.e2e.yml" }}
            - docker-e2e-v1-
      - run:
          name: Load cached Docker images
          command: |
            if [ -f /tmp/docker-cache/images.tar ]; then
              docker load -i /tmp/docker-cache/images.tar || true
            fi
      - run:
          name: Build and start e2e stack
          command: docker compose -f docker-compose.e2e.yml up -d --build --wait
      - run:
          name: Save Docker images to cache
          command: |
            mkdir -p /tmp/docker-cache
            docker save $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -v '<none>') \
              -o /tmp/docker-cache/images.tar || true
      - save_cache:
          key: docker-e2e-v1-{{ checksum "Dockerfile" }}-{{ checksum "docker-compose.e2e.yml" }}
          paths:
            - /tmp/docker-cache
      - run:
          name: Install Node.js 22
          command: |
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt-get install -y nodejs
      - run:
          name: Install pnpm
          command: corepack enable && corepack prepare pnpm@latest --activate
      - restore_cache:
          keys:
            - pnpm-store-machine-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-store-machine-v1-
      - run: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-store-machine-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
      - restore_cache:
          keys:
            - cypress-v1-{{ checksum "pnpm-lock.yaml" }}
      - run: pnpm exec cypress install
      - save_cache:
          key: cypress-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.cache/Cypress
      - run: pnpm e2e:run
      - store_artifacts:
          path: cypress/screenshots
          destination: cypress-screenshots
      - run:
          name: Teardown
          command: docker compose -f docker-compose.e2e.yml down -v
          when: always

  mutation:
    executor: node
    environment:
      NODE_OPTIONS: --max-old-space-size=3072
    steps:
      - setup
      - run:
          name: Fetch full history for diff
          command: git fetch origin main
      - restore_cache:
          keys:
            - stryker-v1-{{ .Branch }}-
            - stryker-v1-main-
      - run:
          name: Get changed files
          command: |
            if [ -n "$CIRCLE_PULL_REQUEST" ]; then
              # Only filter out test files, type definitions, and non-source paths.
              # Stryker's own mutate config handles the rest.
              FILES=$(git diff --name-only origin/main...HEAD \
                | { grep '\.ts$' || true; } \
                | { grep -v '\.test\.ts$' || true; } \
                | { grep -v 'test-helpers\.ts$' || true; } \
                | { grep -v '\.d\.ts$' || true; } \
                | { grep -v '\.config\.' || true; } \
                | { grep -v 'drizzle/' || true; } \
                | { grep -v 'scripts/' || true; } \
                | { grep -v 'packages/ios/' || true; } \
                | tr '\n' ',' \
                | sed 's/,$//')
              echo "export MUTATE_FILES=$FILES" >> "$BASH_ENV"
              echo "Mutating changed files: $FILES"
            fi
      - run:
          name: Run Stryker
          command: |
            if [ -n "$CIRCLE_PULL_REQUEST" ] && [ -n "$MUTATE_FILES" ]; then
              pnpm test:mutation --mutate "$MUTATE_FILES"
            elif [ -z "$CIRCLE_PULL_REQUEST" ]; then
              pnpm test:mutation
            else
              echo "No mutatable source files changed — skipping."
            fi
      - save_cache:
          key: stryker-v1-{{ .Branch }}-{{ .Revision }}
          paths:
            - reports/stryker-incremental.json
      - store_artifacts:
          path: reports/mutation
          destination: mutation-report

workflows:
  ci:
    jobs:
      - lint
      - typescript
      - knip
      - test-unit
      - test-integration
      - test-e2e
      - mutation:
          filters:
            branches:
              ignore: main

  weekly-mutation:
    triggers:
      - schedule:
          cron: "0 3 * * 0"
          filters:
            branches:
              only: main
    jobs:
      - mutation
