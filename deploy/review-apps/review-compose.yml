services:
  web:
    image: ghcr.io/asherlc/dofek:${IMAGE_TAG:?IMAGE_TAG is required}
    command: ["web"]
    env_file: ${REVIEW_ENV_FILE:?REVIEW_ENV_FILE is required}
    environment:
      NODE_ENV: production
      PORT: "3000"
      ENABLE_DEV_LOGIN: "true"
      PUBLIC_URL: https://${REVIEW_HOST:?REVIEW_HOST is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:?CLICKHOUSE_URL is required}
      REDIS_URL: redis://redis:6379
      JOB_FILES_DIR: /app/job-files
      SLACK_SIGNING_SECRET: ""
      SLACK_BOT_TOKEN: ""
      SLACK_APP_TOKEN: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ""
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - job_files:/app/job-files
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  db:
    image: timescale/timescaledb:2.26.2-pg18
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    environment:
      POSTGRES_DB: health
      POSTGRES_USER: health
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:26.3.3.20-alpine
    environment:
      CLICKHOUSE_DB: fitness
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok && container_ip=$$(hostname -i | awk '{print $$1}') && wget -qO- \"http://$${container_ip}:8123/ping\" | grep -q Ok",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
  clickhouse_data:
  redis_data:
  job_files:
