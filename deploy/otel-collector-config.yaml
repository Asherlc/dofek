extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  # Accept OTLP from application containers (traces + logs from Winston/OTel SDK)
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

  # Tail Docker container logs from the host filesystem
  filelog:
    include:
      - /var/lib/docker/containers/*/*.log
    include_file_name: false
    include_file_path: true
    operators:
      # Docker uses JSON log format by default
      - type: json_parser
        id: docker_json
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%LZ"
      # Extract container ID from the file path
      - type: regex_parser
        id: extract_container_id
        parse_from: attributes["log.file.path"]
        regex: '/var/lib/docker/containers/(?P<container_id>[a-f0-9]+)/'
      # Move parsed log body
      - type: move
        from: attributes.log
        to: body
      # Drop noisy Postgres NOTICE lines (e.g. migration progress).
      # Each PL/pgSQL RAISE NOTICE emits ~8 lines; a backfill can produce 50k+.
      - type: filter
        expr: 'body matches "severity(_local)?: .NOTICE." or body matches "routine: .exec_stmt_raise."'

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Add resource attributes to filelog entries
  resource/docker:
    attributes:
      - key: source
        value: docker
        action: upsert

exporters:
  otlphttp/traces:
    endpoint: https://api.axiom.co
    headers:
      authorization: "Bearer ${env:AXIOM_API_TOKEN}"
      x-axiom-dataset: dofek-logs
    retry_on_failure:
      enabled: true
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 5000
  otlphttp/logs:
    endpoint: https://api.axiom.co
    headers:
      authorization: "Bearer ${env:AXIOM_API_TOKEN}"
      x-axiom-dataset: dofek-logs
    retry_on_failure:
      enabled: true
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 5000
  otlphttp/metrics:
    endpoint: https://api.axiom.co
    headers:
      authorization: "Bearer ${env:AXIOM_API_TOKEN}"
      x-axiom-dataset: dofek-metrics
    retry_on_failure:
      enabled: true
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 5000

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/traces]
    logs/app:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/logs]
    logs/docker:
      receivers: [filelog]
      processors: [resource/docker, batch]
      exporters: [otlphttp/logs]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/metrics]
