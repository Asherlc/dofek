#cloud-config
# Installs Docker CE and initializes a single-node Docker Swarm on a fresh
# Ubuntu 24.04 server. Deploys happen from CI via a remote Docker context
# (SSH); there are no deploy scripts or secrets on the server.

package_update: true

packages:
  - ca-certificates
  - curl
  - gnupg

write_files:
  - path: /opt/dofek/otel-collector-config.yaml
    permissions: "0644"
    content: |
      ${indent(6, otel_collector_content)}

  - path: /etc/docker/daemon.json
    permissions: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }

runcmd:
  # Install Docker CE
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # App directory (used for bind-mounted OTel config)
  - mkdir -p /opt/dofek

  # Restart Docker to pick up daemon.json log settings
  - systemctl restart docker

  # Initialize a single-node swarm (idempotent)
  - |
      if docker info --format '{{.Swarm.ControlAvailable}}' | grep -q true; then
        exit 0
      fi
      if docker info --format '{{.Swarm.LocalNodeState}}' | grep -q active; then
        docker swarm leave --force
      fi
      docker swarm init
