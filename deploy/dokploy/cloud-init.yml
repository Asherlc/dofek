#cloud-config
# Installs Dokploy on a fresh Ubuntu 24.04 server.
# After boot, access Dokploy at http://<server-ip>:3000 to create admin account.
# Then run `terraform apply` on dokploy.tf to configure services.

package_update: true

packages:
  - ca-certificates
  - curl

write_files:
  - path: /opt/dofek/otel-collector-config.yaml
    permissions: "0644"
    content: |
      ${indent(6, otel_collector_content)}

runcmd:
  # Install Dokploy (installs Docker + Docker Swarm + Dokploy)
  - curl -sSL https://dokploy.com/install.sh | sh
%{ if db_data_path != "" ~}
  # Ensure block storage mount dirs exist for TimescaleDB
  - mkdir -p ${db_data_path}
  - mkdir -p ${db_backup_path}
%{ endif ~}
