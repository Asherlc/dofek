# Production stack: all services, Traefik reverse proxy, management UIs.
#
# Secrets come from /opt/dofek/.env.prod (exported by Infisical CLI).
# Image tag comes from /opt/dofek/.env.deploy (written by CI).
#
# Usage:
#   docker compose --env-file /opt/dofek/.env.prod --env-file /opt/dofek/.env.deploy \
#     -f docker-compose.deploy.yml up -d

name: dofek

services:
  # ── Reverse Proxy ──────────────────────────────────────────
  traefik:
    image: traefik:3.6
    container_name: dofek-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=dofek_default
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.dnschallenge=true
      - --certificatesresolvers.le.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.le.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --certificatesresolvers.le.acme.dnschallenge.delaybeforecheck=10
      - --certificatesresolvers.le.acme.email=asherlc@asherlc.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    labels:
      # Authentik forward auth middleware (used by portainer + netdata)
      - traefik.enable=true
      - traefik.http.middlewares.authentik-auth.forwardAuth.address=https://authentik.asherlc.com/outpost.goauthentik.io/auth/traefik
      - traefik.http.middlewares.authentik-auth.forwardAuth.trustForwardHeader=true
      - traefik.http.middlewares.authentik-auth.forwardAuth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid

  # ── Web Application ────────────────────────────────────────
  web:
    image: ghcr.io/asherlc/dofek:${IMAGE_TAG:-latest}
    # No container_name — docker-rollout needs to scale to 2 instances
    restart: unless-stopped
    command: ["web"]
    env_file: /opt/dofek/.env.prod
    environment:
      NODE_ENV: production
      PORT: "3000"
      JOB_FILES_DIR: /app/job-files
      PUBLIC_URL: https://dofek.asherlc.com
      DATABASE_URL: postgres://health:${POSTGRES_PASSWORD}@db:5432/health
      REDIS_URL: redis://redis:6379
      OTEL_SERVICE_NAME: dofek-web
      OTEL_EXPORTER_OTLP_ENDPOINT: http://collector:4318
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://collector:4318/v1/logs
    volumes:
      - job_files:/app/job-files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`dofek.asherlc.com`) || Host(`dofek.fit`) || Host(`www.dofek.fit`) || Host(`dofek.live`) || Host(`www.dofek.live`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.tls.certresolver=le
      - traefik.http.routers.web.tls.domains[0].main=dofek.asherlc.com
      - traefik.http.routers.web.tls.domains[0].sans=*.dofek.asherlc.com
      - traefik.http.routers.web.tls.domains[1].main=dofek.fit
      - traefik.http.routers.web.tls.domains[1].sans=www.dofek.fit
      - traefik.http.routers.web.tls.domains[2].main=dofek.live
      - traefik.http.routers.web.tls.domains[2].sans=www.dofek.live
      - traefik.http.services.web.loadbalancer.server.port=3000

  # ── Worker ─────────────────────────────────────────────────
  worker:
    image: ghcr.io/asherlc/dofek:${IMAGE_TAG:-latest}
    # No container_name — docker-rollout needs to scale to 2 instances
    restart: unless-stopped
    command: ["worker"]
    env_file: /opt/dofek/.env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://health:${POSTGRES_PASSWORD}@db:5432/health
      REDIS_URL: redis://redis:6379
      OTEL_SERVICE_NAME: dofek-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://collector:4318
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://collector:4318/v1/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f worker || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Training Export Worker (Python BullMQ) ──────────────────
  training-export-worker:
    image: ghcr.io/asherlc/dofek-ml:${IMAGE_TAG:-latest}
    container_name: dofek-training-export-worker
    restart: on-failure
    environment:
      DATABASE_URL: postgres://health:${POSTGRES_PASSWORD}@db:5432/health
      REDIS_URL: redis://redis:6379
      JOB_FILES_DIR: /app/job-files
    volumes:
      - job_files:/app/job-files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f worker || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Database ───────────────────────────────────────────────
  db:
    image: timescale/timescaledb:2.26.2-pg18
    container_name: dofek-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: health
      POSTGRES_USER: health
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Databasus (DB management + backups) ────────────────────
  databasus:
    image: databasus/databasus:v3.32.1
    container_name: dofek-databasus
    restart: unless-stopped
    volumes:
      - databasus_data:/databasus-data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4005/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.databasus.rule=Host(`databasus.dofek.asherlc.com`)
      - traefik.http.routers.databasus.entrypoints=websecure
      - traefik.http.routers.databasus.tls=true
      - traefik.http.routers.databasus.tls.certresolver=le
      - traefik.http.routers.databasus.middlewares=authentik-auth
      - traefik.http.services.databasus.loadbalancer.server.port=4005

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dofek-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── OpenTelemetry Collector ────────────────────────────────
  collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    container_name: dofek-collector
    restart: unless-stopped
    user: "0:0"
    env_file: /opt/dofek/.env.prod
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /opt/dofek/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Expo OTA Server ────────────────────────────────────────
  ota:
    image: ghcr.io/axelmarciano/expo-open-ota:v2.3.16
    container_name: dofek-ota
    restart: unless-stopped
    env_file: /opt/dofek/.env.prod
    environment:
      BASE_URL: https://ota.dofek.asherlc.com
      STORAGE_MODE: s3
      S3_BUCKET_NAME: dofek-ota
      AWS_REGION: auto
      AWS_BASE_ENDPOINT: ${R2_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      CACHE_MODE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${OTA_JWT_SECRET}
      PORT: 3000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/hc"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.ota.rule=Host(`ota.dofek.asherlc.com`)
      - traefik.http.routers.ota.entrypoints=websecure
      - traefik.http.routers.ota.tls=true
      - traefik.http.routers.ota.tls.certresolver=le
      - traefik.http.services.ota.loadbalancer.server.port=3000

  # ── Portainer (Docker management UI) ──────────────────────
  portainer:
    image: portainer/portainer-ce:2.40.0
    container_name: dofek-portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.portainer.rule=Host(`portainer.dofek.asherlc.com`)
      - traefik.http.routers.portainer.entrypoints=websecure
      - traefik.http.routers.portainer.tls=true
      - traefik.http.routers.portainer.tls.certresolver=le
      - traefik.http.routers.portainer.middlewares=authentik-auth
      - traefik.http.services.portainer.loadbalancer.server.port=9000

  # ── Netdata (server health monitoring) ─────────────────────
  netdata:
    image: netdata/netdata:v2.5
    container_name: dofek-netdata
    restart: unless-stopped
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata_config:/etc/netdata
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.netdata.rule=Host(`netdata.dofek.asherlc.com`)
      - traefik.http.routers.netdata.entrypoints=websecure
      - traefik.http.routers.netdata.tls=true
      - traefik.http.routers.netdata.tls.certresolver=le
      - traefik.http.routers.netdata.middlewares=authentik-auth
      - traefik.http.services.netdata.loadbalancer.server.port=19999

volumes:
  letsencrypt:
  db_data:
  databasus_data:
  redis_data:
  job_files:
  portainer_data:
  netdata_config:
  netdata_lib:
  netdata_cache:
