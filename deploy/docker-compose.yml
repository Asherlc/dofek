services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - domain=${CADDY_DOMAIN:-dofek.asherlc.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client

  client:
    image: ${DOFEK_CLIENT_IMAGE:-ghcr.io/asherlc/dofek-client:latest}
    restart: unless-stopped
    volumes:
      - /opt/dofek/updates:/usr/share/nginx/html/updates:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      - web

  migrate:
    image: ${DOFEK_IMAGE:-ghcr.io/asherlc/dofek:latest}
    command: migrate
    restart: "no"
    env_file: .env
    environment:
      - DATABASE_URL=postgres://health:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/health
      - NODE_ENV=production
      - OTEL_SERVICE_NAME=dofek-migrate
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4318
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://collector:4318/v1/logs
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ${DOFEK_IMAGE:-ghcr.io/asherlc/dofek:latest}
    command: web
    restart: unless-stopped
    env_file: .env
    # Add docker group so node user (uid 1000) can access /var/run/docker.sock
    # DOCKER_GID should be set via .env (run `getent group docker | cut -d: -f3` to find host docker GID)
    group_add:
      - "${DOCKER_GID:-988}"
    environment:
      - DATABASE_URL=postgres://health:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/health
      - REDIS_URL=redis://redis:6379
      - JOB_FILES_DIR=/app/job-files
      - UPDATES_DIR=/app/updates
      - PUBLIC_URL=https://dofek.asherlc.com
      - PORT=3000
      - NODE_ENV=production
      - R2_ENDPOINT=${R2_ENDPOINT:?Set R2_ENDPOINT in .env}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:?Set R2_ACCESS_KEY_ID in .env}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:?Set R2_SECRET_ACCESS_KEY in .env}
      - R2_BUCKET=dofek-training-data
      - OTEL_SERVICE_NAME=dofek-web
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4318
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://collector:4318/v1/logs
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=https://o4511073249067008.ingest.us.sentry.io/api/4511073388593152/integration/otlp/v1/traces?sentry_key=b421c7fde44434a032c86e3357cae397
    volumes:
      - job_files:/app/job-files
      - /opt/dofek/updates:/app/updates:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/healthz').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      default:
        aliases:
          - dofek-web
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ghcr.io/asherlc/dofek:latest
    container_name: dofek-worker
    command: worker
    restart: on-failure:3
    env_file: .env
    environment:
      - DATABASE_URL=postgres://health:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/health
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - R2_ENDPOINT=${R2_ENDPOINT:?Set R2_ENDPOINT in .env}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:?Set R2_ACCESS_KEY_ID in .env}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:?Set R2_SECRET_ACCESS_KEY in .env}
      - R2_BUCKET=dofek-training-data
      - OTEL_SERVICE_NAME=dofek-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4318
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://collector:4318/v1/logs
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=https://o4511073249067008.ingest.us.sentry.io/api/4511073388593152/integration/otlp/v1/traces?sentry_key=b421c7fde44434a032c86e3357cae397
    volumes:
      - job_files:/app/job-files
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 35m

  sync:
    image: ${DOFEK_IMAGE:-ghcr.io/asherlc/dofek:latest}
    command: sync
    restart: "no"
    env_file: .env
    environment:
      - DATABASE_URL=postgres://health:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/health
      - NODE_ENV=production
      - OTEL_SERVICE_NAME=dofek-sync
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4318
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://collector:4318/v1/logs
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=https://o4511073249067008.ingest.us.sentry.io/api/4511073388593152/integration/otlp/v1/traces?sentry_key=b421c7fde44434a032c86e3357cae397
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    user: "0:0"
    environment:
      - AXIOM_API_TOKEN=${AXIOM_API_TOKEN:?Set AXIOM_API_TOKEN in .env}
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: health
      POSTGRES_USER: health
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d health"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: health
      POSTGRES_USER: health
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - db_backups:/backups
    depends_on:
      db:
        condition: service_healthy

  portainer:
    image: portainer/portainer-ce:lts
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.40"
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "true"
      WATCHTOWER_REVIVE_STOPPED: "false"
      # With 2 replicas for web/client, rolling restart keeps at least one
      # serving instance available during image updates.
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_STOP_TIMEOUT: "2100"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro

volumes:
  db_data:
  db_backups:
  caddy_data:
  caddy_config:
  redis_data:
  job_files:
  portainer_data:
