services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - domain=${CADDY_DOMAIN:-dofek.asherlc.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy

  migrate:
    image: ${DOFEK_IMAGE:-ghcr.io/asherlc/dofek:latest}
    command: migrate
    restart: "no"
    env_file:
      - .env
      - path: secrets.env
        required: false
    environment:
      - DATABASE_URL=postgres://health:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Infisical}@db:5432/health
      - NODE_ENV=production
      - OTEL_SERVICE_NAME=dofek-migrate
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4318
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://collector:4318/v1/logs
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ${DOFEK_IMAGE:-ghcr.io/asherlc/dofek:latest}
    command: web
    restart: unless-stopped
    env_file:
      - .env
      - path: secrets.env
        required: false
    # Add docker group so node user (uid 1000) can access /var/run/docker.sock
    # DOCKER_GID should be set via .env (run `getent group docker | cut -d: -f3` to find host docker GID)
    group_add:
      - "${DOCKER_GID:-988}"
    environment:
      - DATABASE_URL=postgres://health:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Infisical}@db:5432/health
      - REDIS_URL=redis://redis:6379
      - JOB_FILES_DIR=/app/job-files
      - PUBLIC_URL=https://dofek.asherlc.com
      - PORT=3000
      - NODE_ENV=production
      - OTEL_SERVICE_NAME=dofek-web
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4318
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://collector:4318/v1/logs
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${SENTRY_OTLP_TRACES_ENDPOINT}
    volumes:
      - job_files:/app/job-files
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/healthz').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      default:
        aliases:
          - dofek-web
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ghcr.io/asherlc/dofek:latest
    container_name: dofek-worker
    command: worker
    restart: on-failure:3
    env_file:
      - .env
      - path: secrets.env
        required: false
    environment:
      - DATABASE_URL=postgres://health:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Infisical}@db:5432/health
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - OTEL_SERVICE_NAME=dofek-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4318
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://collector:4318/v1/logs
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${SENTRY_OTLP_TRACES_ENDPOINT}
    volumes:
      - job_files:/app/job-files
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 35m

  sync:
    image: ${DOFEK_IMAGE:-ghcr.io/asherlc/dofek:latest}
    command: sync
    restart: "no"
    env_file:
      - .env
      - path: secrets.env
        required: false
    environment:
      - DATABASE_URL=postgres://health:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Infisical}@db:5432/health
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - OTEL_SERVICE_NAME=dofek-sync
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://collector:4318
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://collector:4318/v1/logs
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${SENTRY_OTLP_TRACES_ENDPOINT}
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  ota:
    image: ghcr.io/axelmarciano/expo-open-ota:latest
    restart: unless-stopped
    environment:
      - BASE_URL=https://ota.dofek.asherlc.com
      - STORAGE_MODE=s3
      - S3_BUCKET_NAME=${R2_OTA_BUCKET:-dofek-ota}
      - AWS_REGION=auto
      - AWS_BASE_ENDPOINT=${R2_ENDPOINT:?Set R2_ENDPOINT in Infisical}
      - AWS_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:?Set R2_ACCESS_KEY_ID in Infisical}
      - AWS_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:?Set R2_SECRET_ACCESS_KEY in Infisical}
      - EXPO_APP_ID=${EXPO_APP_ID:?Set EXPO_APP_ID in Infisical}
      - EXPO_ACCESS_TOKEN=${EXPO_ACCESS_TOKEN:?Set EXPO_ACCESS_TOKEN in Infisical}
      - JWT_SECRET=${OTA_JWT_SECRET:?Set OTA_JWT_SECRET in Infisical}
      - KEYS_STORAGE_TYPE=environment
      - PUBLIC_EXPO_KEY_B64=${OTA_PUBLIC_KEY_B64}
      - PRIVATE_EXPO_KEY_B64=${OTA_PRIVATE_KEY_B64}
      - CACHE_MODE=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/manifest 2>&1 | grep -q 'channel'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    restart: unless-stopped
    user: "0:0"
    environment:
      - AXIOM_API_TOKEN=${AXIOM_API_TOKEN:?Set AXIOM_API_TOKEN in Infisical}
      - SENTRY_OTLP_LOGS_ENDPOINT=${SENTRY_OTLP_LOGS_ENDPOINT}
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: health
      POSTGRES_USER: health
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Infisical}
    volumes:
      - ${DB_DATA_PATH:-db_data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d health"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: health
      POSTGRES_USER: health
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Infisical}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ${DB_BACKUP_PATH:-db_backups}:/backups
    depends_on:
      db:
        condition: service_healthy

  portainer:
    image: portainer/portainer-ce:lts
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.40"
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "true"
      WATCHTOWER_REVIVE_STOPPED: "false"
      # With 2 replicas for web, rolling restart keeps at least one
      # serving instance available during image updates.
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_STOP_TIMEOUT: "2100"
      # Slack DM notifications on updates and failures
      WATCHTOWER_NOTIFICATION_URL: "slack://${SLACK_BOT_TOKEN}@U83CF6FDJ"
      WATCHTOWER_NOTIFICATION_TEMPLATE: "{{range .}}{{.Message}}{{println}}{{end}}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro

volumes:
  db_data:
  db_backups:
  caddy_data:
  caddy_config:
  redis_data:
  job_files:
  portainer_data:
