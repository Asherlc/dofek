#cloud-config

package_update: true

packages:
  - ca-certificates
  - curl

write_files:
  - path: /opt/dofek/docker-compose.yml
    permissions: "0644"
    content: |
      ${indent(6, compose_content)}

  - path: /opt/dofek/Caddyfile
    permissions: "0644"
    content: |
      ${indent(6, caddy_content)}

  - path: /opt/dofek/.env
    permissions: "0600"
    content: |
      INFISICAL_TOKEN=${infisical_token}
      CADDY_DOMAIN=${domain}
%{ if db_data_path != "" ~}
      DB_DATA_PATH=${db_data_path}
      DB_BACKUP_PATH=${db_backup_path}
%{ endif ~}

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - echo '${ghcr_token}' | docker login ghcr.io -u ${ghcr_username} --password-stdin
  - cd /opt/dofek && docker compose up -d --scale web=2 --scale client=2
