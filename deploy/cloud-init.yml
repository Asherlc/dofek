#cloud-config

package_update: true

packages:
  - ca-certificates
  - curl

write_files:
  - path: /opt/dofek/docker-compose.yml
    permissions: "0644"
    content: |
      ${indent(6, compose_content)}

  - path: /opt/dofek/Caddyfile
    permissions: "0644"
    content: |
      ${indent(6, caddy_content)}

  - path: /opt/dofek/otel-collector-config.yaml
    permissions: "0644"
    content: |
      ${indent(6, otel_collector_content)}

  - path: /opt/dofek/deploy.sh
    permissions: "0755"
    content: |
      ${indent(6, deploy_script_content)}

  - path: /opt/dofek/.env
    permissions: "0600"
    content: |
      INFISICAL_TOKEN=${infisical_token}
      CADDY_DOMAIN=${domain}
%{ if db_data_path != "" ~}
      DB_DATA_PATH=${db_data_path}
      DB_BACKUP_PATH=${db_backup_path}
%{ endif ~}

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - echo '${ghcr_token}' | docker login ghcr.io -u ${ghcr_username} --password-stdin
  # Install Infisical CLI for secret fetching
  - ARCH=$(uname -m) && case "$ARCH" in x86_64) INF_ARCH=amd64;; aarch64) INF_ARCH=arm64;; *) INF_ARCH=$ARCH;; esac && curl -fsSL "https://github.com/Infisical/cli/releases/download/v0.43.69/cli_0.43.69_linux_$${INF_ARCH}.tar.gz" | tar xz -C /usr/local/bin infisical && chmod +x /usr/local/bin/infisical
  - cd /opt/dofek && ./deploy.sh
