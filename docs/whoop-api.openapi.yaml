        - $ref: "#/components/parameters/userId"
        - $ref: "#/components/parameters/apiVersion"
      responses:
        "200":
          description: Performance assessment records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceAssessmentResponse"

  # ── Developer API ─────────────────────────────────────
  /developer/v2/activity/workout:
    get:
      operationId: listDeveloperWorkouts
      summary: List workouts (developer API format)
      description: |
        Returns workouts in the developer API format with UUID IDs and
