  /weightlifting-service/v2/weightlifting-workout/{activityId}:
    get:
      operationId: getWeightliftingWorkout
      summary: Get full exercise-level data for a strength workout
      description: |
        Returns the complete exercise breakdown for a Strength Trainer workout,
        including exercises, sets, reps, weight, and MSK strain metrics.
        The activityId is the UUID activity ID from the cycles BFF workout response.

        Note: This endpoint is NOT in the decompiled WeightliftingApi Retrofit
        interface — it may be called from a different module (e.g., core-details-bff).
        Confirmed working via live probing.
      tags: [Weightlifting]
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Activity ID (UUID) from the workout record
      responses:
        "200":
          description: Full weightlifting workout with exercise-level data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeightliftingWorkoutResponse"
        "404":
