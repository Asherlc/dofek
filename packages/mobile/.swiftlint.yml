included:
  - modules
  - targets

excluded:
  - modules/*/Tests
  - modules/*/.build
  - targets/DofekWatch/*.test.swift
  # Expo module bridge files are inherently monolithic — a single definition()
  # method registers the entire API surface. Structural rules (body length,
  # complexity, file length) don't apply meaningfully. These files are also
  # excluded from SPM targets in each Package.swift.
  - modules/background-refresh/ios/BackgroundRefreshModule.swift
  - modules/ble-probe/ios/BleProbeModule.swift
  - modules/core-motion/ios/CoreMotionModule.swift
  - modules/health-kit/ios/HealthKitModule.swift
  - modules/watch-motion/ios/WatchMotionModule.swift
  - modules/whoop-ble/ios/WhoopBleModule.swift

opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - identical_operands
  - last_where
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces

disabled_rules:
  - trailing_comma
  - todo

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 80
  error: 120

# HealthKitQueries.preferredUnit is a type→unit switch (complexity 25) — high
# cyclomatic count but not actually complex logic
cyclomatic_complexity:
  warning: 25
  error: 40

# IMU update functions take 6 params (ax, ay, az, gx, gy, gz) — standard interface
function_parameter_count:
  warning: 6
  error: 8

# Math-heavy code (Madgwick filter, frame parser) uses short variable names
identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60
  allowed_symbols:
    - _
  excluded:
    - id

large_tuple:
  warning: 4

nesting:
  type_level: 2
  function_level: 3

type_name:
  min_length: 3
  max_length: 50
  allowed_symbols:
    - _
