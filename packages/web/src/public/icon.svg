<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="224" fill="#0f1117"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="20%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g transform="translate(512, 512)">
    <!-- Subtle center glow -->
    <circle r="100" fill="url(#glow)"/>

    <!-- Stream 1: Emerald — from top, sweeping clockwise -->
    <path d="M -80 -380 C -280 -340, -280 -80, 0 0"
          stroke="#10b981" stroke-width="46" fill="none" stroke-linecap="round"/>

    <!-- Stream 2: Teal — from right, sweeping clockwise -->
    <path d="M 380 -80 C 340 -280, 80 -280, 0 0"
          stroke="#5AC8FA" stroke-width="46" fill="none" stroke-linecap="round"/>

    <!-- Stream 3: Orange — from bottom, sweeping clockwise -->
    <path d="M 80 380 C 280 340, 280 80, 0 0"
          stroke="#FF8A65" stroke-width="46" fill="none" stroke-linecap="round"/>

    <!-- Stream 4: Purple — from left, sweeping clockwise -->
    <path d="M -380 80 C -340 280, -80 280, 0 0"
          stroke="#7c3aed" stroke-width="46" fill="none" stroke-linecap="round"/>

    <!-- Center convergence point -->
    <circle r="22" fill="#fff"/>
  </g>
</svg>
